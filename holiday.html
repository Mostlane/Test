<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js"></script>
  <script src="auth.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holiday — Mostlane Portal</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Segoe UI",system-ui,-apple-system,sans-serif; background:#eef1f5; color:#16202e; }
    header.page { background:linear-gradient(180deg,#1A4F8F,#003468); color:#fff; padding:14px 18px; display:flex; align-items:center; gap:12px; }
    header.page h1 { font-size:18px; margin:0; flex:1; color:#fff; }
    .wrap { max-width:860px; margin:18px auto 40px; padding:0 14px; }
    .muted { color:#667085; font-size:13px; }
    .btn { background:#0066cc; color:#fff; border:none; border-radius:10px; padding:11px 16px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
    .btn.grey { background:#5b6b78; } .btn.red { background:#b00020; } .btn.small { padding:7px 11px; font-size:13px; font-weight:500; }
    .btn:disabled { opacity:.5; cursor:default; }

    /* Stats row */
    .stats { display:flex; gap:12px; align-items:stretch; flex-wrap:wrap; margin-bottom:16px; }
    .ring-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; box-shadow:0 2px 10px rgba(6,24,54,.06); padding:16px 20px; display:flex; align-items:center; gap:16px; flex:2 1 260px; }
    .ring { width:104px; height:104px; flex:none; position:relative; }
    .ring svg { transform:rotate(-90deg); }
    .ring .num { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .ring .num b { font-size:30px; line-height:1; color:#0c7d3f; }
    .ring .num span { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:#667085; margin-top:2px; }
    .ring-card .info h2 { margin:0 0 4px; font-size:16px; color:#003366; }
    .tiles { display:flex; gap:12px; flex:1 1 220px; }
    .tile { background:#fff; border:1px solid #e2e8f0; border-radius:16px; box-shadow:0 2px 10px rgba(6,24,54,.06); padding:14px; flex:1; text-align:center; display:flex; flex-direction:column; justify-content:center; }
    .tile b { font-size:24px; color:#003366; }
    .tile span { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#667085; margin-top:3px; }

    .bookbar { display:flex; align-items:center; gap:10px; margin:0 0 16px; flex-wrap:wrap; }
    .bookbar h2 { margin:0; font-size:17px; color:#003366; flex:1; }
    select.yearsel { padding:8px 10px; border:1px solid #ccd5dd; border-radius:8px; font-size:14px; background:#fff; font-family:inherit; }

    /* Time-off list */
    .list { background:#fff; border:1px solid #e2e8f0; border-radius:16px; box-shadow:0 2px 10px rgba(6,24,54,.06); overflow:hidden; }
    .row { display:flex; align-items:center; gap:12px; padding:13px 16px; border-bottom:1px solid #f0f3f7; flex-wrap:wrap; }
    .row:last-child { border-bottom:none; }
    .dateblock { background:#f0f6ff; border-radius:10px; padding:7px 10px; text-align:center; min-width:86px; flex:none; }
    .dateblock b { display:block; font-size:13px; color:#003366; }
    .dateblock span { font-size:11px; color:#667085; }
    .row .what { flex:1; min-width:150px; }
    .row .what b { font-size:14px; }
    .row .what .muted { margin-top:1px; }
    .pill { font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; flex:none; }
    .pill.Pending { background:#fff3cd; color:#7a5b00; }
    .pill.Approved { background:#e3f6e8; color:#0c7d27; }
    .pill.Rejected { background:#fde8ea; color:#b00020; }
    .pill.Cancelled { background:#eef1f4; color:#667085; }
    .pill.bank { background:#e2edff; color:#1a4f8f; }
    .pill.shut { background:#efe6ff; color:#5b21b6; }
    .pill.worked { background:#e3f6e8; color:#0c7d27; }
    .secttl { font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:#667085; font-weight:700; margin:20px 2px 8px; }

    /* Booking modal */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-start; justify-content:center; padding:16px; overflow:auto; z-index:500; }
    .overlay.open { display:flex; }
    .panel { background:#fff; border-radius:16px; width:100%; max-width:440px; padding:20px; margin-top:5vh; }
    .panel h2 { margin:0 0 12px; font-size:17px; color:#003366; }
    .panel label { font-size:12px; color:#667085; display:block; margin:10px 0 3px; }
    .panel input, .panel select, .panel textarea { width:100%; padding:10px; border:1px solid #ccd5dd; border-radius:9px; font-size:16px; font-family:inherit; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .daycount { background:#f0f6ff; border:1px solid #cfe0f5; border-radius:10px; padding:11px 13px; margin-top:12px; font-size:13.5px; display:none; }
    .daycount b { color:#003366; }
    .panel .acts { display:flex; gap:10px; margin-top:16px; }
    .panel .acts .btn { flex:1; padding:12px; }
    .msg { font-size:13.5px; margin-top:10px; } .msg.err { color:#b00020; }
    .warnbox { background:#fff6e0; border:1px solid #f3ce9c; color:#8a5a00; border-radius:10px; padding:10px 13px; margin-top:10px; font-size:13px; display:none; }

    /* Year calendar view (Timetastic-style mini months) */
    .calgrid { display:grid; grid-template-columns:repeat(auto-fill, minmax(235px, 1fr)); gap:14px; }
    .mm { background:#fff; border:1px solid #e2e8f0; border-radius:14px; box-shadow:0 2px 10px rgba(6,24,54,.06); padding:12px 10px 10px; }
    .mm h4 { margin:0 0 7px; text-align:center; font-size:13.5px; color:#003366; }
    .mm table { width:100%; border-collapse:collapse; table-layout:fixed; }
    .mm th { font-size:9px; color:#9aa6b2; font-weight:600; padding-bottom:3px; }
    .mm td { text-align:center; font-size:11.5px; height:27px; border-radius:7px; color:#334155; }
    .mm td.we { background:#f3f5f8; color:#94a3b8; }
    .mm td.today { outline:2px solid #1a4f8f; outline-offset:-2px; font-weight:700; }
    .mm td.hol { background:#18a558; color:#fff; font-weight:700; }
    .mm td.oth { background:#0d9488; color:#fff; font-weight:700; }
    .mm td.pend { background:repeating-linear-gradient(45deg,#f4b942,#f4b942 3px,#ffe1a0 3px,#ffe1a0 6px); color:#7a5b00; font-weight:700; }
    .mm td.bank { background:#4d8bff; color:#fff; font-weight:700; }
    .mm td.shut { background:#8b5cf6; color:#fff; font-weight:700; }
    .mm td.wrk { background:#b9e5c8; color:#0c7d27; font-weight:700; }
    .callegend { display:flex; gap:12px; flex-wrap:wrap; margin-top:12px; font-size:12px; color:#475569; }
    .callegend span { display:inline-flex; align-items:center; gap:5px; }
    .callegend i { width:13px; height:13px; border-radius:4px; display:inline-block; }
    @media (max-width:560px){ .tiles{flex-basis:100%;} .calgrid{grid-template-columns:1fr 1fr;} }
    @media (max-width:430px){ .calgrid{grid-template-columns:1fr;} }
  </style>
  <script>
    if (sessionStorage.getItem("mostlaneLoggedIn") !== "true") location.href = "login.html";
  </script>
</head>
<body>
  <header class="page">
    <h1>🌴 Holiday</h1>
    <a class="ml-back" data-role="home" href="main.html">← Menu</a>
  </header>

  <div class="wrap">
    <div class="stats">
      <div class="ring-card">
        <div class="ring">
          <svg width="104" height="104" viewBox="0 0 104 104">
            <circle cx="52" cy="52" r="45" fill="none" stroke="#e8edf4" stroke-width="10"/>
            <circle id="ringArc" cx="52" cy="52" r="45" fill="none" stroke="#18a558" stroke-width="10"
                    stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="283"/>
          </svg>
          <div class="num"><b id="statRemaining">–</b><span>days left</span></div>
        </div>
        <div class="info">
          <h2 id="helloLbl">My holiday</h2>
          <div class="muted" id="allowLbl">Loading…</div>
          <div class="muted" id="sysLbl" style="margin-top:3px;"></div>
        </div>
      </div>
      <div class="tiles">
        <div class="tile"><b id="statUsed">–</b><span>days used</span></div>
        <div class="tile"><b id="statPending">–</b><span>days pending</span></div>
      </div>
    </div>

    <div class="bookbar">
      <h2>My time off</h2>
      <select class="yearsel" id="yearSel"></select>
      <button class="btn grey" id="viewToggle" title="Switch view" style="padding:9px 12px;">📅</button>
      <button class="btn" id="bookBtn">+ Book time off</button>
    </div>

    <div id="listWrap">
      <div class="list" id="reqList"><div class="row"><span class="muted">Loading…</span></div></div>
      <div class="secttl">Bank holidays &amp; company shutdown</div>
      <div class="list" id="sysList"><div class="row"><span class="muted">Loading…</span></div></div>
    </div>

    <div id="calWrap" style="display:none;">
      <div class="calgrid" id="calGrid"></div>
      <div class="callegend">
        <span><i style="background:#18a558"></i> Holiday</span>
        <span><i style="background:#0d9488"></i> Other (agreed)</span>
        <span><i style="background:repeating-linear-gradient(45deg,#f4b942,#f4b942 3px,#ffe1a0 3px,#ffe1a0 6px)"></i> Pending</span>
        <span><i style="background:#4d8bff"></i> Bank holiday</span>
        <span><i style="background:#8b5cf6"></i> Shutdown</span>
        <span><i style="background:#b9e5c8"></i> Worked (credited)</span>
      </div>
    </div>
  </div>

  <!-- Booking modal -->
  <div class="overlay" id="bookModal">
    <div class="panel">
      <h2>Book time off</h2>
      <div class="grid2">
        <div><label>First day</label><input type="date" id="bStart"></div>
        <div><label>Last day</label><input type="date" id="bEnd"></div>
      </div>
      <label>Type</label>
      <select id="bType"><option>Holiday</option><option>Unpaid</option><option>Other</option></select>
      <label id="bNoteLbl">Reminder note (required)</label>
      <input id="bNote" placeholder="e.g. Family trip, wedding…">
      <div class="daycount" id="bCount"></div>
      <div class="warnbox" id="bAccrual"></div>
      <p class="msg" id="bMsg"></p>
      <div class="acts">
        <button class="btn grey" onclick="closeBook()">Cancel</button>
        <button class="btn" id="bSubmit">Request</button>
      </div>
    </div>
  </div>

  <script>
    const API = window.MOSTLANE_API;
    const g = id => document.getElementById(id);
    const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
    function authFetch(path, opts = {}) {
      opts.headers = Object.assign({ "Authorization": "Bearer " + localStorage.getItem("mostlaneToken") }, opts.headers || {});
      return fetch(API + path, opts);
    }
    let YEAR = new Date().getFullYear();
    const me = sessionStorage.getItem("mostlaneUser") || localStorage.getItem("mostlaneUser") || "";
    let LAST_SUM = {};   // latest /holiday/summary (for the accrual warning)

    // ── View preference (list / year calendar), remembered per user ──
    const VIEW_KEY = "mostlaneHolView:" + me;
    let VIEW = localStorage.getItem(VIEW_KEY) === "cal" ? "cal" : "list";
    function applyView() {
      g("listWrap").style.display = VIEW === "cal" ? "none" : "";
      g("calWrap").style.display = VIEW === "cal" ? "" : "none";
      g("viewToggle").textContent = VIEW === "cal" ? "📋" : "📅";
      g("viewToggle").title = VIEW === "cal" ? "List view" : "Calendar view";
    }
    document.getElementById("viewToggle").onclick = () => {
      VIEW = VIEW === "cal" ? "list" : "cal";
      try { localStorage.setItem(VIEW_KEY, VIEW); } catch (e) {}
      applyView();
    };
    applyView();

    // Year picker: this year and next (book ahead), plus last year for reference.
    (function () {
      const y = new Date().getFullYear();
      g("yearSel").innerHTML = [y - 1, y, y + 1].map(v => `<option ${v === y ? "selected" : ""}>${v}</option>`).join("");
      g("yearSel").onchange = () => { YEAR = Number(g("yearSel").value); loadAll(); };
    })();

    const fmtD = iso => new Date(iso + "T00:00:00").toLocaleDateString("en-GB", { day:"numeric", month:"short" });
    const fmtDY = iso => new Date(iso + "T00:00:00").toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });

    async function loadAll() {
      try {
        const [sum, mine] = await Promise.all([
          authFetch(`/holiday/summary?year=${YEAR}`).then(r => r.json()),
          authFetch(`/holiday/my?year=${YEAR}`).then(r => r.json())
        ]);
        renderSummary(sum, mine);
        renderLists(Array.isArray(mine) ? mine : []);
        // Decisions are now seen — clears the red badge on the menu/sidebar.
        try { localStorage.setItem("mostlaneHolSeen", new Date().toISOString()); } catch (e) {}
      } catch (e) {
        g("reqList").innerHTML = '<div class="row"><span class="muted">Couldn\'t load your holiday info.</span></div>';
      }
    }

    function renderSummary(sum, mine) {
      LAST_SUM = sum || {};
      const rem = Math.max(0, sum.remaining ?? 0);
      g("statRemaining").textContent = sum.remaining ?? "–";
      g("statUsed").textContent = sum.used ?? "–";
      const pending = (Array.isArray(mine) ? mine : []).filter(h => h.status === "Pending" && h.start).reduce((t, h) => t + (h.days || 0), 0);
      g("statPending").textContent = pending;
      g("allowLbl").textContent = `${sum.allowance ?? "–"} day allowance for ${YEAR}`;
      const b = sum.breakdown || {};
      g("sysLbl").textContent = `Incl. bank holidays & shutdown: ${b.sysDeducted || 0} deducted${b.sysCredited ? `, ${b.sysCredited} credited back (worked)` : ""}`;
      // Ring: remaining as a share of allowance.
      const frac = sum.allowance > 0 ? Math.max(0, Math.min(1, rem / sum.allowance)) : 0;
      const arc = g("ringArc");
      arc.style.strokeDashoffset = String(283 - 283 * frac);
      arc.style.stroke = rem <= 2 ? "#d97706" : "#18a558";
      const rn = g("statRemaining"); rn.style.color = rem <= 2 ? "#d97706" : "#0c7d3f";
    }

    function renderLists(items) {
      const reqs = items.filter(i => i.start);                 // my requests
      const sys = items.filter(i => i.date);                   // bank hols / shutdown
      const today = new Date().toISOString().slice(0, 10);
      reqs.sort((a, b) => (b.start || "").localeCompare(a.start || ""));
      const upcoming = reqs.filter(r => r.end >= today && ["Pending", "Approved"].includes(r.status)).sort((a,b) => a.start.localeCompare(b.start));
      const past = reqs.filter(r => !(r.end >= today && ["Pending", "Approved"].includes(r.status)));

      const row = r => `
        <div class="row">
          <div class="dateblock"><b>${fmtD(r.start)}${r.start !== r.end ? " – " + fmtD(r.end) : ""}</b><span>${r.days} day${r.days === 1 ? "" : "s"}</span></div>
          <div class="what"><b>${esc(r.type || "Annual Leave")}</b><div class="muted">${esc(r.notes || "")}${r.status === "Approved" && r.approvedBy ? " · approved by " + esc(r.approvedBy) : ""}${r.status === "Rejected" && r.approvedBy ? " · by " + esc(r.approvedBy) : ""}</div></div>
          <span class="pill ${r.status}">${r.status}</span>
          ${r.status === "Pending" || (r.status === "Approved" && r.end >= today)
            ? `<button class="btn red small" data-cancel="${esc(r.id)}" data-approved="${r.status === "Approved" ? 1 : 0}">Cancel</button>` : ""}
        </div>`;

      g("reqList").innerHTML =
        (upcoming.length ? upcoming.map(row).join("") : "") +
        (past.length ? past.map(row).join("") : "") ||
        '<div class="row"><span class="muted">No time off booked for ' + YEAR + ' yet — tap “Book time off”.</span></div>';

      renderCalendar(items);
      g("sysList").innerHTML = sys.length ? sys.sort((a,b) => (a.date||"").localeCompare(b.date||"")).map(s => `
        <div class="row">
          <div class="dateblock"><b>${fmtD(s.date)}</b><span>${new Date(s.date+"T00:00:00").toLocaleDateString("en-GB",{weekday:"short"})}</span></div>
          <div class="what"><b>${esc(s.label || s.category)}</b></div>
          <span class="pill ${s.category === "Shutdown" ? "shut" : "bank"}">${s.category === "Shutdown" ? "Shutdown" : "Bank holiday"}</span>
          ${s.worked || s.status === "Credited" ? '<span class="pill worked">Worked — credited</span>' : ""}
        </div>`).join("") : '<div class="row"><span class="muted">None recorded for ' + YEAR + '.</span></div>';
    }

    document.addEventListener("click", async e => {
      const t = e.target;
      if (t.dataset.cancel) {
        const wasApproved = t.dataset.approved === "1";
        if (!confirm(wasApproved
          ? "This holiday is APPROVED. Cancelling gives the days back to your allowance and notifies the office. Cancel it?"
          : "Cancel this pending request?")) return;
        const res = await authFetch(`/holiday/cancel?year=${YEAR}`, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ id: t.dataset.cancel }) });
        if (!res.ok) alert(await res.text().catch(() => "Couldn't cancel — try again."));
        loadAll();
      }
    });

    // ── Year calendar (Timetastic-style 12 mini months) ──
    function renderCalendar(items) {
      const marks = {};   // "YYYY-MM-DD" -> {cls, label}
      const put = (di, cls, label, force) => { if (force || !marks[di]) marks[di] = { cls, label }; };
      for (const r of items.filter(i => i.start)) {
        if (!["Approved", "Pending"].includes(r.status)) continue;
        const cls = r.status === "Pending" ? "pend" : (r.type === "Other" ? "oth" : "hol");
        const s = new Date(r.start + "T00:00:00Z"), e = new Date(r.end + "T00:00:00Z");
        for (let d = new Date(s); d <= e; d.setUTCDate(d.getUTCDate() + 1)) {
          if (d.getUTCDay() === 0 || d.getUTCDay() === 6) continue;
          put(d.toISOString().slice(0, 10), cls, (r.type || "Holiday") + (r.notes ? " · " + r.notes : ""), r.status === "Approved");
        }
      }
      for (const s of items.filter(i => i.date)) {
        const cls = (s.worked || s.status === "Credited") ? "wrk" : (s.category === "Shutdown" ? "shut" : "bank");
        put(s.date, cls, s.label || s.category, false);
      }
      const today = new Date().toISOString().slice(0, 10);
      const pad = n => String(n).padStart(2, "0");
      let html = "";
      for (let m = 1; m <= 12; m++) {
        const first = new Date(Date.UTC(YEAR, m - 1, 1));
        const dim = new Date(Date.UTC(YEAR, m, 0)).getUTCDate();
        const lead = (first.getUTCDay() + 6) % 7;   // Monday-first
        let cells = "";
        for (let i = 0; i < lead; i++) cells += "<td></td>";
        for (let d = 1; d <= dim; d++) {
          const di = `${YEAR}-${pad(m)}-${pad(d)}`;
          const dow = new Date(Date.UTC(YEAR, m - 1, d)).getUTCDay();
          const we = dow === 0 || dow === 6;
          const mk = marks[di];
          const cls = [(we && !mk) ? "we" : "", mk ? mk.cls : "", di === today ? "today" : ""].filter(Boolean).join(" ");
          cells += `<td class="${cls}"${mk ? ` title="${esc(mk.label)}"` : ""}>${d}</td>`;
          if ((lead + d) % 7 === 0 && d !== dim) cells += "</tr><tr>";
        }
        html += `<div class="mm"><h4>${first.toLocaleDateString("en-GB", { month:"long", timeZone:"UTC" })}</h4>
          <table><tr><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th><th>S</th></tr><tr>${cells}</tr></table></div>`;
      }
      g("calGrid").innerHTML = html;
    }

    // ── Booking ──
    function weekdays(start, end) {
      let n = 0;
      const s = new Date(start + "T00:00:00Z"), e = new Date(end + "T00:00:00Z");
      for (let d = new Date(s); d <= e; d.setUTCDate(d.getUTCDate() + 1)) {
        const day = d.getUTCDay();
        if (day !== 0 && day !== 6) n++;
      }
      return n;
    }
    function updateCount() {
      const s = g("bStart").value, e = g("bEnd").value, box = g("bCount"), warn = g("bAccrual");
      warn.style.display = "none";
      if (!s || !e || new Date(e) < new Date(s)) { box.style.display = "none"; return; }
      const n = weekdays(s, e);
      const isOther = g("bType").value === "Other";
      box.style.display = "block";
      box.innerHTML = n > 0
        ? (isOther
            ? `This is <b>${n} day${n === 1 ? "" : "s"}</b> — if approved as “Other” it won't come off your allowance.`
            : `This will use <b>${n} day${n === 1 ? "" : "s"}</b> of your allowance (weekends not counted).`)
        : "No weekdays in that range — pick different dates.";
      // Accrual warning: allowance builds up 1/12th per month through the year.
      if (LAST_SUM.accrualMode && !isOther && n > 0 && Number.isFinite(LAST_SUM.allowance)) {
        const m = Number(s.slice(5, 7));
        const accrued = Math.round((LAST_SUM.allowance * m / 12) * 10) / 10;
        const after = (LAST_SUM.used || 0) + n;
        if (after > accrued) {
          const monthName = new Date(s + "T00:00:00").toLocaleDateString("en-GB", { month:"long" });
          warn.style.display = "block";
          warn.innerHTML = `⚠️ By ${monthName} you'll have accrued <b>${accrued}</b> day${accrued === 1 ? "" : "s"} — this booking takes you to <b>${after}</b> used. It can still be requested; the office will see the same warning.`;
        }
      }
    }
    g("bType").addEventListener("change", () => {
      const other = g("bType").value === "Other";
      g("bNoteLbl").textContent = other ? "Reason (required — the office reviews this)" : "Reminder note (required)";
      g("bNote").placeholder = other ? "e.g. Medical appointment, jury duty…" : "e.g. Family trip, wedding…";
      updateCount();
    });
    g("bStart").addEventListener("change", () => { if (!g("bEnd").value || g("bEnd").value < g("bStart").value) g("bEnd").value = g("bStart").value; updateCount(); });
    g("bEnd").addEventListener("change", updateCount);

    g("bookBtn").onclick = () => {
      g("bStart").value = ""; g("bEnd").value = ""; g("bNote").value = ""; g("bType").selectedIndex = 0;
      g("bMsg").textContent = ""; g("bCount").style.display = "none";
      g("bookModal").classList.add("open");
    };
    function closeBook() { g("bookModal").classList.remove("open"); }

    g("bSubmit").onclick = async () => {
      const s = g("bStart").value, e = g("bEnd").value, note = g("bNote").value.trim();
      const msg = g("bMsg");
      if (!s || !e) { msg.className = "msg err"; msg.textContent = "Pick your first and last day."; return; }
      if (new Date(e) < new Date(s)) { msg.className = "msg err"; msg.textContent = "Last day is before first day."; return; }
      if (!note) { msg.className = "msg err"; msg.textContent = "Add a short reminder note."; return; }
      if (weekdays(s, e) <= 0) { msg.className = "msg err"; msg.textContent = "No weekdays in that range."; return; }
      g("bSubmit").disabled = true; msg.className = "msg"; msg.textContent = "Sending…";
      try {
        const bookYear = new Date(s + "T00:00:00").getFullYear();
        const res = await authFetch(`/holiday/request?year=${bookYear}`, { method:"POST", headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ start: s, end: e, type: g("bType").value, notes: note }) });
        if (!res.ok) throw new Error(await res.text());
        closeBook();
        if (bookYear !== YEAR) { YEAR = bookYear; g("yearSel").value = String(bookYear); }
        loadAll();
      } catch (err) { msg.className = "msg err"; msg.textContent = err.message || "Couldn't send the request."; }
      finally { g("bSubmit").disabled = false; }
    };

    loadAll();
  </script>
</body>
</html>
