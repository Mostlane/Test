
<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js?v=2"></script>
<script src="auth.js"></script>
  <meta charset="UTF-8">
  <title>Add Driver</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 40px;
    }
    .container {
      background: rgba(255,255,255,0.6);
      padding: 30px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
    }
    h2 {
      text-align: center;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input[type="text"], input[type="submit"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    #map {
      height: 300px;
      margin-top: 15px;
    }
    .success {
      color: green;
      font-weight: bold;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Add Driver</h2>
    <form id="driverForm">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" required>

      <label for="username">Username</label>
      <input type="text" id="username" name="username" required>

      <label for="postcode">Postcode</label>
      <input type="text" id="postcode" required>

      <div id="map"></div>

      <input type="submit" value="Submit">
    </form>
    <div class="success" id="confirmation" style="display:none;">Driver added successfully!</div>
  </div>

  <script>
    let map, marker;
    let latitude = 0, longitude = 0;

    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 51.5074, lng: -0.1278 }, // London default
        zoom: 10
      });

      marker = new google.maps.Marker({
        position: map.getCenter(),
        map: map,
        draggable: true
      });

      latitude = marker.getPosition().lat();
      longitude = marker.getPosition().lng();

      marker.addListener("dragend", function() {
        latitude = marker.getPosition().lat();
        longitude = marker.getPosition().lng();
      });
    }

    document.getElementById("postcode").addEventListener("change", function() {
      const postcode = this.value;
      fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${postcode}&key=AIzaSyCvcvG15HB6XBJBbnHifjL8jZtsSE5m0i4`)
        .then(res => res.json())
        .then(data => {
          if (data.results.length > 0) {
            const loc = data.results[0].geometry.location;
            map.setCenter(loc);
            marker.setPosition(loc);
            latitude = loc.lat;
            longitude = loc.lng;
          }
        });
    });

    const API = window.MOSTLANE_API;
    function authFetch(path, init = {}) {
      init.headers = Object.assign({}, init.headers);
      const t = localStorage.getItem("mostlaneToken");
      if (t) init.headers["Authorization"] = "Bearer " + t;
      return fetch(API + path, init);
    }

    document.getElementById("driverForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const conf = document.getElementById("confirmation");
      const fullName = document.getElementById("fullName").value.trim();
      const username = document.getElementById("username").value.trim();
      if (!username) return;

      // Split "First Last" → FirstName / LastName (rest of the words).
      const parts = fullName.split(/\s+/).filter(Boolean);
      const firstName = parts.shift() || "";
      const lastName = parts.join(" ");

      conf.style.color = "green";
      conf.style.display = "block";
      conf.textContent = "Saving…";

      try {
        // Fetch-merge-save: keep any existing profile fields (pay, vehicle, etc.)
        // and only overlay the home geofence.
        let profile = {};
        try {
          const existing = await (await authFetch("/user?u=" + encodeURIComponent(username))).json();
          if (existing && existing.found && existing.user && existing.user.Profile)
            profile = existing.user.Profile;
        } catch (_) { /* new driver — start with an empty profile */ }

        profile.homeLat = Number(latitude);
        profile.homeLng = Number(longitude);
        profile.homeRadius = 300;
        if (document.getElementById("postcode").value.trim())
          profile.postcode = document.getElementById("postcode").value.trim();

        const body = { Username: username, Profile: profile };
        if (firstName) body.FirstName = firstName;
        if (lastName) body.LastName = lastName;

        const res = await authFetch("/users", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const r = await res.json().catch(() => ({}));
        if (!res.ok || !r.ok) {
          conf.style.color = "#b00020";
          conf.textContent = res.status === 403
            ? "You don't have permission to add drivers."
            : (r.error || "Could not save driver.");
          return;
        }
        conf.style.color = "green";
        conf.textContent = "Driver saved successfully!";
      } catch (err) {
        conf.style.color = "#b00020";
        conf.textContent = "Network error — please try again.";
      }
    });
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCvcvG15HB6XBJBbnHifjL8jZtsSE5m0i4&callback=initMap" async defer></script>
</body>
</html>
