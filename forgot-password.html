<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js?v=2"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Mostlane Portal</title>
  <style>
    body { font-family:"Segoe UI",sans-serif; background:#e6e8eb url('Mostlane_Embossed.png') no-repeat center center fixed; background-size:180%; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
    .box { background:rgba(255,255,255,.7); padding:30px 25px; border-radius:10px; box-shadow:0 0 20px rgba(0,0,0,.1); width:90%; max-width:340px; text-align:center; }
    .box img { height:54px; margin-bottom:16px; }
    h2 { color:#003366; font-size:18px; margin:0 0 8px; }
    p.lead { font-size:13px; color:#555; margin:0 0 14px; }
    input { box-sizing:border-box; width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:6px; font-size:14px; }
    button { background:#0066cc; color:#fff; padding:12px; width:100%; border:none; border-radius:6px; font-size:16px; cursor:pointer; }
    .msg { font-size:14px; margin-top:12px; min-height:18px; }
    .msg.err { color:#b00020; } .msg.ok { color:#0c7d27; }
    a { display:block; margin-top:14px; font-size:14px; color:#0066cc; text-decoration:none; }
  </style>
</head>
<body>
  <div class="box">
    <img src="mostlane-logo.jpg" alt="Mostlane" />
    <h2>Reset your password</h2>
    <p class="lead">Enter your username or email and we'll send you a reset link.</p>
    <form id="form">
      <input type="text" id="ident" placeholder="Username or email" required />
      <button type="submit">Send reset link</button>
      <p id="msg" class="msg"></p>
    </form>
    <a href="login.html">Back to sign in</a>
  </div>
  <script>
    const API = window.MOSTLANE_API;
    const msg = document.getElementById("msg");
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.className = "msg"; msg.textContent = "Sending…";
      const ident = document.getElementById("ident").value.trim();
      try {
        const res = await fetch(API + "/auth/forgot-password", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: ident, email: ident })
        });
        const r = await res.json().catch(() => ({}));
        msg.className = "msg ok";
        msg.textContent = r.message || "If that account exists, a reset link has been sent.";
      } catch (err) {
        msg.className = "msg err"; msg.textContent = "Network error — is the portal URL configured?";
      }
    });
  </script>
</body>
</html>
