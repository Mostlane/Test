<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js?v=2"></script>
  <meta charset="UTF-8">
  <title>Mostlane • My Jobs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="auth.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    :root{
      --brand:#003b82;
      --accent:#1766ff;
      --accent-press:#0f52d6;
      --ml-bg:#eff3f8;
      --panel:#ffffff;
      --text:#0e1728;
      --muted:#8a94a6;
      --muted-2:#4a5568;
      --border:#e2e7ef;
      --chip:#eef2f8;
      --chip-ink:#41506a;
      --ok:#15803d;   --ok-bg:#e7f7ec;
      --warn:#b45309;  --warn-bg:#fdf1e0;
      --bad:#d11f2d;   --bad-bg:#fdebed;
      --radius:16px;
      --tap:54px;
      --shadow:0 6px 18px rgba(14,23,40,.07), 0 1px 3px rgba(14,23,40,.05);
    }
    html{background:var(--ml-bg);}
    *{box-sizing:border-box;}
    html,body{
      margin:0;padding:0;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:transparent;
      -webkit-font-smoothing:antialiased;
    }
    .shell{ max-width:560px; margin:0 auto; padding:0 14px 40px; }
    .card{ background:transparent; }

    header.main-header{
      position:sticky; top:0; z-index:20;
      display:flex; justify-content:space-between; align-items:center; gap:12px;
      padding:14px 16px; margin:0 -14px 14px;
      background:var(--panel); border-bottom:1px solid var(--border);
    }
    header h1{ margin:0; font-size:22px; letter-spacing:-.02em; color:var(--brand); }
    header .sub{ font-size:12.5px; color:var(--muted); margin-top:1px; }

    .btn{
      border-radius:12px; padding:0 14px; min-height:44px; font-size:14px;
      border:1px solid var(--border); background:#fff; cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      text-decoration:none; color:var(--muted-2); font-weight:650; white-space:nowrap;
      user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; touch-action:manipulation;
    }
    .btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 4px 12px rgba(23,102,255,.30); }
    .btn.primary:active{ background:var(--accent-press); transform:translateY(1px); }
    .icon-btn{
      width:46px; height:46px; padding:0; border-radius:13px; border:1px solid var(--border);
      background:#fff; color:var(--muted-2); font-size:20px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; touch-action:manipulation;
    }
    .content{ padding:0; }

    /* === Controls === */
    .nav-row{ display:flex; gap:10px; margin-bottom:8px; }
    .nav-row .btn{ flex:1; min-height:48px; font-size:14.5px; }
    .older-btn{
      width:100%; min-height:46px; margin-bottom:14px;
      border-radius:13px; border:1px dashed #cdd6e3; background:transparent;
      color:var(--muted); font-size:14px; font-weight:650; cursor:pointer; touch-action:manipulation;
    }
    .hint{ text-align:center; font-size:11px; color:var(--muted); margin:4px 0 12px; }

    /* === Day groups === */
    .day-group{ margin-top:6px; }
    .day-banner{
      position:sticky; top:72px; z-index:10;
      display:flex; align-items:baseline; gap:8px;
      background:var(--ml-bg); padding:9px 4px; margin:14px 0 10px;
      font-size:16px; font-weight:800; letter-spacing:-.01em; color:var(--text);
    }
    .day-banner .d-count{ font-size:13px; font-weight:650; color:var(--muted); }
    .day-banner.today::after{
      content:"TODAY"; font-size:10.5px; font-weight:800; letter-spacing:.08em;
      color:#fff; background:var(--accent); padding:2px 8px; border-radius:999px; align-self:center;
    }

    /* === Job card === */
    .job-card{
      position:relative; background:var(--panel); border:1px solid var(--border);
      border-radius:var(--radius); box-shadow:var(--shadow);
      padding:15px 16px 15px 19px; margin-bottom:12px; overflow:hidden;
    }
    .job-card::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:7px; background:var(--strip,var(--border)); }
    .job-card.strip-ok{--strip:var(--ok);}
    .job-card.strip-warn{--strip:var(--warn);}
    .job-card.strip-bad{--strip:var(--bad);}
    .job-card.strip-done{--strip:#b9c2d0;}
    .job-card.strip-none{--strip:#cbd5e5;}

    .job-card.job-flash{ animation:mlJobFlash 1s ease-in-out 0s 4; scroll-margin-top:150px; }
    @keyframes mlJobFlash{
      0%,100%{ box-shadow:var(--shadow); }
      50%    { box-shadow:0 0 0 4px rgba(23,102,255,.55), 0 8px 22px rgba(23,102,255,.35); }
    }
    @media (prefers-reduced-motion:reduce){
      .job-card.job-flash{ animation:none; box-shadow:0 0 0 4px rgba(23,102,255,.55); }
    }

    .job-top{ display:flex; align-items:center; gap:8px; margin-bottom:9px; }
    .job-top .grow{ flex:1; }
    .ref{
      font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:12px; font-weight:600;
      color:var(--muted); background:var(--chip); padding:3px 9px; border-radius:8px; display:inline-block;
    }
    .priority-badge{ font-size:11.5px; font-weight:800; letter-spacing:.03em; padding:4px 10px; border-radius:999px; display:inline-flex; align-items:center; }
    .p1{background:var(--bad-bg);color:var(--bad);}
    .p2{background:var(--warn-bg);color:var(--warn);}
    .p3{background:var(--ok-bg);color:var(--ok);}
    .p4{background:var(--chip);color:var(--muted-2);}

    .job-site{ font-size:20px; font-weight:750; letter-spacing:-.02em; line-height:1.22; color:var(--text); }
    .job-addr{ font-size:13.5px; color:var(--muted); margin-top:3px; }
    .job-desc{ font-size:14.5px; color:var(--muted-2); margin-top:9px; }

    .job-meta{ display:flex; flex-wrap:wrap; gap:7px; margin-top:12px; align-items:center; }
    .sla-badge{
      border-radius:999px; padding:6px 11px; font-size:12.5px; font-weight:650;
      display:inline-flex; align-items:center; gap:5px;
      font-variant-numeric:tabular-nums; white-space:nowrap;
    }
    .sla-green{background:var(--ok-bg);color:var(--ok);}
    .sla-amber{background:var(--warn-bg);color:var(--warn);}
    .sla-red{background:var(--bad-bg);color:var(--bad);}
    .sla-none{background:var(--chip);color:var(--chip-ink);}

    .status-pill{
      border-radius:999px; padding:6px 11px; font-size:12.5px; font-weight:650;
      display:inline-flex; align-items:center; gap:5px; background:var(--chip); color:var(--chip-ink);
    }
    .status-open{background:#e7f2ff;color:#1256b8;}
    .status-overdue{background:var(--bad-bg);color:var(--bad);}
    .status-complete{background:var(--chip);color:var(--muted-2);}

    /* actions */
    .job-actions{ display:flex; gap:10px; margin-top:14px; }
    .act{
      min-height:var(--tap); border-radius:14px; font-size:16px; font-weight:750;
      display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
      border:1px solid var(--border); background:#fff; color:var(--text); text-decoration:none;
      touch-action:manipulation;
    }
    .act.dir{ flex:0 0 auto; padding:0 18px; font-size:22px; color:var(--muted-2); }
    .act.open{
      flex:1; background:var(--accent); border-color:var(--accent); color:#fff; letter-spacing:-.01em;
      box-shadow:0 4px 12px rgba(23,102,255,.30);
    }
    .act.open:active{ background:var(--accent-press); transform:translateY(1px); }
    .act:focus-visible{ outline:3px solid rgba(23,102,255,.45); outline-offset:2px; }

    .small{font-size:11px;}
    .muted{color:var(--muted);}

    /* === Modal === */
    .modal-backdrop{
      position:fixed; inset:0; background:rgba(14,23,40,.5);
      display:none; align-items:center; justify-content:center; padding:16px; z-index:9999;
    }
    .modal-card{
      width:min(520px,100%); background:#fff; border:1px solid var(--border);
      border-radius:var(--radius); box-shadow:0 18px 44px rgba(0,0,0,.22); padding:16px;
    }
    .modal-title{ margin:0 0 6px; font-size:17px; color:var(--brand); }
    .modal-sub{ margin:0 0 12px; font-size:12.5px; color:var(--muted); }
    .modal-actions{ display:flex; gap:8px; flex-wrap:wrap; }
    .modal-actions .btn{ flex:1 1 140px; }
    .btn.danger{ background:#fff; border-color:#ef4444; color:#b91c1c; }
  </style>
</head>

<body>
<div class="shell">
  <div class="card">
    <header class="main-header">
      <div>
        <h1>My Jobs</h1>
        <div class="sub" id="userLabel">Engineer</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <a class="btn" id="adminDashBtn" href="sla-main.html" style="display:none;">📋 Dashboard</a>
        <a class="btn" id="adminSchedBtn" href="sla-scheduler.html" style="display:none;">🗓️ Scheduler</a>
        <button type="button" class="icon-btn" id="dayMapBtn" title="Today's map" aria-label="Today's map">🗺️</button>
        <a class="ml-back" data-role="home" href="main.html">← Menu</a>
      </div>
    </header>

    <div class="content">
<div id="blockedBanner" style="display:none;margin-bottom:12px;padding:12px 14px;border-radius:12px;background:#fef2f2;border:1px solid #fca5a5;color:#b91c1c;font-size:14px;"></div>
<div id="dayBar" style="display:none;margin-bottom:12px;"></div>
<div id="unschedBox" style="display:none;margin-bottom:14px;"></div>
<div class="nav-row">
  <button type="button" class="btn" id="prevWeekBtn">← Previous week</button>
  <button type="button" class="btn" id="nextWeekBtn">Next week →</button>
</div>
<button type="button" class="older-btn" id="olderBtn">↓ Load older jobs (30 / 60 / 90 days)</button>

      <div id="jobsTimeline"></div>

      <div id="statusBar" class="muted small" style="text-align:center;padding:12px">
        Loading jobs…
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="rangeModal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="modal-card">
    <h3 class="modal-title">Load job history</h3>
    <p class="modal-sub">Choose a range to load. Jobs are grouped by date.</p>
    <div class="modal-actions">
      <button type="button" class="btn" id="load30Btn">Last 30 days</button>
      <button type="button" class="btn" id="load60Btn">Last 60 days</button>
      <button type="button" class="btn" id="load90Btn">Last 90 days</button>
      <button type="button" class="btn danger" id="closeModalBtn">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="vcModal" role="dialog" aria-modal="true" style="display:none;align-items:center;justify-content:center;">
  <div class="modal-card" style="max-width:430px;width:calc(100% - 32px);max-height:85vh;overflow:auto;text-align:left;">
    <h3 class="modal-title">Weekly vehicle check</h3>
    <p class="modal-sub">Quick walkaround — tick each item that's OK.</p>
    <div id="vcItems"></div>
    <label style="display:flex;align-items:center;gap:8px;margin-top:12px;font-weight:700;">
      <input type="checkbox" id="vc_safe"> Vehicle is safe &amp; roadworthy to drive
    </label>
    <textarea id="vc_note" placeholder="Note any defects…" style="width:100%;box-sizing:border-box;margin-top:8px;min-height:60px;"></textarea>
    <div id="vcMsg" style="color:#b91c1c;font-size:13px;margin-top:6px;"></div>
    <div class="modal-actions" style="margin-top:12px;">
      <button type="button" class="btn primary" id="vcSubmit">Submit check</button>
    </div>
  </div>
</div>

<div id="dayMapOverlay" style="position:fixed;inset:0;background:#fff;z-index:8000;display:none;flex-direction:column;">
  <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid #e5e7eb;background:#f9fafb;">
    <h3 style="margin:0;font-size:16px;color:#003b82;flex:1;">🗺️ Today's jobs</h3>
    <button type="button" class="btn" id="dayMapClose">✕ Close</button>
  </div>
  <div id="dayMap" style="flex:1;"></div>
  <div id="dayMapNote" style="font-size:11px;color:#6b7280;padding:4px 12px;background:#f9fafb;border-top:1px solid #e5e7eb;">Tap a pin to open the job.</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SLA_API = "https://mostlane-sla.jamie-def.workers.dev";

let countdownTimerId = null;
const dayJobsCache = {};   // dateStr -> jobs[] (feeds the map)

/* Google Maps directions from wherever the engineer currently is.
   Postcode/address first — sat-navs handle postcodes best. */
function dirUrl(job){
  const pc = String(job.postcode || "").replace(/\*+$/,"").trim();
  const dest = [job.address, pc].filter(Boolean).join(", ")
    || ((job.lat != null && job.lon != null && (job.lat || job.lon)) ? `${job.lat},${job.lon}` : "");
  if(!dest) return "";
  return "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(dest) + "&travelmode=driving";
}

/* Postcode → map pin (postcodes.io, cached on the device). */
const GEO_KEY = "mlPostcodeGeo_v1";
let geoCache = {};
try{ geoCache = JSON.parse(localStorage.getItem(GEO_KEY)) || {}; }catch{ geoCache = {}; }
const PC_RE = /\b[A-Z]{1,2}\d[A-Z\d]?\s*\d[A-Z]{2}\b/i;
function jobPostcode(job){
  let pc = String(job.postcode || "").replace(/\*+$/,"").trim();
  if(!pc){
    const m = PC_RE.exec(job.address || "");   // fish it out of the address text
    if(m) pc = m[0];
  }
  return pc.toUpperCase().replace(/\s+/g," ");
}
async function geocodePostcodes(pcs){
  const todo = [...new Set(pcs.filter(pc => pc && geoCache[pc] === undefined))];
  for(let i = 0; i < todo.length; i += 100){
    const batch = todo.slice(i, i + 100);
    try{
      const res = await fetch("https://api.postcodes.io/postcodes", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ postcodes: batch })
      });
      const data = await res.json();
      (data.result || []).forEach(r => {
        geoCache[(r.query || "").toUpperCase()] =
          (r.result && isFinite(r.result.latitude)) ? [r.result.latitude, r.result.longitude] : null;
      });
    }catch(e){}
  }
  try{ localStorage.setItem(GEO_KEY, JSON.stringify(geoCache)); }catch{}
}
function jobCoords(job){
  const pc = jobPostcode(job);
  if(pc && Array.isArray(geoCache[pc])) return geoCache[pc];
  const lat = Number(job.lat), lon = Number(job.lon);
  if(isFinite(lat) && isFinite(lon) && (lat || lon)) return [lat, lon];
  return null;
}

let anchorDate = new Date();
let loadedDates = new Set();
let loadedRanges = new Set();
let loading = false;

const $ = id => document.getElementById(id);

function getEngineer(){
  return sessionStorage.getItem("mostlaneUser") ||
         sessionStorage.getItem("mostlaneUsername") ||
         sessionStorage.getItem("username") || "";
}

function parseDate(v){
  if(!v) return null;
  const d = new Date(v);
  return isNaN(d) ? null : d;
}

function computeSlaCountdown(targetISO){
  if(!targetISO){
    return {text:"—", cls:"sla-badge sla-none", status:"none"};
  }
  const now = new Date();
  const target = parseDate(targetISO);
  if(!target){
    return {text:"—", cls:"sla-badge sla-none", status:"none"};
  }

  let diff = target - now;
  const overdue = diff < 0;
  if(overdue) diff = -diff;

  const secs = Math.floor(diff/1000);
  const days = Math.floor(secs/86400);
  const hours = Math.floor((secs%86400)/3600);
  const mins = Math.floor((secs%3600)/60);

  let label = overdue ? "+" : "";
  if(days>0){
    label += `${days}d ${String(hours).padStart(2,"0")}h`;
  } else {
    label += `${String(hours).padStart(2,"0")}:${String(mins).padStart(2,"0")}`;
  }

  const hoursLeft = (target - now) / 3600000;
  let cls = "sla-badge sla-green";
  let status = "ok";

  if(overdue || hoursLeft <= 0){
    cls = "sla-badge sla-red";
    status = "overdue";
  } else if(hoursLeft <= 1){
    cls = "sla-badge sla-red";
    status = "overdueSoon";
  } else if(hoursLeft <= 4){
    cls = "sla-badge sla-amber";
    status = "warn";
  }

  return {
    text: (overdue ? "Overdue " : "Due in ") + label,
    cls,
    status
  };
}

function statusClass(status, slaStatus){
  const s = (status || "").toLowerCase();
  if(s.includes("complete") || s.includes("closed")){
    return "status-pill status-complete";
  }
  if(slaStatus === "overdue" || slaStatus === "overdueSoon"){
    return "status-pill status-overdue";
  }
  return "status-pill status-open";
}
// Priority "Priority 2" / "P2" / 2 → p2 class + P2 label (defaults P4).
function prioClass(p){ const m = String(p == null ? "" : p).match(/([1-4])/); return m ? "p"+m[1] : "p4"; }
function prioLabel(p){ const m = String(p == null ? "" : p).match(/([1-4])/); return m ? "P"+m[1] : "P4"; }
// Left-edge urgency stripe class for a card: done/overdue/soon/ok/none.
function stripClass(status, slaStatus){
  const s = (status || "").toLowerCase();
  if(s.includes("complete") || s.includes("closed") || s.includes("invoiced")) return "strip-done";
  if(slaStatus === "overdue" || slaStatus === "overdueSoon") return "strip-bad";
  if(slaStatus === "warn") return "strip-warn";
  if(slaStatus === "none") return "strip-none";
  return "strip-ok";
}
// Big card markup shared by the day timeline and the "not booked in" box.
function jobCardInner(job, slaInfo, target){
  const site = escH(job.siteName || job.address || job.description || "Job");
  const addrBits = [job.address, String(job.postcode||"").replace(/\*+$/,"").trim()]
    .map(x => String(x||"").trim()).filter(Boolean);
  const addr = escH([...new Set(addrBits)].join(" · "));
  const desc = escH(job.description || "");
  const dir = dirUrl(job);
  return `
      <div class="job-top">
        <span class="ref">${escH(job.helpdeskRef || job.id)}</span>
        <span class="grow"></span>
        <span class="priority-badge ${prioClass(job.priority)}">${prioLabel(job.priority)}</span>
      </div>
      <div class="job-site">${site}</div>
      ${addr ? `<div class="job-addr">${addr}</div>` : ""}
      ${desc && desc !== site ? `<div class="job-desc">${desc}</div>` : ""}
      <div class="job-meta">
        <span class="${slaInfo.cls}" data-sla-target="${target || ""}">${slaInfo.text}</span>
        <span class="${statusClass(job.status, slaInfo.status)}">${escH(job.status || "Open")}</span>
      </div>
      <div class="job-actions">
        ${dir ? `<a class="act dir" href="${dir}" target="_blank" rel="noopener" aria-label="Directions">🧭</a>` : ""}
        <a class="act open" href="job-view.html?jobId=${encodeURIComponent(job.id)}">Open job →</a>
      </div>`;
}

function isoDate(d){
  return d.toISOString().slice(0,10);
}

function startOfWeek(d){
  const date = new Date(d);
  date.setHours(0,0,0,0);
  const day = date.getDay() || 7;
  if(day !== 1) date.setDate(date.getDate() - (day - 1));
  return date;
}
function endOfWeek(d){
  const s = startOfWeek(d);
  const e = new Date(s);
  e.setDate(e.getDate() + 6);
  e.setHours(0,0,0,0);
  return e;
}
function addDays(d, n){
  const x = new Date(d);
  x.setDate(x.getDate() + n);
  return x;
}
function endOfToday(){
  const d = new Date();
  d.setHours(23,59,59,999);
  return d;
}
function renderDay(dateStr, jobs, mode){
  const container = $("jobsTimeline");

  const group = document.createElement("div");
  group.className = "day-group";

  const banner = document.createElement("div");
  const isToday = dateStr === isoDate(new Date());
  banner.className = "day-banner" + (isToday ? " today" : "");
  const label = new Date(dateStr).toLocaleDateString("en-GB", {
    weekday:"short", day:"2-digit", month:"short"
  });
  banner.innerHTML = `<span>${escH(label)}</span>` +
    (jobs.length ? `<span class="d-count">${jobs.length} job${jobs.length===1?"":"s"}</span>` : "");

  group.appendChild(banner);

  if(!jobs.length){
    const empty = document.createElement("div");
    empty.className = "muted small";
    empty.style.padding = "2px 4px 6px";
    empty.textContent = "No jobs";
    group.appendChild(empty);
  }

  for(const job of jobs){
    const target = job.targetAt || job.sla?.targetAt;
    const slaInfo = computeSlaCountdown(target);

    const card = document.createElement("div");
    card.className = "job-card " + stripClass(job.status, slaInfo.status);
    card.dataset.jobId = job.id;
    card.innerHTML = jobCardInner(job, slaInfo, target);
    group.appendChild(card);
  }

  if(mode === "prepend"){
    container.prepend(group);
  }else{
    container.appendChild(group);
  }
}

async function loadDay(dateObj, mode){
  const engineer = getEngineer();
  if(!engineer){
    $("statusBar").textContent = "No logged-in engineer.";
    return;
  }

  const dateStr = isoDate(dateObj);
  if(loadedDates.has(dateStr)) return;

  try{
    const res = await fetch(
      `${SLA_API}/jobs/for-engineer?engineer=${encodeURIComponent(engineer)}&date=${encodeURIComponent(dateStr)}`,
      { cache:"no-store" }
    );
    const list = await res.json();

    dayJobsCache[dateStr] = Array.isArray(list) ? list : [];
    renderDay(dateStr, Array.isArray(list) ? list : [], mode);
    loadedDates.add(dateStr);
    startCountdownLoop();
  }catch(err){
    console.error(err);
    $("statusBar").textContent = "Error loading jobs.";
  }
}

async function loadWeek(direction){
  if(loading) return;
  loading = true;

  try{
const base = new Date(anchorDate);
base.setDate(base.getDate() + (direction * 7));

const maxAllowedWeek = endOfWeek(addDays(anchorDate, 7));

if (direction > 0 && startOfWeek(base) > maxAllowedWeek) {
  $("statusBar").textContent = "Cannot load further future weeks.";
  return;
}

/* ===== END GUARD ===== */
    const from = startOfWeek(base);
    const to = endOfWeek(base);

    const rangeKey = `${isoDate(from)}:${isoDate(to)}`;
    if(loadedRanges.has(rangeKey)){
      $("statusBar").textContent = "Week already loaded.";
      return;
    }

    $("statusBar").textContent = "Loading week…";

    const days = [];
    for(let i=0;i<7;i++) days.push(addDays(from, i));

    if(direction < 0){
      days.reverse();
      for(const d of days) await loadDay(d, "append");
    }else{
      for(const d of days) await loadDay(d, "prepend");
    }

    loadedRanges.add(rangeKey);
    anchorDate = base;
    $("statusBar").textContent = "Ready";
  }finally{
    loading = false;
  }
}

async function loadLastNDays(n){
  if(loading) return;
  loading = true;

  try{
    $("statusBar").textContent = `Loading last ${n} days…`;
    const today = new Date();
    today.setHours(0,0,0,0);

    for(let i=0;i<n;i++){
      const d = addDays(today, -i);
      await loadDay(d, "append");
    }

    $("statusBar").textContent = "Ready";
  }finally{
    loading = false;
  }
}

function startCountdownLoop(){
  if(countdownTimerId) clearInterval(countdownTimerId);

  const tick = () => {
    document.querySelectorAll(".sla-badge[data-sla-target]").forEach(el => {
      const iso = el.getAttribute("data-sla-target");
      const info = computeSlaCountdown(iso);
      el.textContent = info.text;
      el.className = info.cls;
      // keep the card's left urgency stripe in sync as the clock ticks
      const card = el.closest(".job-card");
      if(card){
        const statusTxt = (card.querySelector(".status-pill")?.textContent || "").trim();
        const strip = stripClass(statusTxt, info.status);
        card.classList.remove("strip-ok","strip-warn","strip-bad","strip-done","strip-none");
        card.classList.add(strip);
      }
    });
  };
  tick();
  countdownTimerId = setInterval(tick, 1000);
}

/* FIXED: Long-press that DOES NOT kill normal taps */
function addLongPress(el, onLongPress){
  let timer = null;

  const start = () => {
    timer = setTimeout(() => {
      timer = null;
      onLongPress();
    }, 3000);
  };
  const cancel = () => {
    if(timer){
      clearTimeout(timer);
      timer = null;
    }
  };

  el.addEventListener("pointerdown", start);
  el.addEventListener("pointerup", cancel);
  el.addEventListener("pointercancel", cancel);
  el.addEventListener("pointerleave", cancel);
}

/* ===== Story Mode: the guided day (clock on/off) ===== */
let todayShift = null;
function isStoryMode(){
  try { return JSON.parse(sessionStorage.getItem("mostlanePermissions")||localStorage.getItem("mostlanePermissions")||"{}").StoryMode === "Yes"; }
  catch { return false; }
}
function hasSLAAdmin(){
  try {
    const p = JSON.parse(sessionStorage.getItem("mostlanePermissions")||localStorage.getItem("mostlanePermissions")||"{}");
    return p.FullAccess === "Yes" || p.SLAAdmin === "Yes";
  } catch { return false; }
}
function todayLocal(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtTime(iso){ try { return new Date(iso).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}); } catch { return ""; } }
function getGps(){
  return new Promise(resolve => {
    if(!navigator.geolocation) return resolve("");
    navigator.geolocation.getCurrentPosition(
      p => resolve(`${p.coords.latitude.toFixed(5)},${p.coords.longitude.toFixed(5)}`),
      () => resolve(""),
      { timeout: 8000 }
    );
  });
}
async function loadShift(){
  const engineer = getEngineer();
  try {
    const res = await fetch(`${SLA_API}/shift/today?engineer=${encodeURIComponent(engineer)}&date=${todayLocal()}`, { cache:"no-store" });
    const data = await res.json();
    todayShift = data.shift || null;
  } catch { todayShift = null; }
}
/* ---- Weekly vehicle check (gates clock-on) ---- */
const VC_ITEMS = [
  "Tyres & pressures","Lights & indicators","Brakes",
  "Mirrors & glass","Fluid levels (oil/coolant/washer)","Bodywork / damage",
  "Load secured / racking","Dashboard warning lights",
  "First-aid kit & extinguisher present","Clean & tidy"
];
let vehicleCheckOnDone = null;
function getVehicle(){ return sessionStorage.getItem("mostlaneVehicle") || localStorage.getItem("mostlaneVehicle") || ""; }
function mondayOfWeek(d=new Date()){
  const x = new Date(d); const day = (x.getDay()+6)%7;          // Mon=0 … Sun=6
  x.setDate(x.getDate()-day); x.setHours(0,0,0,0);
  return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`;
}
function pastVehicleDeadline(){
  const now = new Date(), x = new Date(now), day = (x.getDay()+6)%7;
  const wed = new Date(x); wed.setDate(x.getDate()-day+2); wed.setHours(12,0,0,0);  // Wed 12:00 this week
  return now >= wed;
}
async function vehicleCheckStatus(){
  try {
    const res = await fetch(`${SLA_API}/vehicle-check?engineer=${encodeURIComponent(getEngineer())}&week=${mondayOfWeek()}`, { cache:"no-store" });
    const data = await res.json();
    if(data.check && data.check.checked_at) return "done";
  } catch {}
  return pastVehicleDeadline() ? "enforce" : "prompt";
}
function buildVcItems(){
  const host = $("vcItems"); if(!host) return;
  host.innerHTML = VC_ITEMS.map((label,i)=>
    `<label style="display:flex;align-items:center;gap:8px;margin:5px 0;font-size:14px;"><input type="checkbox" id="vc${i}"> ${label}</label>`).join("");
}
function openVehicleCheck(onDone){
  vehicleCheckOnDone = onDone || null;
  VC_ITEMS.forEach((_,i)=>{ const el=$("vc"+i); if(el) el.checked=false; });
  $("vc_safe").checked = false; $("vc_note").value = ""; $("vcMsg").textContent = "";
  $("vcModal").style.display = "flex";
}
async function submitVehicleCheck(){
  if(!$("vc_safe").checked){ $("vcMsg").textContent = "Tick 'safe to drive' to confirm (note any defects below)."; return; }
  const items = {}; VC_ITEMS.forEach((label,i)=>{ items[label] = $("vc"+i).checked; });
  try {
    await fetch(`${SLA_API}/vehicle-check`, { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ engineer:getEngineer(), week:mondayOfWeek(), vehicle:getVehicle(),
        safeToDrive:true, items, note:$("vc_note").value.trim() }) });
  } catch {}
  $("vcModal").style.display = "none";
  const cb = vehicleCheckOnDone; vehicleCheckOnDone = null;
  if(cb) cb();
}

async function clockOn(){
  const st = await vehicleCheckStatus();
  if(st === "enforce"){ openVehicleCheck(doClockOn); return; }   // must do it (past Wed 12:00)
  if(st === "prompt"){
    if(confirm("Your weekly vehicle check isn't done yet (due Wednesday lunchtime). Do it now?")){ openVehicleCheck(doClockOn); return; }
  }
  doClockOn();
}
async function doClockOn(){
  const engineer = getEngineer();
  const m = prompt("Start mileage on the van? (optional)");
  const startMileage = (m && !isNaN(+m)) ? Math.round(+m) : null;
  const gps = await getGps();
  await fetch(`${SLA_API}/shift/clock-on`, { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ engineer, gps, startMileage, date: todayLocal() }) });
  await loadShift(); renderDayBar(); applyDayGate();
}
async function clockOff(){
  const engineer = getEngineer();
  const m = prompt("End mileage on the van? (optional)");
  const endMileage = (m && !isNaN(+m)) ? Math.round(+m) : null;
  const fuel = prompt("Fuel added today? (£ or litres — optional)") || "";
  const gps = await getGps();
  await fetch(`${SLA_API}/shift/clock-off`, { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ engineer, gps, endMileage, fuel, date: todayLocal() }) });
  await loadShift(); renderDayBar(); applyDayGate();
}
function renderDayBar(){
  const bar = $("dayBar");
  if(!isStoryMode()){ bar.style.display="none"; return; }
  bar.style.display="block";
  const s = todayShift;
  if(!s || !s.clock_on_at){
    bar.innerHTML =
      `<div style="padding:16px;border-radius:12px;background:linear-gradient(90deg,#003b82,#1e66ff);color:#fff;text-align:center;">
         <div style="font-weight:700;font-size:16px;margin-bottom:10px;">⚡ Story Mode — start your day to see your jobs</div>
         <button class="btn" style="background:#fff;color:#003b82;font-weight:700;" onclick="clockOn()">▶ Start my day</button>
       </div>`;
  } else if(!s.clock_off_at){
    bar.innerHTML =
      `<div style="padding:12px 14px;border-radius:12px;background:#0e7a3b;color:#fff;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
         <div style="font-weight:700;">🟢 On shift since ${fmtTime(s.clock_on_at)}${s.start_mileage!=null?` · ${s.start_mileage} mi`:""}</div>
         <button class="btn" style="background:#fff;color:#0e7a3b;font-weight:700;" onclick="clockOff()">■ End my day</button>
       </div>`;
  } else {
    const mi = (s.start_mileage!=null && s.end_mileage!=null) ? (s.end_mileage - s.start_mileage) : null;
    bar.innerHTML =
      `<div style="padding:12px 14px;border-radius:12px;background:#374151;color:#fff;">
         <div style="font-weight:700;">✔ Day ended ${fmtTime(s.clock_off_at)}</div>
         <div style="font-size:13px;opacity:.9;margin-top:2px;">On ${fmtTime(s.clock_on_at)} → Off ${fmtTime(s.clock_off_at)}${mi!=null?` · ${mi} miles`:""}${s.fuel?` · fuel ${s.fuel}`:""}</div>
       </div>`;
  }
}
function applyDayGate(){
  if(!isStoryMode()) return;            // normal users: no gating
  const onShift = !!(todayShift && todayShift.clock_on_at);
  $("jobsTimeline").style.display = onShift ? "" : "none";
  $("statusBar").style.display    = onShift ? "" : "none";
}

/* ===== Today's jobs as pins on a map ===== */
let dayMap = null, dayMapLayer = null;
const DAY_STATUS_COLOUR = {
  "Pending":"#9f1239","Scheduled":"#f59e0b","Travelling":"#3b82f6",
  "In Progress":"#9333ea","On Hold":"#6b7280","Quote":"#dc2626","Order":"#0d9488"
};
function escH(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
async function openDayMap(){
  $("dayMapOverlay").style.display = "flex";
  if(typeof L === "undefined"){
    $("dayMapNote").textContent = "⚠️ Map couldn't load — check your connection and try again.";
    return;
  }
  if(!dayMap){
    dayMap = L.map("dayMap");
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom:19, attribution:"© OpenStreetMap contributors" }).addTo(dayMap);
    dayMapLayer = L.layerGroup().addTo(dayMap);
  }
  const today = isoDate(new Date());
  let list = dayJobsCache[today];
  if(!list){
    try{
      const res = await fetch(`${SLA_API}/jobs/for-engineer?engineer=${encodeURIComponent(getEngineer())}&date=${today}`, { cache:"no-store" });
      list = await res.json();
      if(!Array.isArray(list)) list = [];
      dayJobsCache[today] = list;
    }catch{ list = []; }
  }
  $("dayMapNote").textContent = "Placing jobs by postcode…";
  await geocodePostcodes(list.map(jobPostcode));
  setTimeout(() => {
    dayMap.invalidateSize();
    dayMapLayer.clearLayers();
    const pts = [];
    let noLoc = 0;
    list.forEach(job => {
      const pt = jobCoords(job);
      if(!pt){ noLoc++; return; }
      const [lat, lon] = pt;
      const colour = DAY_STATUS_COLOUR[job.status] || "#2563eb";
      const m = L.circleMarker([lat, lon], { radius:9, color:"#fff", weight:2, fillColor:colour, fillOpacity:0.95 });
      m.bindPopup(`
        <div style="font-size:13px;min-width:180px;">
          <b style="color:#003b82;">${escH(job.helpdeskRef || job.id)}</b>
          <span style="display:inline-block;border-radius:999px;padding:1px 8px;color:#fff;font-size:11px;font-weight:600;background:${colour};margin-left:4px;">${escH(job.status||"")}</span><br>
          ${escH(job.description||"")}<br>
          <span style="color:#6b7280;">${escH(job.siteName||job.address||"")}</span><br>
          ${job.scheduledAt ? "🗓 " + new Date(job.scheduledAt).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}) + "<br>" : ""}
          <a href="job-view.html?jobId=${encodeURIComponent(job.id)}" style="color:#1d4ed8;font-weight:600;">Open job →</a>
          ${dirUrl(job) ? ` · <a href="${dirUrl(job)}" target="_blank" rel="noopener" style="color:#1d4ed8;">Directions</a>` : ""}
        </div>`);
      m.addTo(dayMapLayer);
      pts.push([lat, lon]);
    });
    if(pts.length){
      dayMap.fitBounds(pts, { padding:[36,36], maxZoom:13 });
      $("dayMapNote").textContent = `${pts.length} job(s) today` + (noLoc ? ` · ${noLoc} with no usable postcode` : "") + ". Tap a pin to open the job.";
    }else{
      dayMap.setView([51.27,-0.75], 9);
      $("dayMapNote").textContent = list.length ? "Today's jobs have no usable postcodes." : "No jobs scheduled today.";
    }
  }, 60);
}

/* ===== Assigned but not yet booked in (no date/time set) ===== */
/* The day timeline can only show jobs that HAVE a date — without this, a job
   assigned with no schedule time was invisible to its engineer. */
async function loadUnscheduled(){
  try{
    const res = await fetch(`${SLA_API}/jobs/for-engineer?engineer=${encodeURIComponent(getEngineer())}`, { cache:"no-store" });
    const list = await res.json();
    const open = (Array.isArray(list) ? list : []).filter(j =>
      !j.scheduledAt && !["Complete","Closed Jobs","Invoiced"].includes(j.status || ""));
    const box = $("unschedBox");
    if(!open.length){ box.style.display = "none"; box.innerHTML = ""; return; }
    box.style.display = "block";
    box.innerHTML = `<div class="day-banner"><span>📌 Assigned — not booked in</span><span class="d-count">${open.length} job${open.length===1?"":"s"}</span></div>`;
    for(const job of open){
      const target = job.targetAt || job.sla?.targetAt;
      const slaInfo = computeSlaCountdown(target);
      const card = document.createElement("div");
      card.className = "job-card " + stripClass(job.status, slaInfo.status);
      card.dataset.jobId = job.id;
      card.innerHTML = jobCardInner(job, slaInfo, target);
      box.appendChild(card);
    }
    startCountdownLoop();
  }catch(e){}
}

/* ===== Parked-without-info banner ===== */
function jobIsBlocking(j){
  if(j.status === "On Hold") return !(j.hold && j.hold.reason && j.hold.needs);
  if(j.status === "Quote")   return !(j.quote && j.quote.description && j.quote.reason && j.quote.materials);
  return false;
}
async function checkBlocked(){
  try{
    const res = await fetch(`${SLA_API}/jobs/for-engineer?engineer=${encodeURIComponent(getEngineer())}`, { cache:"no-store" });
    const list = await res.json();
    const blocking = (Array.isArray(list) ? list : []).find(jobIsBlocking);
    const banner = $("blockedBanner");
    if(blocking){
      const ref = escH(blocking.helpdeskRef || blocking.id);
      banner.innerHTML = `⚠️ <b>Job ${ref}</b> is <b>${escH(blocking.status)}</b> but is missing the required details. ` +
        `You can't start another job until it's completed. ` +
        `<a href="job-view.html?jobId=${encodeURIComponent(blocking.id)}" style="color:#b91c1c;font-weight:700;">Complete it now →</a>`;
      banner.style.display = "block";
    }else{
      banner.style.display = "none";
    }
  }catch{}
}

// A push notification links here as ?job=<id>. Once that job's card has been
// rendered (day loads + the unscheduled box are async), scroll it into view and
// pulse it so it's easy to spot. Polls briefly because the cards stream in.
function focusJobFromUrl(){
  let jid = null;
  try { jid = new URLSearchParams(location.search).get("job"); } catch (e) {}
  if(!jid) return;
  let tries = 0;
  const attempt = () => {
    const card = Array.from(document.querySelectorAll(".job-card"))
      .find(c => c.dataset.jobId === jid);
    if(card){
      card.scrollIntoView({ behavior:"smooth", block:"center" });
      card.classList.remove("job-flash");   // restart the animation if re-run
      void card.offsetWidth;
      card.classList.add("job-flash");
      setTimeout(() => card.classList.remove("job-flash"), 4500);
      return;
    }
    if(tries++ < 30) setTimeout(attempt, 300);   // ~9s of retries as jobs stream in
  };
  attempt();
}

function init(){
  const engineer = getEngineer();
  $("userLabel").textContent = engineer ? `Logged in as ${engineer}` : "Engineer";

  $("dayMapBtn").addEventListener("click", openDayMap);
  $("dayMapClose").addEventListener("click", () => { $("dayMapOverlay").style.display = "none"; });
  // Admin-only shortcuts to the SLA management areas — hidden for engineers
  // (SLA-only). The target pages also gate, so this is just clean navigation.
  if(hasSLAAdmin()){
    $("adminDashBtn").style.display = "inline-flex";
    $("adminSchedBtn").style.display = "inline-flex";
  }
  checkBlocked();
  loadUnscheduled();

  buildVcItems();
  $("vcSubmit").addEventListener("click", submitVehicleCheck);

  // Story Mode: the guided day lives on my-day.html — this page is job history.
  if(isStoryMode()){
    $("dayBar").style.display = "block";
    $("dayBar").innerHTML =
      `<a href="my-day.html" style="display:block;text-decoration:none;padding:14px;border-radius:12px;background:linear-gradient(90deg,#003b82,#1e66ff);color:#fff;text-align:center;font-weight:700;">
         ⚡ Open My Day — start &amp; work your day here →
       </a>`;
  }

  const prevBtn = $("prevWeekBtn");
  const nextBtn = $("nextWeekBtn");

  // Tap = week navigation (guaranteed to fire)
  prevBtn.addEventListener("click", () => loadWeek(-1));
  nextBtn.addEventListener("click", () => loadWeek(+1));

  // Visible "older jobs" button opens the range modal (30/60/90).
  const olderBtn = $("olderBtn");
  if(olderBtn) olderBtn.addEventListener("click", openModal);
  // Hold (3s) on the week buttons still opens it too (kept for muscle memory).
  addLongPress(prevBtn, openModal);
  addLongPress(nextBtn, openModal);

  // Modal actions
  $("load30Btn").addEventListener("click", async () => { closeModal(); await loadLastNDays(30); });
  $("load60Btn").addEventListener("click", async () => { closeModal(); await loadLastNDays(60); });
  $("load90Btn").addEventListener("click", async () => { closeModal(); await loadLastNDays(90); });
  $("closeModalBtn").addEventListener("click", closeModal);

  $("rangeModal").addEventListener("click", (e) => {
    if(e.target && e.target.id === "rangeModal") closeModal();
  });

  // Initial load: current week (newest first so today is near the top)
  (async () => {
    $("statusBar").textContent = "Loading this week…";
    anchorDate = new Date();

    const from = startOfWeek(anchorDate);
    const to = endOfWeek(anchorDate);
    const rangeKey = `${isoDate(from)}:${isoDate(to)}`;

    const days = [];
    for(let i=0;i<7;i++) days.push(addDays(from, i));
    days.reverse();

    loading = true;
    try{
      for(const d of days) await loadDay(d, "append");
      loadedRanges.add(rangeKey);
      $("statusBar").textContent = "Ready";
    }finally{
      loading = false;
    }
  })();

  // If we arrived from a "new job" push (?job=…), find that card and pulse it.
  focusJobFromUrl();
}

window.addEventListener("DOMContentLoaded", init);
</script>
