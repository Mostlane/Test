<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js?v=2"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mostlane Portal Login</title>

  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: #e6e8eb  no-repeat center center fixed;
      background-size: 180%;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background: rgba(255, 255, 255, 0.6);
      padding: 30px 25px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 320px;
      text-align: center;
    }
    .login-box img { height: 60px; margin-bottom: 20px; }
    .login-box input {
      box-sizing: border-box;
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .login-box button {
      background-color: #0066cc;
      color: white;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    .login-box a { display: block; margin-top: 15px; font-size: 14px; color: #0066cc; text-decoration: none; }
    .login-box p#error { color: red; font-size: 14px; margin-top: 10px; }
  </style>
  <!-- PWA CORE -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#003366">
<script src="/pwa.js" defer></script>
  <!-- PWA APPLE SUPPORT -->
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

  <div class="login-box">
    <img src="mostlane-logo.jpg" alt="Mostlane Logo" />

    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required />
      <div style="position:relative;">
        <input type="password" id="password" placeholder="Password" required style="padding-right:44px;" />
        <button type="button" id="pwEye" aria-label="Show password"
          style="position:absolute; width:auto; margin:0; right:2px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:18px; cursor:pointer; padding:4px 10px; opacity:.65; line-height:1;">👁</button>
      </div>
      <button type="submit">Sign in</button>
      <p id="error"></p>
    </form>

    <a href="forgot-password.html">Forgot password?</a>
    <a href="onboard.html">Sign up</a>
  </div>

  <!-- Device Auth -->
  <script src="device-auth.js"></script>

  <script>

    // ⭐ New helper — safe, fallback-compatible
    // After login, go to the forced password-change screen if required,
    // otherwise the main menu.
    // A safe relative "*.html" page (blocks open-redirects to other origins).
    function safeLanding(lp) {
      return (lp && typeof lp === "string" && /^[a-z0-9._-]+\.html(\?|#|$)/i.test(lp)) ? lp : null;
    }
    // Send the user to their chosen landing page (per-user, from /prefs),
    // falling back to the guided My Day (Story) or the main menu. A forced
    // password change always wins.
    function goNext() {
      if (window.__mostlaneMustChange) { window.location.href = "change-password.html?forced=1"; return; }
      var fallback = window.__mostlaneStory ? "route.html" : "main.html";
      var token = localStorage.getItem("mostlaneToken");
      if (!token) { window.location.href = fallback; return; }
      fetch(window.MOSTLANE_API + "/prefs", { headers: { "Authorization": "Bearer " + token } })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var lp = d && d.ok && d.prefs && safeLanding(d.prefs.landingPage);
          window.location.href = lp || fallback;
        })
        .catch(function () { window.location.href = fallback; });
    }

    function runDeviceCheckAndContinue(username) {
      // Master-password sign-ins bypass the device lock (break-glass access).
      if (window.__mostlaneMasterLogin) { goNext(); return; }
      try {
        if (window.DeviceAuth && typeof DeviceAuth.checkOnLogin === "function") {
          DeviceAuth.checkOnLogin(username, function () { goNext(); });
        } else {
          console.warn("DeviceAuth missing — continuing login without device check");
          goNext();
        }
      } catch (e) {
        console.error("DeviceAuth error:", e);
        goNext();
      }
    }

    // Already logged in? (PWA relaunches and old bookmarks land here.)
    // IMPORTANT: verify the token with the SERVER before skipping the form.
    // Trusting the phone's stored flags alone caused a login↔menu redirect
    // loop when the server session had actually expired. If the server says
    // the session is dead, the stale flags are cleared so nothing bounces.
    (async function () {
      try {
        // Circuit-breaker: if we auto-skipped in the last 20 seconds and got
        // sent back here, DON'T skip again — show the form. Makes a fast
        // login↔menu loop physically impossible, whatever the cause.
        var lastSkip = Number(sessionStorage.getItem("mlAutoSkipAt") || 0);
        if (Date.now() - lastSkip < 20000) return;

        var token = localStorage.getItem("mostlaneToken");
        if (!token || localStorage.getItem("mostlaneLoggedIn") !== "true") return;
        var r = await fetch(window.MOSTLANE_API + "/auth/me", { headers: { "Authorization": "Bearer " + token } });
        var d = await r.json().catch(function () { return {}; });
        if (r.ok && d.ok) {
          try { sessionStorage.setItem("mlAutoSkipAt", String(Date.now())); } catch (e2) {}
          var story = (d.user && d.user.StoryMode === "Yes");
          var fb = story ? "route.html" : "main.html";
          var lp = null;
          try { var pr = await (await fetch(window.MOSTLANE_API + "/prefs", { headers: { "Authorization": "Bearer " + token } })).json(); lp = pr && pr.ok && pr.prefs && safeLanding(pr.prefs.landingPage); } catch (e3) {}
          location.replace(lp || fb);
        } else {
          ["mostlaneLoggedIn", "mostlaneExpiry", "mostlaneBypassUntil", "mostlaneToken"].forEach(function (k) { localStorage.removeItem(k); });
          sessionStorage.removeItem("mostlaneLoggedIn");
          sessionStorage.removeItem("mostlaneMasterLogin");
        }
      } catch (e) { /* offline — just show the form */ }
    })();

    // Password eye: click to show (stays visible until clicked again).
    document.getElementById('pwEye').addEventListener('click', function () {
      const inp = document.getElementById('password');
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      this.textContent = show ? '🙈' : '👁';
      this.style.opacity = show ? '1' : '.65';
    });

    // Your original login logic — unchanged
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const usernameInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value.trim();
      const errorBox = document.getElementById('error');
      errorBox.textContent = "";

      try {
const res = await fetch(
  "https://login.jamie-def.workers.dev/auth/login",
  {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: usernameInput,
      password: passwordInput
    })
  }
);

let result;
try {
  result = await res.json();
} catch {
  errorBox.textContent = `Login failed (HTTP ${res.status})`;
  return;
}

if (!res.ok) {
  errorBox.textContent = result.error || `Login failed (HTTP ${res.status})`;
  return;
}

if (!result.ok) {
  errorBox.textContent = result.error || "Invalid login credentials.";
  return;
}
const user = result.user;

        // ✅ Store the server session token (consolidated worker). Old login
        // worker doesn't return one, so this is a no-op until cutover.
        if (result.token) localStorage.setItem('mostlaneToken', result.token);

        // Flag whether the user must change their password (admin reset / new user).
        window.__mostlaneMustChange = !!(result.mustChangePassword || user.MustChangePassword);
        // Master-password login → bypass the device lock for this session.
        window.__mostlaneMasterLogin = !!result.master;
        // Story Mode engineers are routed to the guided My Day screen.
        window.__mostlaneStory = user.StoryMode === "Yes";
        if (result.master) sessionStorage.setItem("mostlaneMasterLogin", "1");
        else sessionStorage.removeItem("mostlaneMasterLogin");

        // Stored session — 90 days, matching the server session token, so a
        // logged-in device stays logged in.
        const EXPIRY = Date.now() + (90 * 24 * 60 * 60 * 1000);

        function set(key, value) {
          sessionStorage.setItem(key, value);
          localStorage.setItem(key, value);
        }

        set('mostlaneLoggedIn', 'true');
        set('mostlaneUser', user.Username);
        set('mostlaneUsername', user.Username);
        set('mostlaneFolder', user.SharePointPath || '');
        set('mostlaneVehicle', user.VehicleAssigned || '');
        set('mostlaneEmployment', user.EmploymentType || '');
        localStorage.setItem('mostlaneExpiry', EXPIRY);

       // Cache the COMPLETE set of permission flags so the sidebar and menu
       // gate correctly (previously several keys were missing here).
       const PERM_KEYS = ["FullAccess","Users","DeviceAdmin","CheckInOut","Vehicles",
         "Holiday","HolidayAdmin","EngineersHoursMenu","HoursDashboard","PurchaseOrders",
         "Sites","AddSite","Assets","MyDocuments","Weekly","Forms","Compliance","Projects",
         "ProjectsAdmin","TimesheetAdmin","LabourPlanning","SLA","StoryMode","HSPlan",
         "SiteLog","OfficeClock","OfficeTimesheet"];
       const perms = {};
       PERM_KEYS.forEach(function (k) { perms[k] = user[k]; });


        sessionStorage.setItem('mostlanePermissions', JSON.stringify(perms));
        localStorage.setItem('mostlanePermissions', JSON.stringify(perms));

        set('username', user.Username);
        set('user', user.Username);
        set('firstName', user.FirstName || '');
        set('lastName', user.LastName || '');
        set('role', user.EmploymentType || '');
        set('roleType', user.EmploymentType || '');
        set('assignedUser', user.Username);

        // ✅ 90-DAY LOGIN BYPASS (PWA SAFE, NO OTHER SIDE EFFECTS)
localStorage.setItem(
  "mostlaneBypassUntil",
  String(Date.now() + 90 * 24 * 60 * 60 * 1000)
);
        // ⭐ THE ONLY CHANGE: run device check here instead of redirecting
        runDeviceCheckAndContinue(user.Username);

      } catch (err) {
        console.error(err);
        errorBox.textContent = "Could not load user data.";
      }
    });
  </script>

</body>
</html>
