<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Log — Mostlane Portal</title>
  <script src="auth.js"></script>
  <style>
    :root{ --ml-blue:#003b82; --border:#d1d5db; --muted:#6b7280; }
    html,body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:#0f172a; background:#e6e8eb; }
    .shell{ max-width:560px; margin:20px auto 40px; padding:0 12px; }
    .card{ background:#fff; border-radius:14px; padding:18px; box-shadow:0 12px 28px rgba(0,0,0,.10); border:1px solid rgba(15,23,42,.05); margin-bottom:14px; }
    header{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
    h1{ margin:0; font-size:20px; color:var(--ml-blue); }
    .back-btn{ text-decoration:none; font-size:14px; padding:8px 12px; border-radius:999px; background:#fff; border:1px solid var(--border); color:var(--ml-blue); }
    label{ display:block; font-size:13px; font-weight:600; color:var(--ml-blue); margin:12px 0 4px; }
    input,select,textarea{ width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:15px; background:#fff; }
    textarea{ min-height:70px; }
    .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:0 12px; }
    @media (max-width:520px){ .grid2{ grid-template-columns:1fr; } }
    .btn{ display:block; width:100%; border:none; background:var(--ml-blue); color:#fff; padding:13px; border-radius:9px; font-size:16px; font-weight:600; cursor:pointer; margin-top:16px; }
    .msg{ font-size:13px; margin-top:10px; min-height:16px; text-align:center; }
    .msg.ok{ color:#0e7a3b; font-weight:600; } .msg.err{ color:#b91c1c; font-weight:600; }
  </style>
</head>
<body>
<div class="shell">
  <div class="card">
    <header>
      <h1>📒 Daily Log</h1>
      <a href="main.html" class="back-btn">← Menu</a>
    </header>
    <label>Engineer</label>
    <select id="engineer" required></select>
    <label>Date</label>
    <input type="date" id="date" required />
    <label>Site</label>
    <select id="site" required><option value="">Loading sites…</option></select>
    <div class="grid2">
      <div><label>Standard hours</label><input type="number" step="0.1" id="standardHours" /></div>
      <div><label>Overtime hours</label><input type="number" step="0.1" id="overtimeHours" /></div>
    </div>
    <div class="grid2">
      <div><label>Travel time (hrs)</label><input type="number" step="0.1" id="travelTime" /></div>
      <div><label>Mileage</label><input type="number" step="0.1" id="mileage" /></div>
    </div>
    <label>Notes</label>
    <textarea id="notes" placeholder="Anything worth recording about the day…"></textarea>
    <button class="btn" id="saveBtn">✅ Save daily log</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
const API = window.MOSTLANE_API;
const $ = id => document.getElementById(id);
function authFetch(url, init = {}){
  init.headers = new Headers(init.headers || {});
  const t = localStorage.getItem("mostlaneToken");
  if (t && !init.headers.has("Authorization")) init.headers.set("Authorization", "Bearer " + t);
  return fetch(url, init);
}
function me(){ return sessionStorage.getItem("mostlaneUser") || localStorage.getItem("mostlaneUser") || ""; }

async function load(){
  $("date").value = new Date().toISOString().slice(0,10);
  try{
    const [usersRes, sites] = await Promise.all([
      authFetch(`${API}/users`, {cache:"no-store"}).then(r=>r.json()),
      authFetch(`${API}/get-sites?category=all`, {cache:"no-store"}).then(r=>r.json())
    ]);
    const users = (usersRes.Users || []).filter(u => (u.Status || "Active") !== "Disabled");
    $("engineer").innerHTML = users.map(u => {
      const name = `${u.FirstName || ""} ${u.LastName || ""}`.trim() || u.Username;
      const sel = u.Username === me() ? " selected" : "";
      return `<option value="${u.Username}"${sel}>${name}</option>`;
    }).join("");
    const active = (Array.isArray(sites) ? sites : []).filter(s => s.active !== false)
      .sort((a,b) => String(a.siteName||"").localeCompare(String(b.siteName||"")));
    $("site").innerHTML = '<option value="">Select site…</option>' +
      active.map(s => `<option value="${String(s.siteName||"").replace(/"/g,"&quot;")}">${s.siteName || s.siteNumber}</option>`).join("");
  }catch(e){ $("msg").className = "msg err"; $("msg").textContent = "Couldn't load lists — check connection."; }
}

$("saveBtn").addEventListener("click", async () => {
  const body = {
    engineer: $("engineer").value,
    date: $("date").value,
    site: $("site").value,
    standardHours: $("standardHours").value,
    overtimeHours: $("overtimeHours").value,
    travelTime: $("travelTime").value,
    mileage: $("mileage").value,
    notes: $("notes").value.trim()
  };
  if(!body.engineer || !body.date){ $("msg").className="msg err"; $("msg").textContent = "Engineer and date are required."; return; }
  if(!body.site){ $("msg").className="msg err"; $("msg").textContent = "Pick a site."; return; }
  $("saveBtn").disabled = true; $("msg").className = "msg"; $("msg").textContent = "Saving…";
  try{
    const r = await (await authFetch(`${API}/daily-logs`, { method:"POST",
      headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) })).json();
    if(!r.ok) throw new Error(r.error || "Save failed");
    $("msg").className = "msg ok"; $("msg").textContent = "✅ Daily log saved.";
    ["standardHours","overtimeHours","travelTime","mileage","notes"].forEach(id => $(id).value = "");
  }catch(e){ $("msg").className = "msg err"; $("msg").textContent = e.message; }
  finally{ $("saveBtn").disabled = false; }
});

load();
</script>
</body>
</html>
