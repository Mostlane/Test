<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Settings — Mostlane</title>
  <script src="auth.js"></script>
  <style>
    :root{ --ml-blue:#003b82; --border:#d1d5db; --muted:#6b7280; }
    html,body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:#0f172a; background:#e6e8eb; }
    .shell{ max-width:640px; margin:20px auto 40px; padding:0 12px; }
    .card{ background:#fff; border-radius:14px; padding:18px; box-shadow:0 12px 28px rgba(0,0,0,.10); border:1px solid rgba(15,23,42,.05); margin-bottom:14px; }
    header{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
    h1{ margin:0; font-size:20px; color:var(--ml-blue); }
    h2{ margin:0 0 10px; font-size:15px; color:var(--ml-blue); }
    .back-btn{ text-decoration:none; font-size:14px; padding:8px 12px; border-radius:999px; background:#fff; border:1px solid var(--border); color:var(--ml-blue); }
    label{ display:block; font-size:13px; font-weight:600; color:var(--ml-blue); margin:12px 0 4px; }
    input{ width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:15px; }
    .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:0 12px; }
    @media (max-width:520px){ .grid2{ grid-template-columns:1fr; } }
    .btn{ display:inline-block; border:none; background:var(--ml-blue); color:#fff; padding:11px 18px; border-radius:9px; font-size:15px; font-weight:600; cursor:pointer; margin-top:14px; text-decoration:none; }
    .btn.ghost{ background:#fff; color:var(--ml-blue); border:1px solid var(--border); }
    .msg{ font-size:13px; margin-top:10px; min-height:16px; }
    .msg.ok{ color:#0e7a3b; font-weight:600; } .msg.err{ color:#b91c1c; font-weight:600; }
    .links{ display:flex; gap:8px; flex-wrap:wrap; }
    .muted{ color:var(--muted); font-size:13px; }
  </style>
</head>
<body>
<div class="shell">
  <div class="card">
    <header>
      <h1>⚙️ Portal Settings</h1>
      <a href="main.html" class="back-btn">← Menu</a>
    </header>
    <p class="muted" style="margin:0;">Global values used across the portal. Stored centrally in the portal database.</p>
  </div>

  <div class="card">
    <h2>Global config</h2>
    <label>SharePoint root path</label>
    <input id="s_sharePoint" placeholder="Mostlane Shared Documents > …" />
    <label>HQ postcode</label>
    <input id="s_hqPostcode" placeholder="PO15 5RQ" />
    <label>Google Maps API key (browser)</label>
    <input id="s_mapsKey" type="password" placeholder="••••••••" />
    <div class="grid2">
      <div><label>VAT rate %</label><input id="s_vatRate" type="number" step="0.01" placeholder="20" /></div>
      <div><label>Mileage rate (£/mile)</label><input id="s_mileageRate" type="number" step="0.01" placeholder="0.25" /></div>
    </div>
    <button class="btn" id="saveBtn">💾 Save settings</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="card">
    <h2>Managed elsewhere</h2>
    <p class="muted" style="margin:0 0 10px;">Users, permissions, sites and customers each have their own admin pages:</p>
    <div class="links">
      <a class="btn ghost" href="users-admin.html">👥 Users &amp; permissions</a>
      <a class="btn ghost" href="sites.html">📍 Manage Sites</a>
      <a class="btn ghost" href="customers.html">🏢 Customers</a>
    </div>
  </div>
</div>

<script>
const API = window.MOSTLANE_API;
const $ = id => document.getElementById(id);
function authFetch(url, init = {}){
  init.headers = new Headers(init.headers || {});
  const t = localStorage.getItem("mostlaneToken");
  if (t && !init.headers.has("Authorization")) init.headers.set("Authorization", "Bearer " + t);
  return fetch(url, init);
}
(function gate(){
  let perms = {};
  try { perms = JSON.parse(sessionStorage.getItem("mostlanePermissions") || localStorage.getItem("mostlanePermissions") || "{}"); } catch {}
  if (perms.FullAccess !== "Yes") {
    document.body.innerHTML = '<div style="max-width:480px;margin:60px auto;text-align:center;font-family:system-ui;color:#334155;"><h2>Access denied</h2><p>Portal settings need Full Access.</p><a href="main.html">Back to portal</a></div>';
    throw new Error("no access");
  }
})();

const FIELDS = ["sharePoint","hqPostcode","mapsKey","vatRate","mileageRate"];

async function load(){
  try{
    const r = await (await authFetch(`${API}/settings`, {cache:"no-store"})).json();
    if(!r.ok) throw new Error(r.error || "Load failed");
    FIELDS.forEach(k => { $("s_" + k).value = r.settings[k] ?? ""; });
  }catch(e){ $("msg").className = "msg err"; $("msg").textContent = e.message; }
}

$("saveBtn").addEventListener("click", async () => {
  $("msg").className = "msg"; $("msg").textContent = "Saving…";
  const body = {};
  FIELDS.forEach(k => { const v = $("s_" + k).value.trim(); if (v !== "") body[k] = v; });
  try{
    const r = await (await authFetch(`${API}/settings`, { method:"POST",
      headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) })).json();
    if(!r.ok) throw new Error(r.error || "Save failed");
    $("msg").className = "msg ok"; $("msg").textContent = "✔ Saved.";
  }catch(e){ $("msg").className = "msg err"; $("msg").textContent = e.message; }
});

load();
</script>
</body>
</html>
