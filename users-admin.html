<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users Admin — Mostlane Portal</title>
  <script src="auth.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family:"Segoe UI",sans-serif; background:#eef1f4; margin:0; color:#27313a; }
    header { background:linear-gradient(180deg,#1A4F8F,#003468); color:#fff; padding:14px 18px; display:flex; align-items:center; gap:12px; }
    header h1 { font-size:18px; margin:0; flex:1; }
    header a { color:#fff; text-decoration:none; font-size:14px; opacity:.9; }
    .wrap { max-width:1100px; margin:18px auto; padding:0 14px; }
    .bar { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
    .bar input { flex:1; min-width:180px; padding:10px; border:1px solid #ccd5dd; border-radius:8px; font-size:14px; }
    .btn { background:#0066cc; color:#fff; border:none; border-radius:8px; padding:10px 14px; font-size:14px; cursor:pointer; }
    .btn.grey { background:#5b6b78; } .btn.red { background:#b00020; } .btn.small { padding:6px 10px; font-size:13px; }
    table { width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    th,td { text-align:left; padding:10px 12px; border-bottom:1px solid #eef2f6; font-size:14px; }
    th { background:#f6f8fa; color:#003366; font-size:12px; text-transform:uppercase; letter-spacing:.4px; }
    tr:last-child td { border-bottom:none; }
    .pill { font-size:11px; padding:2px 8px; border-radius:999px; }
    .pill.active { background:#e3f6e8; color:#0c7d27; } .pill.disabled { background:#fde8ea; color:#b00020; }
    .muted { color:#667085; font-size:12px; }
    .actions { display:flex; gap:6px; flex-wrap:wrap; }
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:flex-start; justify-content:center; padding:24px; overflow:auto; }
    .overlay.open { display:flex; }
    .panel { background:#fff; border-radius:12px; width:100%; max-width:640px; padding:20px; }
    .panel h2 { color:#003366; margin:0 0 14px; font-size:18px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    label { font-size:12px; color:#667085; display:block; margin:8px 0 2px; }
    .panel input, .panel select { width:100%; padding:9px; border:1px solid #ccd5dd; border-radius:8px; font-size:14px; }
    .perms { margin-top:12px; border-top:1px solid #eef2f6; padding-top:12px; }
    .perms h3 { font-size:13px; color:#003366; margin:0 0 8px; }
    .permgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:6px; }
    .permgrid label { display:flex; align-items:center; gap:6px; font-size:13px; color:#27313a; margin:0; }
    .panel-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:16px; }
    .msg { font-size:14px; margin-top:10px; } .msg.err { color:#b00020; } .msg.ok { color:#0c7d27; }
    .notice { background:#fff3cd; color:#7a5b00; padding:12px; border-radius:8px; margin-bottom:14px; font-size:14px; }
  </style>
</head>
<body>
  <header>
    <h1>👥 Users Admin</h1>
    <a href="main.html">← Main menu</a>
  </header>

  <div class="wrap">
    <div id="configNotice" class="notice" style="display:none;">
      ⚠️ The portal API URL isn't set yet. Edit <code>portal-config.js</code> (set <code>MOSTLANE_API</code>) after deploying the worker.
    </div>

    <div class="bar">
      <input id="search" placeholder="Search by name, username or email…" />
      <button class="btn" id="addBtn">+ Add user</button>
    </div>

    <table>
      <thead>
        <tr><th>User</th><th>Email</th><th>Type</th><th>Status</th><th>Access</th><th>Actions</th></tr>
      </thead>
      <tbody id="rows"><tr><td colspan="6" class="muted">Loading…</td></tr></tbody>
    </table>
  </div>

  <div class="overlay" id="overlay">
    <div class="panel">
      <h2 id="panelTitle">Edit user</h2>
      <div class="grid2">
        <div><label>Username *</label><input id="f_username" /></div>
        <div><label>Engineer #</label><input id="f_engno" /></div>
        <div><label>First name</label><input id="f_first" /></div>
        <div><label>Last name</label><input id="f_last" /></div>
        <div><label>Email</label><input id="f_email" type="email" /></div>
        <div><label>Vehicle</label><input id="f_vehicle" /></div>
        <div>
          <label>Employment</label>
          <select id="f_emp"><option>Employed</option><option>Self Employed</option></select>
        </div>
        <div>
          <label>Status</label>
          <select id="f_status"><option>Active</option><option>Disabled</option></select>
        </div>
      </div>
      <div><label>SharePoint path</label><input id="f_sp" /></div>
      <div><label id="pwLabel">Set password (leave blank to keep current)</label><input id="f_pw" type="text" placeholder="••••••••" /></div>

      <div class="perms">
        <h3>Permissions</h3>
        <div class="permgrid" id="permGrid"></div>
      </div>

      <p id="panelMsg" class="msg"></p>
      <div class="panel-actions">
        <button class="btn grey" id="cancelBtn">Cancel</button>
        <button class="btn" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <script>
    const API = window.MOSTLANE_API;
    const token = localStorage.getItem("mostlaneToken");
    const PERMISSIONS = ["FullAccess","Users","DeviceAdmin","CheckInOut","Vehicles","Holiday",
      "HolidayAdmin","EngineersHoursMenu","HoursDashboard","PurchaseOrders","Sites","AddSite",
      "Assets","MyDocuments","Weekly","Forms","Compliance","Projects","ProjectsAdmin",
      "TimesheetAdmin","LabourPlanning","SLA"];

    let allUsers = [];

    function api(path, opts = {}) {
      opts.headers = Object.assign({ "Authorization": "Bearer " + token }, opts.headers || {});
      if (opts.body && !opts.headers["Content-Type"]) opts.headers["Content-Type"] = "application/json";
      return fetch(API + path, opts);
    }
    const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));

    document.getElementById("permGrid").innerHTML = PERMISSIONS.map(p =>
      `<label><input type="checkbox" data-perm="${p}" /> ${p}</label>`).join("");

    if (/REPLACE-ME/.test(API || "")) document.getElementById("configNotice").style.display = "block";
    if (!token) location.href = "login.html";

    async function guardAndLoad() {
      try {
        const me = await (await api("/auth/me")).json();
        if (!me.ok || !(me.user.FullAccess === "Yes" || me.user.Users === "Yes")) {
          alert("Access denied"); location.href = "main.html"; return;
        }
        await loadUsers();
      } catch (e) {
        document.getElementById("rows").innerHTML =
          `<tr><td colspan="6" class="muted">Could not reach the portal API. Set MOSTLANE_API in portal-config.js.</td></tr>`;
      }
    }

    async function loadUsers() {
      const data = await (await api("/users")).json();
      allUsers = data.Users || [];
      render();
    }

    function accessSummary(u) {
      if (u.FullAccess === "Yes") return "Full access";
      const n = PERMISSIONS.filter(p => u[p] === "Yes").length;
      return n ? n + " area" + (n === 1 ? "" : "s") : "None";
    }

    function render() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const list = allUsers.filter(u => !q ||
        [u.Username, u.FirstName, u.LastName, u.Email].some(v => String(v || "").toLowerCase().includes(q)));
      const rows = document.getElementById("rows");
      if (!list.length) { rows.innerHTML = `<tr><td colspan="6" class="muted">No users.</td></tr>`; return; }
      rows.innerHTML = list.map(u => `
        <tr>
          <td><b>${esc((u.FirstName||"") + " " + (u.LastName||""))}</b><div class="muted">${esc(u.Username)}</div></td>
          <td>${esc(u.Email||"")}</td>
          <td>${esc(u.EmploymentType||"")}</td>
          <td><span class="pill ${u.Status==='Disabled'?'disabled':'active'}">${esc(u.Status||'Active')}</span></td>
          <td>${esc(accessSummary(u))}</td>
          <td><div class="actions">
            <button class="btn small" data-edit="${esc(u.Username)}">Edit</button>
            <button class="btn small grey" data-reset="${esc(u.Username)}">Reset PW</button>
            <button class="btn small red" data-del="${esc(u.Username)}">Delete</button>
          </div></td>
        </tr>`).join("");
    }

    document.getElementById("search").addEventListener("input", render);

    function openEditor(user) {
      document.getElementById("panelTitle").textContent = user ? "Edit user" : "Add user";
      document.getElementById("pwLabel").textContent = user
        ? "Set password (leave blank to keep current)"
        : "Initial password (user must change on first login)";
      const g = id => document.getElementById(id);
      g("f_username").value = user?.Username || "";
      g("f_username").disabled = !!user;
      g("f_engno").value = user?.EngineerNumber || "";
      g("f_first").value = user?.FirstName || "";
      g("f_last").value = user?.LastName || "";
      g("f_email").value = user?.Email || "";
      g("f_vehicle").value = user?.VehicleAssigned || "";
      g("f_emp").value = user?.EmploymentType || "Employed";
      g("f_status").value = user?.Status || "Active";
      g("f_sp").value = user?.SharePointPath || "";
      g("f_pw").value = "";
      document.querySelectorAll("[data-perm]").forEach(cb => { cb.checked = user ? user[cb.dataset.perm] === "Yes" : false; });
      document.getElementById("panelMsg").textContent = "";
      document.getElementById("overlay").classList.add("open");
    }
    function closeEditor() { document.getElementById("overlay").classList.remove("open"); }

    document.getElementById("addBtn").onclick = () => openEditor(null);
    document.getElementById("cancelBtn").onclick = closeEditor;

    document.getElementById("rows").addEventListener("click", async (e) => {
      const t = e.target;
      if (t.dataset.edit) openEditor(allUsers.find(u => u.Username === t.dataset.edit));
      else if (t.dataset.reset) await resetPw(t.dataset.reset);
      else if (t.dataset.del) await delUser(t.dataset.del);
    });

    document.getElementById("saveBtn").onclick = async () => {
      const msg = document.getElementById("panelMsg");
      msg.className = "msg"; msg.textContent = "Saving…";
      const g = id => document.getElementById(id).value.trim();
      const body = {
        Username: g("f_username"), EngineerNumber: g("f_engno"),
        FirstName: g("f_first"), LastName: g("f_last"), Email: g("f_email"),
        VehicleAssigned: g("f_vehicle"), EmploymentType: g("f_emp"),
        Status: document.getElementById("f_status").value, SharePointPath: g("f_sp")
      };
      if (!body.Username) { msg.className = "msg err"; msg.textContent = "Username is required."; return; }
      const pw = document.getElementById("f_pw").value;
      if (pw) body.Password = pw;
      document.querySelectorAll("[data-perm]").forEach(cb => { body[cb.dataset.perm] = cb.checked ? "Yes" : "No"; });
      try {
        const res = await api("/users", { method: "POST", body: JSON.stringify(body) });
        const r = await res.json();
        if (!res.ok || !r.ok) { msg.className = "msg err"; msg.textContent = r.error || "Save failed."; return; }
        closeEditor(); await loadUsers();
      } catch (e) { msg.className = "msg err"; msg.textContent = "Network error."; }
    };

    async function resetPw(username) {
      if (!confirm(`Reset password for ${username}? They'll be forced to set a new one on next login.`)) return;
      try {
        const res = await api("/users/reset-password", { method: "POST", body: JSON.stringify({ username }) });
        const r = await res.json();
        if (!res.ok || !r.ok) { alert(r.error || "Reset failed."); return; }
        alert(r.tempPassword
          ? `Temporary password for ${username}:\n\n${r.tempPassword}\n\nGive this to the user — they must change it on next login.`
          : "Password reset.");
      } catch (e) { alert("Network error."); }
    }

    async function delUser(username) {
      if (!confirm(`Delete user ${username}? This cannot be undone.`)) return;
      try {
        const res = await api("/users/delete", { method: "POST", body: JSON.stringify({ username }) });
        const r = await res.json();
        if (!res.ok || !r.ok) { alert(r.error || "Delete failed."); return; }
        await loadUsers();
      } catch (e) { alert("Network error."); }
    }

    guardAndLoad();
  </script>
</body>
</html>
