<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js?v=2"></script>
  <script src="auth.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared Assets — Mostlane Portal</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Segoe UI",system-ui,-apple-system,sans-serif; background:#eef1f5; color:#16202e; }
    header.page { background:linear-gradient(180deg,#1A4F8F,#003468); color:#fff; padding:14px 18px; display:flex; align-items:center; gap:12px; }
    header.page h1 { font-size:18px; margin:0; flex:1; color:#fff; }
    .wrap { max-width:1100px; margin:18px auto 40px; padding:0 14px; }
    .muted { color:#667085; font-size:13px; }
    .btn { background:#0066cc; color:#fff; border:none; border-radius:9px; padding:9px 14px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
    .btn.grey { background:#5b6b78; } .btn.small { padding:7px 11px; font-size:13px; font-weight:500; }

    .bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
    .bar h2 { margin:0; font-size:17px; color:#003366; }
    .bar input { flex:1; min-width:180px; padding:10px 12px; border:1px solid #ccd5dd; border-radius:9px; font-size:14px; font-family:inherit; }

    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:16px; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:14px; box-shadow:0 2px 10px rgba(6,24,54,.06); padding:14px; display:flex; flex-direction:column; }
    .card img.thumb { width:100%; height:150px; object-fit:cover; border-radius:9px; margin-bottom:10px; background:#f2f5f8; cursor:pointer; }
    .card .noimg { width:100%; height:110px; border-radius:9px; margin-bottom:10px; background:#f2f5f8; display:flex; align-items:center; justify-content:center; color:#b3c0cf; font-size:30px; }
    .card h3 { margin:0 0 6px; font-size:16px; color:#003366; }
    .card p { margin:3px 0; font-size:13.5px; }
    .held { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; padding:3px 10px; border-radius:999px; margin-top:6px; align-self:flex-start; }
    .held.pool { background:#e2edff; color:#1a4f8f; }
    .held.person { background:#eef1f4; color:#334155; }
    .card .buttons { margin-top:auto; padding-top:12px; display:flex; gap:6px; flex-wrap:wrap; }

    /* Modals */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-start; justify-content:center; padding:16px; overflow:auto; z-index:500; }
    .overlay.open { display:flex; }
    .panel { background:#fff; border-radius:14px; width:100%; max-width:480px; padding:18px; margin-top:6vh; }
    .panel h2 { margin:0 0 10px; font-size:17px; color:#003366; }
    .panel .acts { display:flex; justify-content:flex-end; margin-top:14px; }
    .hist p { margin:8px 0; font-size:13.5px; border-bottom:1px solid #f0f3f7; padding-bottom:8px; }
    .hist p:last-child { border-bottom:none; }

    .gmodal { display:none; position:fixed; inset:0; z-index:999; background:rgba(0,0,0,.88); justify-content:center; align-items:center; }
    .gmodal img { max-width:92%; max-height:88%; border-radius:8px; }
    .gmodal .close { position:absolute; top:14px; right:22px; color:#fff; font-size:34px; cursor:pointer; }
    .gmodal .arrow { position:absolute; top:50%; transform:translateY(-50%); color:#fff; font-size:42px; cursor:pointer; padding:8px 16px; background:rgba(0,0,0,.35); border-radius:8px; user-select:none; }
    .gmodal .left { left:12px; } .gmodal .right { right:12px; }
  </style>
  <script>
    if (sessionStorage.getItem("mostlaneLoggedIn") !== "true") location.href = "login.html";
  </script>
</head>
<body>
  <header class="page">
    <h1>🔧 Shared Assets</h1>
    <a class="ml-back" data-role="home" href="main.html">← Menu</a>
  </header>

  <div class="wrap">
    <div class="bar">
      <h2>Shared pool</h2>
      <span class="muted" id="countLbl"></span>
      <input id="search" placeholder="Search name, serial, category…">
      <a class="btn grey small" href="my-assets.html" style="text-decoration:none;">My items</a>
    </div>
    <p class="muted" style="margin:-6px 0 14px;">Shared and unassigned plant &amp; equipment anyone can use. Tap History to see where an item has been.</p>
    <div id="grid" class="grid"><p class="muted">Loading…</p></div>
  </div>

  <!-- History modal -->
  <div class="overlay" id="histModal">
    <div class="panel">
      <h2>Transfer history</h2>
      <div id="histContent" class="hist muted">Loading…</div>
      <div class="acts"><button class="btn grey" onclick="closeM('histModal')">Close</button></div>
    </div>
  </div>

  <!-- Image gallery -->
  <div id="gModal" class="gmodal">
    <span class="close" onclick="gClose()">&times;</span>
    <span class="arrow left" onclick="gPrev()">&#10094;</span>
    <img id="gImg">
    <span class="arrow right" onclick="gNext()">&#10095;</span>
  </div>

  <script>
    const API = window.MOSTLANE_API;
    const g = id => document.getElementById(id);
    const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
    function authFetch(path, opts = {}) {
      opts.headers = Object.assign({ "Authorization": "Bearer " + localStorage.getItem("mostlaneToken") }, opts.headers || {});
      return fetch(API + path, opts);
    }
    const openM = id => g(id).classList.add("open");
    const closeM = id => g(id).classList.remove("open");
    function thumbUrl(u) { const m = /[?&]key=([^&]+)/.exec(u || ""); return m ? API + "/asset-thumb?key=" + m[1] : u; }

    let SHARED = [];

    async function load() {
      try {
        const d = await authFetch("/assets").then(r => r.json());
        const all = (d && d.assets) || [];
        SHARED = all.filter(a =>
          (a.shared && String(a.shared).toLowerCase() === "yes") ||
          (a.assignedTo && String(a.assignedTo).toLowerCase() === "shared") ||
          (!a.assignedTo || String(a.assignedTo).trim() === ""));
        render();
      } catch (e) {
        g("grid").innerHTML = "<p class='muted'>Couldn't load shared assets — check your connection.</p>";
      }
    }

    function render() {
      const q = g("search").value.trim().toLowerCase();
      const list = SHARED.filter(a => !q ||
        [a.name, a.serial, a.category, a.id].some(v => String(v || "").toLowerCase().includes(q)));
      g("countLbl").textContent = SHARED.length ? SHARED.length + " item" + (SHARED.length === 1 ? "" : "s") : "";
      if (!list.length) { g("grid").innerHTML = "<p class='muted'>" + (SHARED.length ? "No matches." : "No shared assets right now.") + "</p>"; return; }
      g("grid").innerHTML = list.map(a => {
        const imgs = a.images || [];
        const holder = String(a.assignedTo || "").trim();
        const pool = !holder || holder.toLowerCase() === "shared";
        const since = a.lastTransfer ? new Date(a.lastTransfer).toLocaleDateString("en-GB")
          : (a.calibrationDate ? new Date(a.calibrationDate).toLocaleDateString("en-GB") : "—");
        return `<div class="card">
          ${imgs.length ? `<img class="thumb" src="${esc(thumbUrl(imgs[0]))}" data-gallery="${esc(a.id)}" alt="${esc(a.name)}">`
                        : `<div class="noimg">🔧</div>`}
          <h3>${esc(a.name || a.id)}</h3>
          <p><b>Serial:</b> ${esc(a.serial || "—")}</p>
          <p><b>Category:</b> ${esc(a.category || "—")}</p>
          ${a.value ? `<p><b>Value:</b> ${esc(a.value)}</p>` : ""}
          <p><b>Since:</b> ${since}</p>
          <span class="held ${pool ? "pool" : "person"}">${pool ? "🌐 Shared pool" : "👤 " + esc(holder)}</span>
          <div class="buttons">
            <button class="btn grey small" data-hist="${esc(a.id)}">History</button>
            ${imgs.length ? `<button class="btn small" data-gallery="${esc(a.id)}">View images</button>` : ""}
          </div>
        </div>`;
      }).join("");
    }
    g("search").addEventListener("input", render);

    document.addEventListener("click", e => {
      const t = e.target;
      if (t.dataset.hist) openHistory(t.dataset.hist);
      else if (t.dataset.gallery) { const a = SHARED.find(x => x.id === t.dataset.gallery); if (a) gOpen(a.images || []); }
    });

    async function openHistory(assetId) {
      g("histContent").textContent = "Loading…"; openM("histModal");
      try {
        const log = await authFetch("/transfer-log?assetID=" + encodeURIComponent(assetId)).then(r => r.json());
        const rows = (Array.isArray(log) ? log : []).slice().reverse().slice(0, 12);
        g("histContent").innerHTML = rows.length ? rows.map(l => {
          const when = l.timestamp ? new Date(l.timestamp).toLocaleString("en-GB") : "";
          if (l.type === "TRANSFER_REJECTED") return `<p>❌ Rejected by <b>${esc(l.to || "?")}</b><br><span class="muted">${when}</span></p>`;
          return `<p><b>${esc(l.from || "Unassigned")}</b> → <b>${esc(l.to || "?")}</b><br><span class="muted">${when}</span></p>`;
        }).join("") : "<p>No transfer history for this item.</p>";
      } catch (e) { g("histContent").textContent = "History unavailable."; }
    }

    let gImgs = [], gIdx = 0;
    function gOpen(urls) { if (!urls.length) return; gImgs = urls; gIdx = 0; g("gImg").src = urls[0]; g("gModal").style.display = "flex"; }
    function gClose() { g("gModal").style.display = "none"; }
    function gNext() { gIdx = (gIdx + 1) % gImgs.length; g("gImg").src = gImgs[gIdx]; }
    function gPrev() { gIdx = (gIdx - 1 + gImgs.length) % gImgs.length; g("gImg").src = gImgs[gIdx]; }
    window.addEventListener("keydown", e => { if (e.key === "Escape") gClose(); if (e.key === "ArrowRight") gNext(); if (e.key === "ArrowLeft") gPrev(); });

    load();
  </script>
</body>
</html>
