<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Administration</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #e6e8eb url('Mostlane_Embossed.png') no-repeat center center;
      background-size: 180%;
      font-family: Arial, sans-serif;
    }

    .content {
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(6px);
      margin: 40px auto;
      padding: 20px;
      border-radius: 12px;
      max-width: 1200px;
      width: 100%;
      box-sizing: border-box;
      overflow-x: auto;
    }

    h1 {
      background: rgba(0,74,153,0.6);
      color: white;
      text-align: center;
      padding: 12px;
      border-radius: 12px 12px 0 0;
      margin: 0 0 16px 0;
    }

    .button {
      display: inline-block;
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 6px;
      background: rgba(0,74,153,0.6);
      color: white;
      text-decoration: none;
      margin: 5px 5px 15px 0;
      cursor: pointer;
      border: none;
    }

    .button:hover {
      background: rgba(0,74,153,0.8);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(4px);
      font-size: 14px;
      display: block;
      overflow-x: auto;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
      vertical-align: middle;
    }

    th {
      background: rgba(243,244,246,0.6);
      backdrop-filter: blur(4px);
    }

    .actions button {
      margin-right: 5px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
    }

    .actions button:hover {
      background: #f0f0f0;
    }

    .thumb-img {
      height: 40px;
      width: 40px;
      object-fit: cover;
      border-radius: 4px;
      cursor: pointer;
    }

    /* ── MODALS ── */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 8px;
      width: 90%;
      max-width: 500px;
      position: relative;
      max-height: 85vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .modal-content input,
    .modal-content select {
      width: 100%;
      margin: 6px 0;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .modal-content label {
      font-size: 13px;
      font-weight: bold;
      margin-top: 8px;
      display: block;
    }

    .close-btn {
      position: absolute;
      top: 10px; right: 12px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      color: #333;
      background: none;
      border: none;
      line-height: 1;
    }

    .disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ── GALLERY ── */
    .gallery-container {
      margin: 10px 0;
      overflow-x: auto;
      white-space: nowrap;
    }

    .gallery-item {
      position: relative;
      display: inline-block;
      margin-right: 8px;
    }

    .gallery-item img {
      height: 70px;
      width: auto;
      border-radius: 6px;
      object-fit: cover;
      cursor: pointer;
    }

    .gallery-delete {
      position: absolute;
      top: -6px; right: -6px;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 999px;
      width: 20px; height: 20px;
      font-size: 12px;
      line-height: 20px;
      text-align: center;
      cursor: pointer;
    }

    /* ── IMAGE VIEWER ── */
    .image-viewer-overlay {
      display: none;
      position: fixed;
      z-index: 1000;
      inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    .image-viewer-overlay img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
    }

    .image-viewer-close {
      position: absolute;
      top: 12px; right: 16px;
      font-size: 28px;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      background: none;
      border: none;
    }

    .img-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.75);
      border: none;
      border-radius: 999px;
      width: 40px; height: 40px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
    }

    #imgPrev { left: 20px; }
    #imgNext { right: 20px; }

    /* ── SUMMARY ── */
    #valueSummary {
      width: 100%;
      display: block;
      box-sizing: border-box;
      margin: 15px 0;
      padding: 15px;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(6px);
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }

    .summary-row.highlight {
      background: rgba(16,185,129,0.08);
    }

    .summary-name {
      flex: 0 0 35%;
      text-align: left;
      font-weight: bold;
      word-break: break-word;
    }

    .summary-value {
      flex: 0 0 18%;
      text-align: right;
      white-space: nowrap;
    }

    .summary-count {
      flex: 0 0 12%;
      text-align: right;
      font-size: 12px;
      color: #555;
    }

    .summary-bar-outer {
      flex: 1;
      height: 8px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      min-width: 30px;
    }

    .summary-bar-inner {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(0,74,153,0.8), rgba(0,148,255,0.9));
    }

    .summary-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 10px 0 20px 0;
    }

    .summary-legend {
      font-size: 11px;
      color: #444;
      margin-top: 6px;
      font-style: italic;
    }

    /* ── LOADING / ERROR STATES ── */
    .table-status-row td {
      text-align: center;
      padding: 20px;
      color: #555;
      font-style: italic;
    }

    /* ── LOADING OVERLAY for export ── */
    #exportOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 18px;
      font-family: Arial, sans-serif;
      flex-direction: column;
      gap: 12px;
    }

    #exportOverlay .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── RESPONSIVE: hide bar chart on very small screens ── */
    @media (max-width: 360px) {
      .summary-bar-outer { display: none; }
      .summary-name { flex: 0 0 50%; }
      .summary-value { flex: 0 0 30%; }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

  <div id="imageViewer" class="image-viewer-overlay">
    <button class="image-viewer-close" onclick="closeImageViewer()" aria-label="Close">×</button>

  <script>
    // ─────────────────────────────────────────────
    // FIX #1 — auth and access check deferred to
    // DOMContentLoaded so auth.js has fully run,
    // and <meta charset> is now first in <head>.
    // ─────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => {
      // Load auth.js logic first if needed, then check access
      checkAccess();
    });

    async function checkAccess() {
      const user = sessionStorage.getItem("mostlaneUser");
      if (!user) {
        alert("You are not logged in.");
        window.location.href = "login.html";
        return;
      }

      try {
        const res = await fetch("role-type.txt");
        const text = await res.text();

        // FIX #2 — whole-line / delimited match to prevent substring collisions
        // Expects lines like: Jamie.Line,Office
        const roleLine = text.split("\n").find(l => {
          const parts = l.split(",");
          return parts[0].trim().toLowerCase() === user.toLowerCase();
        });

        if (!roleLine || !roleLine.toLowerCase().includes("office")) {
          alert("Access denied. Office users only.");
          window.location.href = "main.html";
        }
      } catch (e) {
        alert("Could not verify access. Please try again.");
        window.location.href = "main.html";
      }
    }

    // ─────────────────────────────────────────────
    // CONSTANTS
    // FIX #3 — PIN removed from client-side entirely.
    // PIN validation now happens in the worker.
    // The worker endpoint /asset/delete expects
    // { id, pin } and validates server-side.
    // ─────────────────────────────────────────────
    const apiBase = "https://mostlane-assets.jamie-def.workers.dev";
    const HIGH_VALUE_THRESHOLD = 5000;

    let currentEditId   = null;
    let currentAsset    = null;
    let portalUsers     = [];
    let currentAssets   = [];
    let currentImageList = [];
    let currentImageIndex = 0;
    let lastSummarySort = "value";

    // ─────────────────────────────────────────────
    // PORTAL USERS
    // ─────────────────────────────────────────────
    async function loadPortalUsers() {
      const res = await fetch("https://mostlane-users.jamie-def.workers.dev/users");
      const raw = await res.text();
      let data;
      try { data = JSON.parse(raw); } catch { data = { Users: [] }; }

      portalUsers = (data.Users || [])
        .filter(u =>
          u.Username && u.Username.trim() !== "" &&
          u.FirstName && u.LastName &&
          u.Status !== "Not Active"
        )
        .sort((a, b) =>
          (a.FirstName + " " + a.LastName).localeCompare(b.FirstName + " " + b.LastName)
        );
    }

    // ─────────────────────────────────────────────
    // IMAGE NAV VISIBILITY
    // ─────────────────────────────────────────────
    function updateImageNavVisibility() {
      const prevBtn = document.getElementById("imgPrev");
      const nextBtn = document.getElementById("imgNext");
      const show = currentImageList && currentImageList.length > 1;
      prevBtn.style.display = show ? "flex" : "none";
      nextBtn.style.display = show ? "flex" : "none";
    }

    // ─────────────────────────────────────────────
    // USER DROPDOWN
    // ─────────────────────────────────────────────
    function populateUserDropdown(selected = "") {
      const sel = document.getElementById("assignedField");
      sel.innerHTML = `<option value="">-- Select User --</option>`;

      portalUsers.forEach(u => {
        const opt = document.createElement("option");
        opt.value = u.Username;
        opt.textContent = u.FirstName + " " + u.LastName;
        if (u.Username === selected) opt.selected = true;
        sel.appendChild(opt);
      });

      const sharedOpt = document.createElement("option");
      sharedOpt.value = "Shared";
      sharedOpt.textContent = "Shared";
      if (selected === "Shared") sharedOpt.selected = true;
      sel.appendChild(sharedOpt);
    }

    function validateSaveButton() {
      const saveBtn  = document.getElementById("saveBtn");
      const assigned = document.getElementById("assignedField").value;
      saveBtn.classList.toggle("disabled", assigned === "");
    }

    // ─────────────────────────────────────────────
    // ADD MODAL
    // ─────────────────────────────────────────────
    function openAddModal() {
      currentEditId = null;
      currentAsset  = null;

      document.getElementById("modalTitle").textContent = "Add Asset";
      document.querySelectorAll("#assetModal input").forEach(i => i.value = "");

      // Reset shared select
      document.getElementById("sharedField").value = "no";

      document.getElementById("imageGallery").innerHTML = "";
      currentImageList = [];

      populateUserDropdown("");
      validateSaveButton();
      document.getElementById("assignedField").onchange = validateSaveButton;

      // Default transfer date to today for new assets
      document.getElementById("transferDateField").value =
        new Date().toISOString().slice(0, 10);

      document.getElementById("assetModal").style.display = "flex";
    }

    // ─────────────────────────────────────────────
    // EDIT MODAL
    // FIX #6 — Transfer Date now shows asset's stored
    // value instead of always resetting to today.
    // ─────────────────────────────────────────────
    function openEditModal(asset) {
      currentEditId = asset.id;
      currentAsset  = asset;

      document.getElementById("modalTitle").textContent = "Edit Asset";

      document.getElementById("idField").value       = asset.id       || "";
      document.getElementById("nameField").value     = asset.name     || "";
      document.getElementById("categoryField").value = asset.category || "";
      document.getElementById("serialField").value   = asset.serial   || "";
      document.getElementById("valueField").value    = asset.value    || "";

      // FIX #9 — use select, normalise stored value to lowercase
      const sharedSel = document.getElementById("sharedField");
      sharedSel.value = (asset.shared || "no").toLowerCase();

      // FIX #6 — show stored transfer date; fall back to today only if missing
      document.getElementById("transferDateField").value =
        asset.calibrationDate || new Date().toISOString().slice(0, 10);

      populateUserDropdown(asset.assignedTo);
      validateSaveButton();
      document.getElementById("assignedField").onchange = validateSaveButton;

      loadImageGallery(asset);

      document.getElementById("assetModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("assetModal").style.display = "none";
    }

    // ─────────────────────────────────────────────
    // IMAGE GALLERY
    // ─────────────────────────────────────────────
    function loadImageGallery(asset) {
      const gallery = document.getElementById("imageGallery");
      gallery.innerHTML = "";

      currentImageList = asset.images || [];
      currentAsset.images = currentImageList;

      currentImageList.forEach(url => {
        const wrapper = document.createElement("div");
        wrapper.className = "gallery-item";

        const img = document.createElement("img");
        img.src = url;
        img.onclick = () => openImageViewer(url);

        const del = document.createElement("button");
        del.className = "gallery-delete";
        del.type = "button";
        del.textContent = "×";
        del.onclick = (e) => { e.stopPropagation(); deleteImage(url); };

        wrapper.appendChild(img);
        wrapper.appendChild(del);
        gallery.appendChild(wrapper);
      });
    }

    function openImageViewer(url) {
      const idx = currentImageList.indexOf(url);
      currentImageIndex = idx >= 0 ? idx : 0;
      document.getElementById("imageViewerImg").src = url;
      document.getElementById("imageViewer").style.display = "flex";
      updateImageNavVisibility();
    }

    function openImageViewerFromTable(images) {
      if (!images || !images.length) return;
      currentImageList  = images;
      currentImageIndex = 0;
      document.getElementById("imageViewerImg").src = images[0];
      document.getElementById("imageViewer").style.display = "flex";
      updateImageNavVisibility();
    }

    function closeImageViewer() {
      document.getElementById("imageViewer").style.display = "none";
      document.getElementById("imageViewerImg").src = "";
    }

    function showImageAt(index) {
      if (!currentImageList || !currentImageList.length) return;
      currentImageIndex = (index + currentImageList.length) % currentImageList.length;
      document.getElementById("imageViewerImg").src = currentImageList[currentImageIndex];
    }

    function nextImage() { showImageAt(currentImageIndex + 1); }
    function prevImage() { showImageAt(currentImageIndex - 1); }

    // Swipe support
    (function () {
      const viewerEl = document.getElementById("imageViewer");
      let touchStartX = null;

      viewerEl.addEventListener("touchstart", e => {
        if (e.changedTouches && e.changedTouches.length)
          touchStartX = e.changedTouches[0].clientX;
      }, { passive: true });

      viewerEl.addEventListener("touchend", e => {
        if (touchStartX === null) return;
        if (!e.changedTouches || !e.changedTouches.length) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 40) dx < 0 ? nextImage() : prevImage();
        touchStartX = null;
      }, { passive: true });
    })();

    // ─────────────────────────────────────────────
    // DELETE IMAGE
    // ─────────────────────────────────────────────
    async function deleteImage(url) {
      if (!currentAsset) return;

      if (!confirm("Are you sure you want to delete this image? This cannot be recovered.")) return;

      const key = url.split("key=")[1];
      if (!key) { alert("Image key missing — cannot delete."); return; }

      try {
        const res = await fetch(`${apiBase}/delete-asset-image`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ assetId: currentAsset.id, key })
        });

        const data = await res.json();
        if (!data.ok) { alert(data.error || "Failed to delete image"); return; }

        currentAsset.images = (currentAsset.images || []).filter(u => u !== url);
        loadImageGallery(currentAsset);
      } catch {
        alert("Failed to delete image. Please try again.");
      }
    }

    // ─────────────────────────────────────────────
    // UPLOAD IMAGE
    // ─────────────────────────────────────────────
    async function uploadImage() {
      if (!currentAsset) {
        alert("Please save the asset before uploading images.");
        return;
      }

      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";

      input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;

        const form = new FormData();
        form.append("file", file);
        form.append("assetId", currentAsset.id);

        try {
          const res  = await fetch(`${apiBase}/upload-asset-image`, { method: "POST", body: form });
          const data = await res.json();

          if (!data.ok) { alert("Upload failed"); return; }

          if (!Array.isArray(currentAsset.images)) currentAsset.images = [];
          currentAsset.images.push(data.url);

          await fetch(`${apiBase}/asset/update`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(currentAsset)
          });

          loadImageGallery(currentAsset);
        } catch {
          alert("Image upload failed. Please try again.");
        }
      };

      input.click();
    }

    // ─────────────────────────────────────────────
    // SUMMARY
    // ─────────────────────────────────────────────
    function renderValueSummary(assets) {
      const summaryEl = document.getElementById("valueSummary");
      if (!summaryEl) return;

      let totalValue = 0;
      const totalCount = assets.length;
      const perUser = {};

      assets.forEach(a => {
        let val = parseFloat(
          String(a.value || "0").replace(/£/g, "").replace(/,/g, "").trim()
        );
        if (isNaN(val)) val = 0;

        totalValue += val;

        if (a.assignedTo && a.assignedTo !== "Shared") {
          if (!perUser[a.assignedTo]) perUser[a.assignedTo] = { total: 0, count: 0 };
          perUser[a.assignedTo].total += val;
          perUser[a.assignedTo].count += 1;
        }
      });

      // FIX #7 — display names with spaces in the summary
      let data = Object.entries(perUser).map(([username, info]) => ({
        username,
        displayName: username.replace(/\./g, " "),
        totalValue:  info.total,
        count:       info.count
      }));

      if (lastSummarySort === "name") {
        data.sort((a, b) => a.displayName.localeCompare(b.displayName));
      } else {
        data.sort((a, b) => b.totalValue - a.totalValue);
      }

      const maxVal = data.length ? Math.max(...data.map(d => d.totalValue)) : 0;

      let rowsHtml = "";
      data.forEach(d => {
        const pct = maxVal > 0 ? (d.totalValue / maxVal) * 100 : 0;
        const highlight = d.totalValue >= HIGH_VALUE_THRESHOLD ? " highlight" : "";
        rowsHtml += `
          <div class="summary-row${highlight}">
            <div class="summary-name">${d.displayName}</div>
            <div class="summary-value">£${d.totalValue.toLocaleString()}</div>
            <div class="summary-count">${d.count}</div>
            <div class="summary-bar-outer">
              <div class="summary-bar-inner" style="width:${pct}%;"></div>
            </div>
          </div>`;
      });

      summaryEl.innerHTML = `
        <div style="margin-bottom:10px;">
          <strong>Total Assets:</strong> ${totalCount}<br>
          <strong>Total Asset Value:</strong> £${totalValue.toLocaleString()}
        </div>
        <hr style="margin:10px 0;">
        <div style="font-size:13px;font-weight:bold;margin-bottom:6px;">Value per Engineer</div>
        <div class="summary-row" style="font-weight:bold;border-bottom:2px solid #ddd;">
          <div class="summary-name">Engineer</div>
          <div class="summary-value">Total £</div>
          <div class="summary-count">Count</div>
          <div class="summary-bar-outer" style="background:transparent;height:auto;">
            <span style="font-size:11px;color:#555;">Relative Value</span>
          </div>
        </div>
        ${rowsHtml || `<div style="font-size:13px;color:#555;margin-top:4px;">No assets currently assigned to engineers.</div>`}
      `;
    }

    function setSummarySort(mode) {
      if (mode !== "value" && mode !== "name") return;
      lastSummarySort = mode;
      if (currentAssets && currentAssets.length) renderValueSummary(currentAssets);
    }

    // ─────────────────────────────────────────────
    // EXPORT
    // FIX #5 — parallel fetches via Promise.all
    //          + loading overlay while building
    // ─────────────────────────────────────────────
    async function exportFullExcel() {
      if (!currentAssets || !currentAssets.length) {
        alert("No asset data available.");
        return;
      }

      const overlay = document.getElementById("exportOverlay");
      overlay.style.display = "flex";

      try {
        // Fetch all transfer histories in parallel
        const histories = await Promise.all(
          currentAssets.map(asset =>
            fetch(`${apiBase}/transfer-log?assetID=${asset.id}`)
              .then(r => r.json())
              .catch(() => [])
          )
        );

        const engineerTabs = {};

        currentAssets.forEach((asset, i) => {
          const engineer = asset.assignedTo || "Unassigned";
          if (!engineerTabs[engineer]) engineerTabs[engineer] = [];

          const history = histories[i] || [];

          engineerTabs[engineer].push({
            "Asset ID":         asset.id,
            "Name":             asset.name,
            "Category":         asset.category,
            "Serial":           asset.serial,
            "Value (£)":        asset.value,
            "Transfer Date":    asset.calibrationDate || "",
            "Images":           (asset.images || []).join("\n"),
            "History":          history.length
              ? history.map(h =>
                  `FROM: ${h.from}\nTO: ${h.to}\nDATE: ${h.timestamp}\nPDF: ${h.pdfURL || "—"}`
                ).join("\n\n")
              : "No transfer history"
          });
        });

        const wb = XLSX.utils.book_new();

        for (const engineer in engineerTabs) {
          const ws = XLSX.utils.json_to_sheet(engineerTabs[engineer]);
          XLSX.utils.book_append_sheet(wb, ws, engineer.replace(/\./g, "_").slice(0, 31));
        }

        XLSX.writeFile(wb, "Asset_History_Report.xlsx");
      } catch (e) {
        alert("Export failed. Please try again.");
      } finally {
        overlay.style.display = "none";
      }
    }

    // ─────────────────────────────────────────────
    // LOAD ASSETS
    // FIX #4 — try/catch with user-facing error
    // FIX #7 — assignedTo shown with spaces in table
    // FIX #8 — onerror fallback on thumbnails
    // FIX #10 — loading state shown before fetch
    // ─────────────────────────────────────────────
    async function loadAssets() {
      await loadPortalUsers();

      const tbody = document.querySelector("#assetTable tbody");
      tbody.innerHTML = `<tr class="table-status-row"><td colspan="9">Loading assets…</td></tr>`;

      let data;
      try {
        const res = await fetch(`${apiBase}/assets`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (e) {
        tbody.innerHTML = `<tr class="table-status-row"><td colspan="9">
          ⚠️ Failed to load assets. Please refresh the page or try again later.
        </td></tr>`;
        document.getElementById("valueSummary").innerHTML = "<strong>Summary unavailable.</strong>";
        return;
      }

      currentAssets = data.assets || [];
      renderValueSummary(currentAssets);

      tbody.innerHTML = "";

      if (!currentAssets.length) {
        tbody.innerHTML = `<tr class="table-status-row"><td colspan="9">No assets found.</td></tr>`;
        return;
      }

      currentAssets.forEach(a => {
        // FIX #8 — thumb with onerror fallback to full image
        let thumb = "—";
        if (a.images && a.images.length) {
          const thumbUrl = a.images[0].replace("asset-image", "asset-thumb");
          const fullUrl  = a.images[0];
          const imagesJson = JSON.stringify(a.images).replace(/'/g, "&#39;");
          thumb = `<img loading="lazy"
                        src="${thumbUrl}"
                        class="thumb-img"
                        onerror="this.src='${fullUrl}'"
                        onclick='openImageViewerFromTable(${imagesJson})'>`;
        }

        // FIX #7 — display name with spaces
        const displayName = (a.assignedTo || "").replace(/\./g, " ");

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${a.id}</td>
          <td>${a.name}</td>
          <td>${thumb}</td>
          <td>${a.category}</td>
          <td>${a.serial}</td>
          <td>${a.value}</td>
          <td>${displayName}</td>
          <td>${a.shared}</td>
          <td class="actions">
            <button class="editBtn">Edit</button>
            <button class="deleteBtn">Delete</button>
          </td>
        `;

        tr.querySelector(".editBtn").onclick   = () => openEditModal(a);
        tr.querySelector(".deleteBtn").onclick = () => deleteAsset(a.id);

        tbody.appendChild(tr);
      });
    }

    // ─────────────────────────────────────────────
    // SAVE
    // FIX #11 — validates required fields before POST
    // ─────────────────────────────────────────────
    async function saveAsset() {
      const assigned = document.getElementById("assignedField").value;
      if (assigned === "") {
        alert("Please select a user before saving.");
        return;
      }

      const id       = document.getElementById("idField").value.trim();
      const name     = document.getElementById("nameField").value.trim();
      const category = document.getElementById("categoryField").value.trim();

      // FIX #11 — basic required-field validation
      if (!id) { alert("Asset ID is required."); return; }
      if (!name) { alert("Asset Name is required."); return; }
      if (!category) { alert("Category is required."); return; }

      const body = {
        id,
        name,
        category,
        serial:          document.getElementById("serialField").value.trim(),
        value:           document.getElementById("valueField").value.trim(),
        assignedTo:      assigned,
        shared:          document.getElementById("sharedField").value,
        calibrationDate: document.getElementById("transferDateField").value.trim(),
        images:          currentAsset?.images || []
      };

      const route = currentEditId ? "/asset/update" : "/asset/add";

      try {
        const res = await fetch(`${apiBase}${route}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        const r = await res.json();
        alert(r.message || r.error);
        closeModal();
        loadAssets();
      } catch {
        alert("Save failed. Please try again.");
      }
    }

    // ─────────────────────────────────────────────
    // DELETE ASSET
    // FIX #3 — PIN collected in browser and sent to
    // worker for server-side validation. The worker
    // at /asset/delete must validate the PIN before
    // performing deletion. PIN is never stored or
    // checked client-side.
    // ─────────────────────────────────────────────
    async function deleteAsset(id) {
      if (!confirm(`Are you sure you want to delete asset ${id}?`)) return;

      const enteredPin = prompt("Enter PIN to confirm deletion:");
      if (enteredPin === null) return; // user cancelled

      try {
        const res = await fetch(`${apiBase}/asset/delete`, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id, pin: enteredPin })
        });

        const r = await res.json();

        // Worker returns { ok: false, error: "Invalid PIN" } if PIN wrong
        if (!r.ok && r.error) {
          alert(r.error);
          return;
        }

        alert(r.message || "Asset deleted.");
        loadAssets();
      } catch {
        alert("Delete failed. Please try again.");
      }
    }

    // ─────────────────────────────────────────────
    // INIT — deferred to DOMContentLoaded
    // ─────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => {
      loadAssets();
    });
  </script>

  <!-- auth.js loaded last so it has finished executing
       before the DOMContentLoaded callbacks fire -->

  <script src="auth.js"></script>

</body>
</html>
