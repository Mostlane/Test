<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js"></script>
  <script src="auth.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Assets (Admin) — Mostlane Portal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Segoe UI",system-ui,-apple-system,sans-serif; background:#eef1f5; color:#16202e; }
    header.page { background:linear-gradient(180deg,#1A4F8F,#003468); color:#fff; padding:14px 18px; display:flex; align-items:center; gap:12px; }
    header.page h1 { font-size:18px; margin:0; flex:1; color:#fff; }
    .wrap { max-width:1200px; margin:16px auto 40px; padding:0 14px; }
    .muted { color:#667085; font-size:13px; }
    .btn { background:#0066cc; color:#fff; border:none; border-radius:9px; padding:9px 14px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
    .btn.grey { background:#5b6b78; } .btn.red { background:#b00020; } .btn.green { background:#0c7d27; }
    .btn.small { padding:7px 11px; font-size:13px; font-weight:500; }
    .btn:disabled, .btn.disabled { opacity:.5; cursor:default; pointer-events:none; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; box-shadow:0 2px 10px rgba(6,24,54,.06); padding:16px; margin-bottom:14px; }

    /* Value summary */
    .kpis { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
    .kpi { background:#fff; border:1px solid #e2e8f0; border-radius:14px; box-shadow:0 2px 10px rgba(6,24,54,.06); padding:14px 18px; flex:1; min-width:150px; }
    .kpi b { display:block; font-size:26px; color:#003366; }
    .kpi span { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#667085; }
    .sumrow { display:grid; grid-template-columns:minmax(120px,1.4fr) 90px 54px 2fr; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid #f0f3f7; font-size:13.5px; }
    .sumrow:last-child { border-bottom:none; }
    .sumrow.head { font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:#667085; font-weight:700; }
    .sumrow.hot .sname { color:#0c7d3f; font-weight:700; }
    .sbar { height:9px; background:#eef1f5; border-radius:999px; overflow:hidden; }
    .sbar > i { display:block; height:100%; background:linear-gradient(90deg,#1A4F8F,#4d8bff); }

    .bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
    .bar h2 { margin:0; font-size:17px; color:#003366; }
    .bar input.search { flex:1; min-width:180px; padding:10px 12px; border:1px solid #ccd5dd; border-radius:9px; font-size:14px; font-family:inherit; }

    /* Asset table (desktop) */
    table { width:100%; border-collapse:collapse; background:#fff; border:1px solid #e2e8f0; border-radius:14px; overflow:hidden; box-shadow:0 2px 10px rgba(6,24,54,.06); }
    thead th { background:#f6f8fa; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:#667085; padding:10px 12px; }
    td { padding:10px 12px; border-top:1px solid #f0f3f7; font-size:13.5px; vertical-align:middle; }
    tr:hover td { background:#fafcff; }
    td .thumb { width:46px; height:46px; object-fit:cover; border-radius:8px; cursor:pointer; background:#f2f5f8; }
    .pill { font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px; }
    .pill.shared { background:#e2edff; color:#1a4f8f; } .pill.no { background:#eef1f4; color:#8a97a6; }
    td.acts { white-space:nowrap; } td.acts .btn { margin-left:4px; }

    /* Mobile cards */
    .mcards { display:none; }
    @media (max-width:820px){
      table { display:none; }
      .mcards { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
      .acard { background:#fff; border:1px solid #e2e8f0; border-radius:14px; box-shadow:0 2px 10px rgba(6,24,54,.06); padding:14px; }
      .acard .top { display:flex; gap:10px; }
      .acard img { width:52px; height:52px; object-fit:cover; border-radius:9px; background:#f2f5f8; flex:none; }
      .acard h3 { margin:0 0 2px; font-size:15px; color:#003366; }
      .acard p { margin:2px 0; font-size:13px; }
      .acard .acts { margin-top:10px; display:flex; gap:6px; }
      .acard .acts .btn { flex:1; }
      .sumrow { grid-template-columns:1fr 74px 40px; }
      .sumrow .sbar { display:none; }
    }

    /* Modal */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-start; justify-content:center; padding:16px; overflow:auto; z-index:500; }
    .overlay.open { display:flex; }
    .panel { background:#fff; border-radius:16px; width:100%; max-width:520px; padding:20px; margin-top:4vh; }
    .panel h2 { margin:0 0 12px; font-size:17px; color:#003366; }
    .panel label { font-size:12px; color:#667085; display:block; margin:10px 0 3px; }
    .panel input, .panel select { width:100%; padding:10px; border:1px solid #ccd5dd; border-radius:9px; font-size:16px; font-family:inherit; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .panel .acts { display:flex; gap:10px; justify-content:flex-end; margin-top:16px; }
    .gallery { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
    .gitem { position:relative; }
    .gitem img { width:66px; height:66px; object-fit:cover; border-radius:9px; border:1px solid #e2e8f0; cursor:pointer; }
    .gitem .del { position:absolute; top:-7px; right:-7px; width:20px; height:20px; border-radius:50%; background:#b00020; color:#fff; border:none; font-size:12px; line-height:20px; cursor:pointer; padding:0; }

    .viewer { display:none; position:fixed; inset:0; z-index:999; background:rgba(0,0,0,.88); justify-content:center; align-items:center; }
    .viewer img { max-width:92%; max-height:88%; border-radius:8px; }
    .viewer .close { position:absolute; top:14px; right:22px; color:#fff; font-size:34px; cursor:pointer; }
    .viewer .arrow { position:absolute; top:50%; transform:translateY(-50%); color:#fff; font-size:42px; cursor:pointer; padding:8px 16px; background:rgba(0,0,0,.35); border-radius:8px; user-select:none; }
    .viewer .left { left:12px; } .viewer .right { right:12px; }

    #exportOverlay { display:none; position:fixed; inset:0; z-index:1100; background:rgba(255,255,255,.85); flex-direction:column; align-items:center; justify-content:center; gap:14px; color:#003366; font-weight:600; }
    .spinner { width:38px; height:38px; border:4px solid #cfe0f5; border-top-color:#1A4F8F; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .msg { font-size:13.5px; margin-top:8px; } .msg.err { color:#b00020; }
  </style>
</head>
<body>
  <div id="exportOverlay"><div class="spinner"></div><span>Building export…</span></div>

  <header class="page">
    <h1>📦 All Assets</h1>
    <a class="ml-back" data-role="home" href="main.html">← Menu</a>
  </header>

  <div class="wrap">
    <div class="kpis">
      <div class="kpi"><b id="kpiCount">–</b><span>Total assets</span></div>
      <div class="kpi"><b id="kpiValue">–</b><span>Total value held</span></div>
    </div>

    <div class="card" style="padding:14px 16px;">
      <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:8px;">
        <h2 style="margin:0; font-size:15px; color:#003366; flex:1;">Value per person</h2>
        <button class="btn grey small" id="sortValue">Value ↓</button>
        <button class="btn grey small" id="sortName">Name A–Z</button>
        <button class="btn small" id="exportBtn">⬇ Export report</button>
      </div>
      <div id="summary"><span class="muted">Loading summary…</span></div>
    </div>

    <div class="bar">
      <h2>Assets</h2>
      <span class="muted" id="assetCount"></span>
      <input class="search" id="search" placeholder="Search name, serial, category, person…">
      <button class="btn" id="addBtn">+ Add asset</button>
    </div>

    <table>
      <thead><tr><th>ID</th><th>Item</th><th></th><th>Category</th><th>Serial</th><th>Value</th><th>Assigned to</th><th>Shared</th><th></th></tr></thead>
      <tbody id="rows"><tr><td colspan="9" class="muted">Loading assets…</td></tr></tbody>
    </table>
    <div class="mcards" id="mrows"></div>
  </div>

  <!-- Add / edit modal -->
  <div class="overlay" id="assetModal">
    <div class="panel">
      <h2 id="modalTitle">Add asset</h2>
      <div class="grid2">
        <div><label>Asset ID *</label><input id="f_id" placeholder="e.g. AST-101"></div>
        <div><label>Name *</label><input id="f_name" placeholder="e.g. Makita Drill"></div>
        <div><label>Category *</label><input id="f_category" placeholder="e.g. Power tools"></div>
        <div><label>Serial</label><input id="f_serial"></div>
        <div><label>Value (£)</label><input id="f_value" type="number" min="0" step="0.01"></div>
        <div><label>Transfer date</label><input id="f_date" type="date"></div>
        <div><label>Assigned to *</label><select id="f_assigned"></select></div>
        <div><label>Shared pool</label><select id="f_shared"><option value="no">No</option><option value="yes">Yes</option></select></div>
      </div>
      <label style="margin-top:12px;">Images</label>
      <div class="gallery" id="gallery"></div>
      <button class="btn grey small" id="uploadBtn" type="button" style="margin-top:8px;">📷 Upload image</button>
      <p class="msg muted" id="uploadHint" style="display:none;">Save the asset first, then re-open it to add images.</p>
      <p class="msg" id="modalMsg"></p>
      <div class="acts">
        <button class="btn grey" onclick="closeM('assetModal')">Cancel</button>
        <button class="btn" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Image viewer -->
  <div id="viewer" class="viewer">
    <span class="close" onclick="closeViewer()">&times;</span>
    <span class="arrow left" onclick="stepImg(-1)">&#10094;</span>
    <img id="viewerImg">
    <span class="arrow right" onclick="stepImg(1)">&#10095;</span>
  </div>

  <script>
    const API = window.MOSTLANE_API;
    const g = id => document.getElementById(id);
    const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
    function authFetch(path, opts = {}) {
      opts.headers = Object.assign({ "Authorization": "Bearer " + localStorage.getItem("mostlaneToken") }, opts.headers || {});
      return fetch(API + path, opts);
    }
    const openM = id => g(id).classList.add("open");
    const closeM = id => g(id).classList.remove("open");
    function thumbUrl(u) { const m = /[?&]key=([^&]+)/.exec(u || ""); return m ? API + "/asset-thumb?key=" + m[1] : u; }
    const HIGH_VALUE = 5000;

    let ASSETS = [], USERS = [], sortMode = "value";
    let editId = null, editAsset = null, viewList = [], viewIdx = 0;

    // Access: FullAccess or AssetAdmin only.
    (async () => {
      try {
        const me = await authFetch("/auth/me").then(r => r.json());
        if (!me.ok || !(me.user.FullAccess === "Yes" || me.user.AssetAdmin === "Yes")) {
          alert("This page needs Plant & Equipment admin rights."); location.href = "main.html"; return;
        }
      } catch (e) { location.href = "main.html"; return; }
      loadUsers();
      loadAssets();
    })();

    async function loadUsers() {
      try {
        const d = await authFetch("/users").then(r => r.json());
        USERS = (d.Users || []).filter(u => u.Username && u.Status !== "Not Active");  // already office→field order
      } catch (e) {}
    }

    async function loadAssets() {
      try {
        const d = await authFetch("/assets").then(r => r.json());
        ASSETS = (d && d.assets) || [];
        renderSummary(); renderTable();
      } catch (e) {
        g("rows").innerHTML = "<tr><td colspan='9' class='muted'>⚠️ Couldn't load assets — try again.</td></tr>";
        g("summary").innerHTML = "<span class='muted'>Summary unavailable.</span>";
      }
    }

    const numVal = a => { let v = parseFloat(String(a.value || "0").replace(/[£,]/g, "").trim()); return isNaN(v) ? 0 : v; };
    const nameOf = uname => { const u = USERS.find(x => x.Username === uname); return u ? ((u.FirstName || "") + " " + (u.LastName || "")).trim() : (uname || ""); };

    function renderSummary() {
      const total = ASSETS.reduce((t, a) => t + numVal(a), 0);
      g("kpiCount").textContent = ASSETS.length;
      g("kpiValue").textContent = "£" + total.toLocaleString();
      const per = {};
      ASSETS.forEach(a => {
        const h = a.assignedTo;
        if (!h || h === "Shared") return;
        (per[h] || (per[h] = { total: 0, count: 0 }));
        per[h].total += numVal(a); per[h].count++;
      });
      let data = Object.entries(per).map(([u, i]) => ({ u, name: nameOf(u) || u, total: i.total, count: i.count }));
      data.sort(sortMode === "name" ? (a, b) => a.name.localeCompare(b.name) : (a, b) => b.total - a.total);
      const max = data.length ? Math.max(...data.map(d => d.total)) : 0;
      g("summary").innerHTML =
        `<div class="sumrow head"><div>Person</div><div>Total £</div><div>Items</div><div>Relative value</div></div>` +
        (data.map(d => `
          <div class="sumrow ${d.total >= HIGH_VALUE ? "hot" : ""}">
            <div class="sname">${esc(d.name)}</div>
            <div>£${d.total.toLocaleString()}</div>
            <div>${d.count}</div>
            <div class="sbar"><i style="width:${max > 0 ? (d.total / max * 100) : 0}%"></i></div>
          </div>`).join("") || `<div class="muted" style="padding:6px 0;">No assets assigned to people yet.</div>`);
    }
    g("sortValue").onclick = () => { sortMode = "value"; renderSummary(); };
    g("sortName").onclick = () => { sortMode = "name"; renderSummary(); };

    function renderTable() {
      const q = g("search").value.trim().toLowerCase();
      const list = ASSETS.filter(a => !q ||
        [a.id, a.name, a.serial, a.category, a.assignedTo, nameOf(a.assignedTo)].some(v => String(v || "").toLowerCase().includes(q)));
      g("assetCount").textContent = ASSETS.length ? ASSETS.length + " item" + (ASSETS.length === 1 ? "" : "s") : "";
      if (!list.length) {
        g("rows").innerHTML = "<tr><td colspan='9' class='muted'>" + (ASSETS.length ? "No matches." : "No assets yet — tap “Add asset”.") + "</td></tr>";
        g("mrows").innerHTML = ASSETS.length ? "<p class='muted'>No matches.</p>" : "";
        return;
      }
      const holderCell = a => {
        const h = String(a.assignedTo || "").trim();
        if (!h || h.toLowerCase() === "shared") return `<span class="pill shared">Shared pool</span>`;
        return esc(nameOf(h) || h);
      };
      const thumb = a => (a.images && a.images.length)
        ? `<img class="thumb" src="${esc(thumbUrl(a.images[0]))}" data-view="${esc(a.id)}" alt="">` : "";
      g("rows").innerHTML = list.map(a => `
        <tr>
          <td>${esc(a.id)}</td>
          <td><b>${esc(a.name || "")}</b></td>
          <td>${thumb(a)}</td>
          <td>${esc(a.category || "")}</td>
          <td>${esc(a.serial || "")}</td>
          <td>${a.value ? "£" + esc(String(a.value).replace(/£/g, "")) : "—"}</td>
          <td>${holderCell(a)}</td>
          <td><span class="pill ${String(a.shared).toLowerCase() === "yes" ? "shared" : "no"}">${String(a.shared).toLowerCase() === "yes" ? "Yes" : "No"}</span></td>
          <td class="acts"><button class="btn grey small" data-edit="${esc(a.id)}">Edit</button><button class="btn red small" data-del="${esc(a.id)}">Delete</button></td>
        </tr>`).join("");
      g("mrows").innerHTML = list.map(a => `
        <div class="acard">
          <div class="top">
            ${(a.images && a.images.length) ? `<img src="${esc(thumbUrl(a.images[0]))}" data-view="${esc(a.id)}" alt="">` : `<img alt="" style="background:#f2f5f8">`}
            <div><h3>${esc(a.name || a.id)}</h3><p class="muted">${esc(a.id)} · ${esc(a.category || "—")}</p></div>
          </div>
          <p><b>Serial:</b> ${esc(a.serial || "—")}</p>
          <p><b>Value:</b> ${a.value ? "£" + esc(String(a.value).replace(/£/g, "")) : "—"}</p>
          <p><b>Held by:</b> ${holderCell(a)}</p>
          <div class="acts"><button class="btn grey small" data-edit="${esc(a.id)}">Edit</button><button class="btn red small" data-del="${esc(a.id)}">Delete</button></div>
        </div>`).join("");
    }
    g("search").addEventListener("input", renderTable);

    document.addEventListener("click", e => {
      const t = e.target;
      if (t.dataset.edit) { const a = ASSETS.find(x => x.id === t.dataset.edit); if (a) openEdit(a); }
      else if (t.dataset.del) delAsset(t.dataset.del);
      else if (t.dataset.view) { const a = ASSETS.find(x => x.id === t.dataset.view); if (a) openViewer(a.images || [], 0); }
    });

    // ── Add / edit ──
    function fillUsers(selected) {
      g("f_assigned").innerHTML = `<option value="">— Select person —</option>`
        + USERS.map(u => `<option value="${esc(u.Username)}"${u.Username === selected ? " selected" : ""}>${esc(((u.FirstName || "") + " " + (u.LastName || "")).trim() || u.Username)}</option>`).join("")
        + `<option value="Shared"${selected === "Shared" ? " selected" : ""}>🌐 Shared pool</option>`;
    }
    function openAdd() {
      editId = null; editAsset = null;
      g("modalTitle").textContent = "Add asset";
      ["f_id","f_name","f_category","f_serial","f_value"].forEach(i => g(i).value = "");
      g("f_id").disabled = false;
      g("f_shared").value = "no";
      g("f_date").value = new Date().toISOString().slice(0, 10);
      g("gallery").innerHTML = ""; g("uploadHint").style.display = "block"; g("modalMsg").textContent = "";
      fillUsers("");
      openM("assetModal");
    }
    function openEdit(a) {
      editId = a.id; editAsset = a;
      g("modalTitle").textContent = "Edit asset";
      g("f_id").value = a.id || ""; g("f_id").disabled = true;
      g("f_name").value = a.name || ""; g("f_category").value = a.category || "";
      g("f_serial").value = a.serial || ""; g("f_value").value = String(a.value || "").replace(/£/g, "");
      g("f_shared").value = String(a.shared || "no").toLowerCase();
      g("f_date").value = a.calibrationDate || new Date().toISOString().slice(0, 10);
      g("uploadHint").style.display = "none"; g("modalMsg").textContent = "";
      fillUsers(a.assignedTo || "");
      renderGallery();
      openM("assetModal");
    }
    g("addBtn").onclick = openAdd;

    g("saveBtn").onclick = async () => {
      const msg = g("modalMsg"); msg.className = "msg";
      const id = g("f_id").value.trim(), name = g("f_name").value.trim(), category = g("f_category").value.trim();
      if (!id || !name || !category) { msg.className = "msg err"; msg.textContent = "ID, name and category are required."; return; }
      const assigned = g("f_assigned").value;
      if (!assigned) { msg.className = "msg err"; msg.textContent = "Choose who it's assigned to (or Shared pool)."; return; }
      const body = {
        id, name, category,
        serial: g("f_serial").value.trim(),
        value: g("f_value").value.trim(),
        assignedTo: assigned,
        shared: g("f_shared").value,
        calibrationDate: g("f_date").value.trim(),
        images: (editAsset && editAsset.images) || []
      };
      g("saveBtn").disabled = true; msg.textContent = "Saving…";
      try {
        const r = await authFetch(editId ? "/asset/update" : "/asset/add", {
          method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body)
        }).then(r => r.json());
        if (r.error && !r.ok) throw new Error(r.error);
        closeM("assetModal"); loadAssets();
      } catch (err) { msg.className = "msg err"; msg.textContent = err.message || "Save failed."; }
      finally { g("saveBtn").disabled = false; }
    };

    async function delAsset(id) {
      if (!confirm(`Delete asset ${id}? This can't be undone.`)) return;
      try {
        const r = await authFetch("/asset/delete?id=" + encodeURIComponent(id), { method: "DELETE" }).then(r => r.json());
        if (r.error && !r.ok) { alert(r.error); return; }
        loadAssets();
      } catch (e) { alert("Delete failed — try again."); }
    }

    // ── Image gallery in the editor ──
    function renderGallery() {
      const imgs = (editAsset && editAsset.images) || [];
      g("gallery").innerHTML = imgs.map(u => `
        <div class="gitem"><img src="${esc(thumbUrl(u))}" data-full="${esc(u)}"><button class="del" data-delimg="${esc(u)}">×</button></div>`).join("");
    }
    g("gallery").addEventListener("click", e => {
      const t = e.target;
      if (t.dataset.delimg) delImage(t.dataset.delimg);
      else if (t.dataset.full) openViewer((editAsset.images || []), (editAsset.images || []).indexOf(t.dataset.full));
    });
    g("uploadBtn").onclick = () => {
      if (!editAsset) { alert("Save the asset first, then re-open it to add images."); return; }
      const input = document.createElement("input");
      input.type = "file"; input.accept = "image/*"; input.capture = "environment";
      input.onchange = async () => {
        const file = input.files[0]; if (!file) return;
        const form = new FormData(); form.append("file", file); form.append("assetId", editAsset.id);
        g("uploadBtn").disabled = true; g("uploadBtn").textContent = "Uploading…";
        try {
          const data = await authFetch("/upload-asset-image", { method: "POST", body: form }).then(r => r.json());
          if (!data.ok) throw new Error();
          editAsset.images = editAsset.images || []; editAsset.images.push(data.url);
          await authFetch("/asset/update", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(editAsset) });
          renderGallery();
        } catch (e) { alert("Upload failed — try again."); }
        finally { g("uploadBtn").disabled = false; g("uploadBtn").textContent = "📷 Upload image"; }
      };
      input.click();
    };
    async function delImage(url) {
      if (!editAsset || !confirm("Delete this image?")) return;
      const key = (url.split("key=")[1] || "").split("&")[0];
      try {
        const data = await authFetch("/delete-asset-image", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ assetId: editAsset.id, key }) }).then(r => r.json());
        if (!data.ok) { alert(data.error || "Couldn't delete image."); return; }
        editAsset.images = (editAsset.images || []).filter(u => u !== url);
        renderGallery();
      } catch (e) { alert("Couldn't delete image."); }
    }

    // ── Image viewer ──
    function openViewer(list, idx) { if (!list || !list.length) return; viewList = list; viewIdx = Math.max(0, idx); g("viewerImg").src = viewList[viewIdx]; g("viewer").style.display = "flex"; }
    function closeViewer() { g("viewer").style.display = "none"; g("viewerImg").src = ""; }
    function stepImg(d) { if (!viewList.length) return; viewIdx = (viewIdx + d + viewList.length) % viewList.length; g("viewerImg").src = viewList[viewIdx]; }
    window.addEventListener("keydown", e => { if (e.key === "Escape") closeViewer(); if (e.key === "ArrowRight") stepImg(1); if (e.key === "ArrowLeft") stepImg(-1); });

    // ── Excel export (per-person tabs with transfer history) ──
    g("exportBtn").onclick = async () => {
      if (!ASSETS.length) { alert("No assets to export."); return; }
      g("exportOverlay").style.display = "flex";
      try {
        const histories = await Promise.all(ASSETS.map(a =>
          authFetch("/transfer-log?assetID=" + encodeURIComponent(a.id)).then(r => r.json()).catch(() => [])));
        const tabs = {};
        ASSETS.forEach((a, i) => {
          const who = nameOf(a.assignedTo) || a.assignedTo || "Unassigned";
          (tabs[who] || (tabs[who] = [])).push({
            "Asset ID": a.id, "Name": a.name, "Category": a.category, "Serial": a.serial,
            "Value (£)": a.value, "Transfer Date": a.calibrationDate || "",
            "Images": (a.images || []).join("\n"),
            "History": (histories[i] || []).length
              ? histories[i].map(h => `FROM: ${h.from}\nTO: ${h.to}\nDATE: ${h.timestamp || h.acceptedAt || ""}`).join("\n\n")
              : "No transfer history"
          });
        });
        const wb = XLSX.utils.book_new();
        for (const who in tabs) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tabs[who]), who.replace(/[^\w ]/g, "").slice(0, 31) || "Sheet");
        XLSX.writeFile(wb, "Mostlane_Assets_Report.xlsx");
      } catch (e) { alert("Export failed — try again."); }
      finally { g("exportOverlay").style.display = "none"; }
    };
  </script>
</body>
</html>
