<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js?v=2"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>On-Call — Mostlane Portal</title>
  <script src="auth.js"></script>
  <style>
    :root{ --ml-blue:#003b82; --border:#d1d5db; --muted:#6b7280; }
    html,body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:#0f172a; background:#e6e8eb; }
    .shell{ max-width:560px; margin:20px auto 40px; padding:0 12px; }
    .card{ background:#fff; border-radius:14px; padding:18px; box-shadow:0 12px 28px rgba(0,0,0,.10); border:1px solid rgba(15,23,42,.05); margin-bottom:14px; }
    header{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
    h1{ margin:0; font-size:20px; color:var(--ml-blue); }
    .back-btn{ text-decoration:none; font-size:14px; padding:8px 12px; border-radius:999px; background:#fff; border:1px solid var(--border); color:var(--ml-blue); }
    .who{ border:1px solid var(--border); border-radius:12px; padding:14px; margin:8px 0; }
    .who .role{ font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:700; }
    .who .name{ font-size:22px; font-weight:700; color:var(--ml-blue); margin:2px 0; }
    .who .meta{ font-size:12px; color:var(--muted); }
    label{ display:block; font-size:13px; font-weight:600; color:var(--ml-blue); margin:12px 0 4px; }
    select{ width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:15px; background:#fff; }
    .btn{ display:inline-block; border:none; background:var(--ml-blue); color:#fff; padding:11px 18px; border-radius:9px; font-size:15px; font-weight:600; cursor:pointer; margin-top:14px; text-decoration:none; }
    .msg{ font-size:13px; margin-top:10px; min-height:16px; }
    .msg.ok{ color:#0e7a3b; font-weight:600; } .msg.err{ color:#b91c1c; font-weight:600; }
    .foot{ text-align:center; }
    .foot a{ color:var(--ml-blue); font-size:13px; }
  </style>
</head>
<body>
<div class="shell">
  <div class="card">
    <header>
      <h1>📞 On-Call</h1>
      <a class="ml-back" data-role="home" href="main.html">← Menu</a>
    </header>
    <div class="who">
      <div class="role">On-call engineer</div>
      <div class="name" id="curEng">—</div>
      <div class="meta" id="curEngMeta"></div>
    </div>
    <div class="who">
      <div class="role">On-call manager</div>
      <div class="name" id="curMgr">—</div>
      <div class="meta" id="curMgrMeta"></div>
    </div>
  </div>

  <div class="card">
    <h1 style="font-size:15px;">Change on-call</h1>
    <label>On-call engineer</label>
    <select id="selEng"><option value="">— no change —</option></select>
    <label>On-call manager</label>
    <select id="selMgr"><option value="">— no change —</option></select>
    <button class="btn" id="saveBtn">Save on-call settings</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="foot"><a href="oncall-history.html">View change history →</a></div>
</div>

<script>
const API = window.MOSTLANE_API;
const $ = id => document.getElementById(id);
function authFetch(url, init = {}){
  init.headers = new Headers(init.headers || {});
  const t = localStorage.getItem("mostlaneToken");
  if (t && !init.headers.has("Authorization")) init.headers.set("Authorization", "Bearer " + t);
  return fetch(url, init);
}
function fmt(iso){ try { return new Date(iso.replace(" ", "T") + "Z").toLocaleString("en-GB"); } catch { return iso || ""; } }

async function load(){
  try{
    const [cur, usersRes] = await Promise.all([
      authFetch(`${API}/oncall/current`, {cache:"no-store"}).then(r=>r.json()),
      authFetch(`${API}/users`, {cache:"no-store"}).then(r=>r.json())
    ]);
    if(cur.ok){
      $("curEng").textContent = cur.engineer?.name || "Not set";
      $("curEngMeta").textContent = cur.engineer ? `Set ${fmt(cur.engineer.set_at)} by ${cur.engineer.set_by || "—"}` : "";
      $("curMgr").textContent = cur.manager?.name || "Not set";
      $("curMgrMeta").textContent = cur.manager ? `Set ${fmt(cur.manager.set_at)} by ${cur.manager.set_by || "—"}` : "";
    }
    const users = (usersRes.Users || []).filter(u => (u.Status || "Active") !== "Disabled");
    const opts = users.map(u => {
      const name = `${u.FirstName || ""} ${u.LastName || ""}`.trim() || u.Username;
      return `<option value="${name.replace(/"/g,"&quot;")}">${name}</option>`;
    }).join("");
    $("selEng").innerHTML = '<option value="">— no change —</option>' + opts;
    $("selMgr").innerHTML = '<option value="">— no change —</option>' + opts;
  }catch(e){ $("msg").className = "msg err"; $("msg").textContent = "Couldn't load — check connection."; }
}

$("saveBtn").addEventListener("click", async () => {
  const engineer = $("selEng").value, manager = $("selMgr").value;
  if(!engineer && !manager){ $("msg").className="msg err"; $("msg").textContent = "Pick a new engineer and/or manager first."; return; }
  $("msg").className = "msg"; $("msg").textContent = "Saving…";
  try{
    const r = await (await authFetch(`${API}/oncall/set`, { method:"POST",
      headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ engineer, manager }) })).json();
    if(!r.ok) throw new Error(r.error || "Save failed");
    $("msg").className = "msg ok"; $("msg").textContent = "✔ Updated.";
    $("selEng").value = ""; $("selMgr").value = "";
    load();
  }catch(e){ $("msg").className = "msg err"; $("msg").textContent = e.message; }
});

load();
</script>
</body>
</html>
