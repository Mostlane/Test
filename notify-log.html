<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js"></script>
  <script src="auth.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Log — Mostlane Portal</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Segoe UI",system-ui,-apple-system,sans-serif; background:#eef1f5; color:#16202e; }
    header.page { background:linear-gradient(180deg,#1A4F8F,#003468); color:#fff; padding:14px 18px; display:flex; align-items:center; gap:12px; }
    header.page h1 { font-size:18px; margin:0; flex:1; color:#fff; }
    .wrap { max-width:1000px; margin:16px auto 40px; padding:0 14px; }
    .muted { color:#667085; font-size:13px; }
    .bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
    .bar select { padding:9px 10px; border:1px solid #ccd5dd; border-radius:9px; font-size:14px; font-family:inherit; background:#fff; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:14px; box-shadow:0 2px 10px rgba(6,24,54,.06); overflow:hidden; }
    .row { display:flex; gap:12px; align-items:flex-start; padding:11px 14px; border-top:1px solid #f0f3f7; font-size:13.5px; }
    .row:first-child { border-top:none; }
    .row .when { flex:none; width:140px; color:#667085; font-size:12.5px; line-height:1.5; }
    .row .who { font-weight:700; color:#003366; }
    .act { font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px; white-space:nowrap; }
    .act.shown { background:#e2f5e6; color:#0c7d27; }
    .act.snoozed { background:#fff4e0; color:#9a6200; }
    .act.dismissed { background:#eef1f4; color:#556; }
    .act.opened { background:#e2edff; color:#1a4f8f; }
    .items { color:#3a4a5c; margin-top:3px; font-size:12.5px; line-height:1.55; }
    @media (max-width:640px){ .row { flex-direction:column; gap:4px; } .row .when { width:auto; } }
  </style>
</head>
<body>
  <header class="page">
    <h1>🔔 Notification Log</h1>
    <a class="ml-back" data-role="up" href="users-admin.html">← Users Admin</a>
  </header>

  <div class="wrap">
    <p class="muted" style="margin:0 0 12px;">Every time the notification screen appears on someone's phone (or the panel on desktop),
      it's recorded here with a timestamp — including when they put it off or opened an item. If someone says theirs never showed, check this.</p>
    <div class="bar">
      <select id="fUser"><option value="">Everyone</option></select>
      <select id="fDays">
        <option value="7">Last 7 days</option>
        <option value="14" selected>Last 14 days</option>
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
      </select>
      <span class="muted" id="countLbl"></span>
    </div>
    <div class="card" id="list"><div class="row muted">Loading…</div></div>
  </div>

  <script>
    const API = window.MOSTLANE_API;
    const g = id => document.getElementById(id);
    const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
    function authFetch(path, opts = {}) {
      opts.headers = Object.assign({ "Authorization": "Bearer " + localStorage.getItem("mostlaneToken") }, opts.headers || {});
      return fetch(API + path, opts);
    }

    let USERS = [];

    (async () => {
      try {
        const me = await authFetch("/auth/me").then(r => r.json());
        if (!me.ok || me.user.FullAccess !== "Yes") { alert("This page needs Full Access."); location.href = "main.html"; return; }
      } catch (e) { location.href = "main.html"; return; }
      try {
        const d = await authFetch("/users").then(r => r.json());
        USERS = (d.Users || []).filter(u => u.Username);
        g("fUser").innerHTML = '<option value="">Everyone</option>' + USERS.map(u =>
          `<option value="${esc(u.Username)}">${esc(((u.FirstName || "") + " " + (u.LastName || "")).trim() || u.Username)}</option>`).join("");
      } catch (e) {}
      load();
    })();

    const nameOf = uname => { const u = USERS.find(x => x.Username === uname); return u ? ((u.FirstName || "") + " " + (u.LastName || "")).trim() : (uname || ""); };
    const ACT = {
      shown:     ["shown", "✅ Shown"],
      snoozed:   ["snoozed", "💤 Put off"],
      dismissed: ["dismissed", "✕ Dismissed"],
      opened:    ["opened", "↗ Opened"],
    };
    const PAGE = { "my-assets.html": "Plant & Equipment", "holiday.html": "Holiday", "holiday-admin.html": "Holiday Admin" };

    async function load() {
      g("list").innerHTML = "<div class='row muted'>Loading…</div>";
      const q = "?days=" + g("fDays").value + (g("fUser").value ? "&user=" + encodeURIComponent(g("fUser").value) : "");
      try {
        const d = await authFetch("/notify/log" + q).then(r => r.json());
        if (!d.ok) throw new Error(d.error || "Failed");
        const log = d.log || [];
        g("countLbl").textContent = log.length ? log.length + " event" + (log.length === 1 ? "" : "s") : "";
        if (!log.length) { g("list").innerHTML = "<div class='row muted'>Nothing logged in this period.</div>"; return; }
        g("list").innerHTML = log.map(r => {
          const a = ACT[r.action] || ["dismissed", esc(r.action)];
          let items = [];
          try { items = JSON.parse(r.items || "[]"); } catch (e) {}
          const what = items.map(i => {
            const s = i.snoozes ? ` <span class="muted">(reminder ${Math.min(i.snoozes, 2)} of 2 used)</span>` : "";
            return "• " + esc(i.title || PAGE[i.href] || i.href) + s;
          }).join("<br>");
          const when = r.at ? new Date(r.at).toLocaleString("en-GB", { dateStyle: "medium", timeStyle: "short" }) : "";
          return `<div class="row">
            <div class="when">${esc(when)}<br>${r.surface === "mobile" ? "📱 Phone" : "🖥️ Desktop"}</div>
            <div style="flex:1;">
              <span class="who">${esc(nameOf(r.username) || r.username)}</span>
              <span class="act ${a[0]}">${a[1]}</span>
              <div class="items">${what || "<span class='muted'>—</span>"}</div>
            </div>
          </div>`;
        }).join("");
      } catch (e) { g("list").innerHTML = "<div class='row muted'>Couldn't load the log — try again.</div>"; }
    }
    g("fUser").addEventListener("change", load);
    g("fDays").addEventListener("change", load);
  </script>
</body>
</html>
