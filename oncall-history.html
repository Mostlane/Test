<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>On-Call History — Mostlane Portal</title>
  <script src="auth.js"></script>
  <style>
    :root{ --ml-blue:#003b82; --border:#d1d5db; --muted:#6b7280; }
    html,body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:#0f172a; background:#e6e8eb; }
    .shell{ max-width:640px; margin:20px auto 40px; padding:0 12px; }
    .card{ background:#fff; border-radius:14px; padding:18px; box-shadow:0 12px 28px rgba(0,0,0,.10); border:1px solid rgba(15,23,42,.05); }
    header{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; }
    h1{ margin:0; font-size:20px; color:var(--ml-blue); }
    .back-btn{ text-decoration:none; font-size:14px; padding:8px 12px; border-radius:999px; background:#fff; border:1px solid var(--border); color:var(--ml-blue); }
    table{ width:100%; border-collapse:collapse; font-size:13px; }
    th,td{ text-align:left; padding:8px 10px; border-bottom:1px solid #eef1f5; }
    th{ background:#f7f9fb; color:#475569; font-weight:600; }
    .pill{ display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; }
    .pill.engineer{ background:#dbeafe; color:#1e40af; }
    .pill.manager{ background:#fef3c7; color:#92400e; }
    .muted{ color:var(--muted); }
  </style>
</head>
<body>
<div class="shell">
  <div class="card">
    <header>
      <h1>📜 On-Call History</h1>
      <a href="oncall_current.html" class="back-btn">← Current</a>
    </header>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>When</th><th>Role</th><th>Name</th><th>Set by</th></tr></thead>
        <tbody id="rows"><tr><td colspan="4" class="muted">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = window.MOSTLANE_API;
function authFetch(url, init = {}){
  init.headers = new Headers(init.headers || {});
  const t = localStorage.getItem("mostlaneToken");
  if (t && !init.headers.has("Authorization")) init.headers.set("Authorization", "Bearer " + t);
  return fetch(url, init);
}
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
function fmt(iso){ try { return new Date(iso.replace(" ", "T") + "Z").toLocaleString("en-GB"); } catch { return iso || ""; } }
(async () => {
  const el = document.getElementById("rows");
  try{
    const r = await (await authFetch(`${API}/oncall/history`, {cache:"no-store"})).json();
    const h = r.history || [];
    if(!h.length){ el.innerHTML = '<tr><td colspan="4" class="muted">No changes recorded yet.</td></tr>'; return; }
    el.innerHTML = h.map(x => `<tr>
      <td class="muted">${fmt(x.set_at)}</td>
      <td><span class="pill ${esc(x.role)}">${esc(x.role)}</span></td>
      <td><b>${esc(x.name)}</b></td>
      <td>${esc(x.set_by || "—")}</td>
    </tr>`).join("");
  }catch(e){ el.innerHTML = '<tr><td colspan="4" class="muted">Failed to load.</td></tr>'; }
})();
</script>
</body>
</html>
