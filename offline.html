<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline — Mostlane</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:#0b1930;color:#e5ecff;}
  .box{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:14px;}
  img{width:96px;height:96px;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.4);}
  h1{font-size:20px;margin:6px 0 0;}
  p{font-size:15px;line-height:1.5;color:#b9c6e6;max-width:340px;margin:0;}
  button{margin-top:8px;background:#1e66ff;color:#fff;border:none;border-radius:10px;padding:12px 22px;font:600 15px system-ui;cursor:pointer;}
</style>
</head>
<body>
  <div class="box">
    <img src="/icons/icon-192.png" alt="Mostlane">
    <h1>You're offline</h1>
    <p>Mostlane couldn't reach the internet. Check your signal or Wi-Fi and try again — pages you've opened before will still work.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
