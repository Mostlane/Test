<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js?v=2"></script>
  <script src="auth.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help — Mostlane Portal</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Segoe UI",system-ui,-apple-system,sans-serif; background:#eef1f5; color:#16202e; }
    header.page { background:linear-gradient(180deg,#1A4F8F,#003468); color:#fff; padding:14px 18px; display:flex; align-items:center; gap:12px; }
    header.page h1 { font-size:18px; margin:0; flex:1; color:#fff; }
    .wrap { max-width:860px; margin:16px auto 60px; padding:0 14px; }
    .muted { color:#667085; font-size:13px; }
    input.search { width:100%; padding:12px 14px; border:1px solid #ccd5dd; border-radius:11px; font-size:15px; font-family:inherit; margin-bottom:16px; }

    .grp { margin:22px 0 8px; }
    .grp h2 { font-size:13px; text-transform:uppercase; letter-spacing:.8px; color:#667085; margin:0 0 8px 4px; }
    .art { background:#fff; border:1px solid #e2e8f0; border-radius:14px; box-shadow:0 2px 10px rgba(6,24,54,.06); margin-bottom:10px; overflow:hidden; }
    .art > button.head { display:flex; align-items:center; gap:12px; width:100%; background:none; border:none; padding:14px 16px; font-family:inherit; font-size:15px; font-weight:600; color:#003366; cursor:pointer; text-align:left; }
    .art > button.head .ico { font-size:22px; flex:none; }
    .art > button.head .chev { margin-left:auto; color:#9fb2c8; font-size:20px; transition:transform .15s; flex:none; }
    .art.open > button.head .chev { transform:rotate(90deg); }
    .art .body { display:none; padding:0 18px 16px; }
    .art.open .body { display:block; }
    .art .body p.intro { margin:0 0 10px; font-size:14px; color:#3a4a5c; }
    .art .body ol { margin:0; padding-left:22px; }
    .art .body li { margin:0 0 12px; font-size:14px; line-height:1.6; }
    .art .body li b { color:#003366; }
    .art .body img.shot { display:block; max-width:250px; width:100%; border:1px solid #d7dee6; border-radius:12px; margin:8px 0 2px; cursor:zoom-in; box-shadow:0 2px 8px rgba(6,24,54,.10); }
    .art .body img.shot.wide { max-width:100%; }
    .tip { background:#f0f6ff; border:1px solid #cfe0f5; border-radius:9px; padding:9px 12px; font-size:13px; margin:10px 0 0; }

    .lightbox { display:none; position:fixed; inset:0; z-index:999; background:rgba(0,0,0,.9); justify-content:center; align-items:center; cursor:zoom-out; }
    .lightbox img { max-width:94%; max-height:92%; border-radius:10px; }
    #noneMsg { background:#fff; border:1px dashed #ccd5dd; border-radius:12px; padding:16px; color:#667085; font-size:14px; display:none; }
  </style>
</head>
<body>
  <header class="page">
    <h1>❓ Help &amp; guides</h1>
    <a class="ml-back" data-role="home" href="main.html">← Menu</a>
  </header>

  <div class="wrap">
    <p class="muted" style="margin:0 0 12px;">Step-by-step guides for your portal. You only see guides for the areas you can use — if a section you need is missing, ask the office to check your permissions.</p>
    <input class="search" id="search" placeholder="Search the guides… e.g. transfer, holiday, password">
    <div id="list"><p class="muted">Loading your guides…</p></div>
    <div id="noneMsg">No guides match your search.</div>
  </div>

  <div class="lightbox" id="lightbox"><img id="lightImg" alt=""></div>

          ["Open <b>SiteLog</b> from the menu and tap <b>Scan in / out of site</b> when you arrive or leave.", "sitelog.png"],
          ["The first time, your phone links itself to your name automatically — no separate login."],
          ["The office can see who's on which site — used for fire roll-call and lone-working checks, so scan every time."],
        ]},
        { icon: "📁", title: "Projects", perms: ["Projects", "ProjectsAdmin"], steps: [
          ["<b>Projects</b> holds the drawings, documents and files for each job you're working on.", "projects.png"],
          ["Tap a project to open its file list, then tap a file to view or download it on site."],
          ["<b>Projects Admin</b> (separate permission) is where the office creates projects and uploads or replaces the files."],
        ]},
        { icon: "🧾", title: "Raise a purchase order", perms: ["PurchaseOrders"], steps: [
          ["Tap <b>PO System</b> on the menu — it opens on your personal link, so your orders are already under your name."],
          ["Raise the PO <b>before</b> you buy; the office sees it immediately."],
          ["Use the <b>🏠 button</b> inside the PO system to come back to the portal."],
        ]},
        { icon: "🦺", title: "H&S plans", perms: ["HSPlan"], steps: [
          ["Tap <b>H&amp;S Plans</b> on the menu — it signs you straight into the planner.", "hsplan.png"],
          ["Work down the numbered sections (project details, hazards, controls…) — the finished document builds itself as you type, and your answers save automatically."],
          ["<b>Save to cloud</b> stores the plan so the office can see it; <b>Save / Print PDF</b> makes the copy for site. <b>← Library</b> lists your saved plans."],
        ]},
        { icon: "📝", title: "Forms", perms: ["Forms"], steps: [
          ["<b>Forms</b> is the launcher for the paperwork forms — van checks, van handover, tools and compliance.", "forms.png"],
          ["Pick the form, fill it in and submit — the office receives it automatically."],
        ]},
        { icon: "✔️", title: "Compliance", perms: ["Compliance"], steps: [
          ["<b>Compliance</b> holds the client-specific compliance paperwork, grouped by client.", "compliance.png"],
          ["Pick the client, then follow the form for the work you're doing. Use <b>Other</b> for anything that doesn't fit a listed client."],
        ]},
        { icon: "⚡", title: "My Day (guided mode)", perms: ["StoryMode"], steps: [
          ["Your whole day runs from <b>My Day</b> — three tabs across the top: <b>1 · Start</b>, <b>2 · Jobs</b>, <b>3 · Finish</b>.", "myday.png"],
          ["<b>Start:</b> on Wednesdays complete the weekly vehicle check (tick each item, note any defects), enter your van's mileage, and tap <b>▶ Start my day</b> — your start time and location are recorded."],
          ["<b>Jobs:</b> you get one job at a time — travel to site, complete the <b>risk assessment</b>, do the work, then close it with a note, photo and signature (or quote / order / hold if it can't be finished)."],
          ["<b>Finish:</b> end your day from the third tab to log your finish time and see your day's summary."],
          ["The floating <b>⚡ button</b> on any other page always brings you back to My Day."],
        ]},
      ]},
    ];

    // ── Permission gate: FullAccess sees all; otherwise any-of. ──
    function allowed(a, perms) {
      if (a.perms === "always") return true;
      if (String(perms.FullAccess) === "Yes") return true;
      return a.perms.some(k => String(perms[k]) === "Yes");
    }

    function render(perms) {
      const q = g("search").value.trim().toLowerCase();
      let html = "", shown = 0;
      GROUPS.forEach(grp => {
        const arts = grp.arts.filter(a => allowed(a, perms)).filter(a => {
          if (!q) return true;
          const text = (a.title + " " + (a.intro || "") + " " + a.steps.map(s => s[0]).join(" ")).toLowerCase();
          return text.includes(q);
        });
        if (!arts.length) return;
        html += `<div class="grp"><h2>${grp.title}</h2>` + arts.map(a => {
          shown++;
          const steps = a.steps.map(s =>
            `<li>${s[0]}${s[1] ? `<img class="shot${s[2] ? " wide" : ""}" src="help-img/${s[1]}" alt="" loading="lazy">` : ""}</li>`).join("");
          return `<div class="art" data-art>
            <button class="head"><span class="ico">${a.icon}</span>${a.title}<span class="chev">›</span></button>
            <div class="body">${a.intro ? `<p class="intro">${a.intro}</p>` : ""}<ol>${steps}</ol></div>
          </div>`;
        }).join("") + "</div>";
      });
      g("list").innerHTML = html;
      g("noneMsg").style.display = shown ? "none" : "block";
      if (q && shown) document.querySelectorAll(".art").forEach(el => el.classList.add("open"));
    }

    // Instant paint from cached permissions, then refresh from the server.
    let PERMS = {};
    try { PERMS = JSON.parse(sessionStorage.getItem("mostlanePermissions") || localStorage.getItem("mostlanePermissions") || "{}"); } catch (e) {}
    render(PERMS);
    (async () => {
      try {
        const r = await fetch(window.MOSTLANE_API + "/auth/me", { headers: { "Authorization": "Bearer " + localStorage.getItem("mostlaneToken") } });
        const d = await r.json();
        if (d && d.ok && d.user && JSON.stringify(d.user) !== JSON.stringify(PERMS)) { PERMS = d.user; render(PERMS); }
      } catch (e) {}
    })();

    g("search").addEventListener("input", () => render(PERMS));
    document.addEventListener("click", e => {
      const head = e.target.closest(".art > .head");
      if (head) { head.parentElement.classList.toggle("open"); return; }
      const img = e.target.closest("img.shot");
      if (img) { g("lightImg").src = img.src; g("lightbox").style.display = "flex"; }
    });
    g("lightbox").addEventListener("click", () => { g("lightbox").style.display = "none"; g("lightImg").src = ""; });
    window.addEventListener("keydown", e => { if (e.key === "Escape") { g("lightbox").style.display = "none"; } });
  </script>
