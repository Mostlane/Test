<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Timesheet — Mostlane</title>
<script src="/portal-config.js?v=2"></script>
<script src="auth.js"></script>
<style>
  :root{--ink:#0f1b2a;--line:#e4e9f1;--brand:#1A4F8F;--brand2:#003468;--muted:#68758a;--ok:#0e7a3c;--bg:#eef1f6;--card:#fff;--r:16px}
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;padding-bottom:calc(76px + env(safe-area-inset-bottom))}
  header.page{background:linear-gradient(160deg,#1A4F8F,#003468);color:#fff;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40;box-shadow:0 2px 12px rgba(3,22,52,.25)}
  header.page a{color:#fff;text-decoration:none;font-size:15px}
  header.page h1{font-size:17px;flex:1;font-weight:700;letter-spacing:.2px}
  .wrap{max-width:680px;margin:14px auto;padding:0 12px}
  .muted{color:var(--muted)}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 14px;font:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:600}
  .btn:disabled{opacity:.5;cursor:default}
  .btn:active{transform:scale(.97)}
  /* week bar */
  .bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:8px;box-shadow:0 2px 10px rgba(10,30,60,.05)}
  .bar .nav{width:44px;height:44px;border-radius:12px;font-size:19px;flex:none;display:flex;align-items:center;justify-content:center;border:none;background:#f2f5fa;color:var(--brand);font-weight:700}
  .wk{flex:1;text-align:center;line-height:1.25}
  .wk b{font-size:16px;display:block}
  .wk span{font-size:12px;color:var(--muted)}
  /* day cards */
  .card{background:var(--card);border-radius:var(--r);box-shadow:0 2px 10px rgba(10,30,60,.06);margin-bottom:10px;overflow:hidden;border:1px solid rgba(228,233,241,.7)}
  .dhead{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;font:inherit;text-align:left;padding:14px;min-height:60px;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .dhead .dow{display:flex;flex-direction:column;line-height:1.15;min-width:86px}
  .dhead .dow b{font-size:16px}
  .dhead .dow span{font-size:12px;color:var(--muted)}
  .dhead .sum{margin-left:auto;text-align:right;line-height:1.2}
  .dhead .sum .paid{font-weight:800;color:var(--ok);font-size:16px}
  .dhead .sum .times{font-size:12px;color:var(--muted)}
  .dhead .sum .empty{font-size:14px;color:#9aa8bd;font-weight:600}
  .dhead .chev{flex:none;color:#b6c2d4;font-size:19px;transition:transform .18s;margin-left:2px}
  .card.open .chev{transform:rotate(90deg)}
  .card.wknd .dhead .dow b::after{content:" ·";color:#e3b341}
  .cbody{display:none;padding:2px 14px 14px;border-top:1px solid #f0f3f8}
  .card.open .cbody{display:block}
  /* time entry */
  .times2{display:flex;gap:10px;margin:12px 0 4px}
  .tfield{flex:1}
  .tfield label{display:block;font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin:0 0 5px 3px}
  input[type=time]{font:inherit;font-size:18px;font-weight:600;width:100%;height:50px;text-align:center;border:1.5px solid #d5dde9;border-radius:13px;background:#f8fafd;color:var(--ink)}
  input[type=time]:focus,input[type=text]:focus,input[type=number]:focus,textarea:focus{outline:none;border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px rgba(26,79,143,.12)}
  input[type=text],input[type=number],textarea{font:inherit;padding:12px;border:1.5px solid #d5dde9;border-radius:13px;width:100%;background:#f8fafd}
  .jobs{height:48px}
  .joblist{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .jpill{background:#eef4fb;border:1.5px solid #cfdff4;color:#0e3a6d;border-radius:12px;padding:9px 6px 9px 12px;font-size:14px;font-weight:600;display:inline-flex;gap:4px;align-items:center;max-width:100%}
  .jpill i{font-style:normal;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .jpill button{border:none;background:none;color:#8aa2c0;font-size:16px;padding:0 7px;cursor:pointer;line-height:1}
  .joblist input.jobs{flex:1;min-width:150px;width:auto}
  .flab{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin:12px 0 5px 3px}
  .row{margin:0}
  /* deduction + assigned chips */
  .dedrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .ded{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);background:#f2f5fa;border-radius:999px;padding:4px 10px}
  .ded.off{opacity:.4;text-decoration:line-through}
  .booked{display:flex;gap:7px;flex-wrap:wrap;margin:4px 0 2px}
  .bk{appearance:none;border:1.5px solid #cfe0f5;background:linear-gradient(180deg,#f4f9ff,#e9f2fd);color:#0e3a6d;border-radius:12px;padding:8px 12px;font-size:13.5px;font-weight:600;cursor:pointer;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .bk:active{transform:scale(.97)}
  .bk.used{opacity:.45;border-style:dashed}
  .bk .t{color:#5b7ca6;font-weight:700;margin-right:5px}
  .sugrow{display:flex;gap:6px;flex-wrap:wrap;margin:7px 0 2px}
  .sug{appearance:none;border:1px solid #bfdbfe;background:#eff6ff;color:#1e40af;border-radius:999px;padding:7px 12px;font-size:13px;cursor:pointer;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* mileage */
  .mi{margin-top:12px}
  .mirow{display:flex;gap:8px;align-items:center;margin:7px 0;background:#f6f9fc;border:1px solid #e8eef6;border-radius:12px;padding:9px 8px 9px 12px;font-size:14.5px}
  .mirow .btn{padding:7px 11px;flex:none;border-radius:10px}
  /* totals */
  .tot{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .tot span{background:#f6f9fc;border-radius:12px;padding:10px 6px;text-align:center;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .tot b{display:block;font-size:17px;color:var(--ink);letter-spacing:0;text-transform:none;margin-top:2px}
  .pad{padding:14px}
  /* invoice */
  .inv h3{margin-bottom:8px;font-size:16px}
  .invrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0}
  .invlist{margin-top:8px;border-top:1px solid var(--line)}
  .invlist a{color:var(--brand);font-weight:600;text-decoration:none}
  .invlist .li{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9;font-size:14px;align-items:center}
  .banner{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;border-radius:13px;padding:11px 13px;margin-bottom:10px;font-size:14px}
  /* save status */
  .savebar{position:fixed;left:0;right:0;bottom:0;padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;justify-content:center;z-index:50;pointer-events:none}
  .savebar .st{background:rgba(15,27,42,.85);color:#e8eef7;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:999px;padding:8px 18px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(3,22,52,.3);transition:opacity .3s}
  #adminLink{margin-left:auto;font-size:13px;background:rgba(255,255,255,.15);padding:6px 10px;border-radius:9px;display:none}
</style>
</head>
<body>
<header class="page"><a href="/main.html">‹ Back</a><h1>⏱️ My Timesheet</h1><a id="adminLink" href="timesheets-admin.html">⚙ Admin</a></header>
<script>
  (function(){ try{
    var p = JSON.parse(sessionStorage.getItem("mostlanePermissions") || localStorage.getItem("mostlanePermissions") || "{}");
    var yes = v => String(v||"").toLowerCase() === "yes";
    if (yes(p.FullAccess) || yes(p.TimesheetAdmin)) document.getElementById("adminLink").style.display = "";
  }catch(e){} })();
</script>
<div class="wrap">
  <div class="bar">
    <button class="nav" id="prevWk">‹</button>
    <div class="wk" id="wkLabel">Loading…</div>
    <button class="nav" id="nextWk">›</button>
  </div>
  <div id="invBanner"></div>
  <div id="dayCards"><div class="card pad muted">Loading your week…</div></div>

  <div class="card pad">
    <div class="tot" id="totals"></div>
  </div>

  <div class="card pad inv" id="invCard" style="display:none"></div>
  <p class="muted" style="font-size:12.5px;margin:6px 2px 4px" id="footNote"></p>
  <p class="muted" style="font-size:11.5px;margin:0 2px 20px" id="srcNote"></p>
</div>
<datalist id="siteList"></datalist>
<div class="savebar"><span class="st" id="saveState">All changes save automatically</span></div>

<script>
const API=(window.MOSTLANE_API||"https://mostlane-api.jamie-def.workers.dev");
function tok(){return localStorage.getItem("mostlaneToken")||"";}
function authFetch(p,o={}){o.headers=Object.assign({Authorization:"Bearer "+tok()},o.headers||{});if(o.body&&!o.headers["Content-Type"])o.headers["Content-Type"]="application/json";return fetch(API+p,o);}
// Weak-signal guard: never let a hung fetch freeze the page (see CLAUDE quirks).
function authFetchTO(p,o={},ms=9000){return Promise.race([authFetch(p,o),new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),ms))]);}
const g=id=>document.getElementById(id);
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function mondayOf(d){const x=new Date(d);x.setHours(12,0,0,0);x.setDate(x.getDate()-((x.getDay()+6)%7));return x.toISOString().slice(0,10);}
function addDays(iso,n){const d=new Date(iso+"T12:00:00Z");d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10);}
const toMin=t=>{const m=/^(\d{1,2}):(\d{2})/.exec(String(t||""));return m?(+m[1])*60+(+m[2]):null;};
const hmS=m=>(!m||m<=0)?"0h 00m":Math.floor(m/60)+"h "+String(Math.round(m%60)).padStart(2,"0")+"m";
const money=n=>"£"+(Math.round(n*100)/100).toFixed(2);
const DOWFULL=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

let ME=null, WEEK=mondayOf(new Date()), DAYS={}, INVOICE=null, ASSIGNED={}, SITES=[];

function claimedMiles(miles){
  if(!(ME&&ME.radius)||!(miles>0))return miles;
  return Math.max(0,Math.round((miles-2*ME.radiusMiles)*10)/10);
}
function dayCalc(d){
  const s=toMin(d.start), e0=toMin(d.finish);
  const miles=(d.mileage||[]).reduce((a,m)=>a+(parseFloat(m.miles)||0),0);
  const mc=claimedMiles(miles);
  if(s==null||e0==null) return {span:0,paid:0,commute:0,lunch:0,worked:false,miles,milesClaimed:mc};
  const e=e0<=s?e0+1440:e0;
  const span=e-s;
  const commute=ME&&ME.commute?ME.commuteMins*2:0;
  const lunch=(ME&&ME.lunch&&span>=ME.lunchThresholdH*60)?ME.lunchMins:0;
  return {span,paid:Math.max(0,span-commute-lunch),commute,lunch,worked:true,miles,milesClaimed:mc};
}

function collect(){
  const days={};
  document.querySelectorAll(".card[data-date]").forEach(card=>{
    const date=card.dataset.date;
    const refs=[...card.querySelectorAll(".joblist .jpill")].map(p=>(p.dataset.ref||"").trim()).filter(Boolean);
    const jin=card.querySelector(".joblist input.jobs");
    if(jin&&jin.value.trim())refs.push(jin.value.trim());
    const d={ start:card.querySelector(".t-start").value, finish:card.querySelector(".t-finish").value,
      jobs:refs.join(", "), mileage:[] };
    card.querySelectorAll(".mirow").forEach(r=>{
      const site=(r.dataset.site||"").trim(), pc=(r.dataset.pc||"").toUpperCase(),
        miles=parseFloat(r.dataset.miles)||0;
      if(site) d.mileage.push({site,postcode:pc,miles});
    });
    if(d.start||d.finish||d.jobs||d.mileage.length) days[date]=d;
  });
  return days;
}

function refreshTotals(){
  const days=collect();
  let paid=0,miles=0,milesClaimed=0,worked=0;
  for(const d of Object.values(days)){const c=dayCalc(d);paid+=c.paid;miles+=c.miles;milesClaimed+=c.milesClaimed;if(c.worked)worked++;}
  const hours=Math.round(paid/60*100)/100;
  miles=Math.round(miles*10)/10;milesClaimed=Math.round(milesClaimed*10)/10;
  let h=`<span>Paid time<b>${hmS(paid)}</b></span><span>Days<b>${worked}</b></span>`;
  if(ME&&ME.mileage){
    h+=`<span>Mileage<b>${milesClaimed} mi</b>${milesClaimed!==miles?`<span style="display:block;font-size:10px;text-transform:none;letter-spacing:0">${miles} − ${Math.round((miles-milesClaimed)*10)/10} radius</span>`:""}</span>`;
  }
  if(ME&&ME.selfEmployed&&ME.rate){
    const labour=ME.rateType==="day"?worked*ME.rate:hours*ME.rate;
    const mp=milesClaimed*ME.pencePerMile/100;
    h+=`<span>Labour<b>${money(labour)}</b></span>`;
    if(ME.mileage) h+=`<span>Mileage pay<b>${money(mp)}</b></span>`;
    h+=`<span>Total<b>${money(labour+mp)}</b></span>`;
  }
  g("totals").innerHTML=h;
  document.querySelectorAll(".card[data-date]").forEach(card=>{
    const d=days[card.dataset.date]||{};
    const c=dayCalc(d);
    const sum=card.querySelector(".sum");
    if(sum){
      if(c.worked)sum.innerHTML=`<span class="paid">${hmS(c.paid)}</span><br><span class="times">${esc(d.start||"")}–${esc(d.finish||"")}${c.miles?` · ${Math.round(c.miles*10)/10} mi`:""}</span>`;
      else if(c.miles)sum.innerHTML=`<span class="times">${Math.round(c.miles*10)/10} mi mileage</span>`;
      else sum.innerHTML=`<span class="empty">${INVOICE?"—":"Add ›"}</span>`;
    }
    const lc=card.querySelector(".ded.lunch");
    if(lc) lc.classList.toggle("off", !(c.worked&&c.lunch>0));
  });
}

// Mileage rows are READ-ONLY: the site comes from the job box pick and the
// miles come from the office's preset register — engineers can't type miles
// (the server enforces the presets on save too). ✕ just withdraws the claim.
function mileRow(m){
  const div=document.createElement("div");div.className="mirow";
  div.dataset.site=m.site||"";div.dataset.pc=(m.postcode||"").toUpperCase();div.dataset.miles=m.miles!=null&&m.miles!==""?m.miles:"0";
  const mi=parseFloat(div.dataset.miles)||0;
  div.innerHTML=`<span style="flex:2.2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📍 ${esc(m.site||"site")}</span>
    <span style="flex:none;font-weight:600">${mi>0?mi+" mi":'<span class="muted" title="The office hasn\'t set mileage for this site yet">no preset</span>'}</span>
    <button class="btn del" title="Remove this claim">✕</button>`;
  return div;
}

function jobPill(ref){
  const span=document.createElement("span");span.className="jpill";span.dataset.ref=ref;
  span.innerHTML=`<i>${esc(ref)}</i><button type="button" class="jdel" title="Remove this job">✕</button>`;
  return span;
}
function addJobPill(card,ref){
  ref=String(ref||"").trim();
  if(!ref)return false;
  const list=card.querySelector(".joblist");
  if(!list)return false;
  if([...list.querySelectorAll(".jpill")].some(p=>(p.dataset.ref||"").toLowerCase()===ref.toLowerCase()))return false;
  list.insertBefore(jobPill(ref),list.querySelector("input.jobs"));
  return true;
}
function render(){
  const sun=new Date(addDays(WEEK,6)+"T12:00:00Z"),mon=new Date(WEEK+"T12:00:00Z");
  g("wkLabel").innerHTML=`<b>${mon.toLocaleDateString("en-GB",{day:"numeric",month:"short"})} – ${sun.toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</b><span>${WEEK===mondayOf(new Date())?"This week":sun.getFullYear()}</span>`;
  const host=g("dayCards");host.innerHTML="";
  const locked=!!INVOICE;
  const today=new Date().toISOString().slice(0,10);
  for(let i=0;i<7;i++){
    const date=addDays(WEEK,i), d=DAYS[date]||{};
    const card=document.createElement("div");
    const isToday=date===today;
    card.className="card"+(i>=5?" wknd":"")+(isToday&&!locked?" open":"");
    card.dataset.date=date;
    const deds=[];
    if(ME&&ME.commute) deds.push(`<span class="ded" title="Set by the office — not editable">🚐 −${ME.commuteMins}m travel ×2</span>`);
    if(ME&&ME.lunch) deds.push(`<span class="ded lunch" title="Deducted on days of ${ME.lunchThresholdH}h or more">🥪 −${ME.lunchMins}m lunch</span>`);
    if(ME&&ME.mileage&&ME.radius) deds.push(`<span class="ded">🚗 first/last ${ME.radiusMiles} mi unpaid</span>`);
    const booked=(ASSIGNED[date]||[]);
    card.innerHTML=`
      <button class="dhead" type="button">
        <span class="dow"><b>${DOWFULL[i]}${isToday?" · today":""}</b><span>${new Date(date+"T12:00:00Z").toLocaleDateString("en-GB",{day:"numeric",month:"short"})}${booked.length?` · ${booked.length} job${booked.length>1?"s":""} booked`:""}</span></span>
        <span class="sum"></span><span class="chev">›</span>
      </button>
      <div class="cbody">
        ${booked.length?`<div class="flab">You're booked on — tap to add</div><div class="booked">${booked.map((b,ix)=>`<button type="button" class="bk" data-ix="${ix}" title="${esc(b.label)}">${b.time?`<span class="t">${esc(b.time)}</span>`:""}${esc(b.label.length>34?b.label.slice(0,33)+"…":b.label)}</button>`).join("")}</div>`:""}
        <div class="times2">
          <div class="tfield"><label>Start</label><input type="time" class="t-start" value="${esc(d.start||"")}"></div>
          <div class="tfield"><label>Finish</label><input type="time" class="t-finish" value="${esc(d.finish||"")}"></div>
        </div>
        <div class="flab">Jobs — tap above or type to add (as many as needed)</div>
        <div class="row joblist"></div>
        ${ME&&ME.mileage?`<div class="mi"><div class="flab">Mileage — automatic from your site picks</div><div class="milist"></div></div>`:""}
        ${deds.length?`<div class="dedrow">${deds.join("")}</div>`:""}
      </div>`;
    if(ME&&ME.mileage){
      const list=card.querySelector(".milist");
      (d.mileage||[]).forEach(m=>list.appendChild(mileRow(m)));
    }
    const jl=card.querySelector(".joblist");
    (d.jobs||"").split(",").map(s=>s.trim()).filter(Boolean).forEach(rf=>jl.appendChild(jobPill(rf)));
    const jin=document.createElement("input");
    jin.type="text";jin.className="jobs";jin.placeholder="Type to add a job or site…";jin.autocomplete="off";
    jl.appendChild(jin);
    card.querySelector(".dhead").addEventListener("click",()=>{card.classList.toggle("open");});
    booked.forEach((b,ix)=>{
      card.querySelectorAll(".bk")[ix].addEventListener("click",ev=>{
        ev.preventDefault();
        if(addJobPill(card,b.ref)){
          if(b.site)autoMileage(card,{site:b.site,postcode:b.postcode});
          refreshTotals();
          clearTimeout(saveTimer);doSave();
        }
        ev.target.closest(".bk").classList.add("used");
      });
      // Already on the sheet? Show the chip as used from the start.
      const refs=(d.jobs||"").toLowerCase();
      if(refs.includes(String(b.ref).toLowerCase()))card.querySelectorAll(".bk")[ix].classList.add("used");
    });
    host.appendChild(card);
  }
  g("invBanner").innerHTML=locked?`<div class="banner">✅ Invoice <b>${INVOICE.number}</b> has been generated for this week (${money(INVOICE.total||0)}) — <a href="${esc(INVOICE.url)}" target="_blank">open the PDF</a>. The week is locked; ask the office if something needs correcting.</div>`:"";
  document.querySelectorAll(".card[data-date] input,.card[data-date] .btn,.card[data-date] .bk").forEach(el=>{if(locked)el.disabled=true;});
  g("saveState").textContent=locked?"Week locked (invoiced)":"All changes save automatically";
  renderInvoiceCard();
  refreshTotals();
  const fn=[];
  if(ME&&ME.commute) fn.push("Travel deduction: "+ME.commuteMins+" minutes each way is unpaid (set by the office).");
  if(ME&&ME.lunch) fn.push("Lunch: "+ME.lunchMins+" minutes is deducted on days of "+ME.lunchThresholdH+"h or more.");
  if(ME&&ME.mileage) fn.push("Mileage is automatic: pick the site in the job box and the office's preset round-trip figure is claimed — miles can't be typed in. If a site shows “no preset”, ask the office to set its mileage.");
  if(ME&&ME.mileage&&ME.radius) fn.push("The first and last "+ME.radiusMiles+" miles of each day aren't paid — the deduction is applied automatically.");
  g("footNote").textContent=fn.join(" ");
}

function renderInvoiceCard(){
  const card=g("invCard");
  if(!ME||!ME.selfEmployed){
    // Nothing for employed staff — but explain it to an admin who's testing.
    if(ME&&ME.admin){card.style.display="";card.innerHTML='<h3>🧾 Invoice</h3><p class="muted" style="font-size:13px">Invoices only appear for <b>self-employed</b> engineers — this account\'s Employment type is "'+esc(ME.employment||"Employed")+'" (set in Users Admin). Their rate and fuel switches live in Engineer Timesheets → ⚙️ Settings.</p>';}
    else card.style.display="none";
    return;
  }
  card.style.display="";
  if(INVOICE){
    card.innerHTML=`<h3>🧾 Invoice</h3><div class="invrow">Invoice <b>${INVOICE.number}</b> · ${money(INVOICE.total||0)} · <a href="${esc(INVOICE.url)}" target="_blank">Open PDF</a></div><div class="invlist" id="invList"></div>`;
  } else {
    card.innerHTML=`<h3>🧾 Invoice this week</h3>
      <div class="invrow" style="flex-direction:column;align-items:stretch">
        <label class="muted" style="font-size:12.5px">Your name &amp; address on the invoice (the “From” box — saves as you type)</label>
        <textarea id="fromDetails" rows="3" style="font:inherit;padding:8px 10px;border:1px solid #cbd5e1;border-radius:8px" placeholder="${esc(ME.name||"")}\n1 Your Street\nTown, Postcode">${esc((ME.details&&ME.details.length?ME.details:[ME.name||""]).join("\n"))}</textarea>
      </div>
      ${ME.rate?`<div class="invrow muted">Your rate: <b>${money(ME.rate)}${ME.rateType==="day"?"/day":"/hour"}</b>${ME.mileage?` · mileage ${ME.pencePerMile}p/mi`:""}</div>`
        :`<div class="invrow"><label>Your rate £ <input type="number" id="rateIn" min="0" step="0.5" style="width:90px"></label>
           <select id="rateType"><option value="hour">per hour</option><option value="day">per day</option></select></div>`}
      <div class="invrow"><label>Next invoice number <input type="number" id="nextNo" min="1" step="1" value="${ME.nextInvoice}" style="width:110px" ${ME.canSetNumber?"":"disabled"}></label>
        <span class="muted" style="font-size:12.5px" id="noMsg">${ME.canSetNumber?"Set your starting number once — it saves as you type and counts up from there.":""}</span></div>
      <div class="invrow"><button class="btn primary" id="genBtn">Generate invoice PDF</button></div>
      <div class="invlist" id="invList"></div>`;
    if(ME.canSetNumber){
      let noTimer=null;
      g("nextNo").oninput=()=>{clearTimeout(noTimer);noTimer=setTimeout(async()=>{
        const n=parseInt(g("nextNo").value,10);
        if(!n)return;
        const r=await authFetchTO("/ts/invoice/next",{method:"POST",body:JSON.stringify({next:n})}).then(r=>r.json()).catch(()=>null);
        if(r&&r.ok){ME.nextInvoice=n;g("noMsg").textContent="Saved ✓ — your next invoice will be number "+n+".";}
        else g("noMsg").textContent=(r&&r.error)||"⚠️ Couldn't save that number — check your signal.";
      },900);};
    }
    g("genBtn").onclick=generateInvoice;
    let fdTimer=null;
    g("fromDetails").oninput=()=>{clearTimeout(fdTimer);fdTimer=setTimeout(async()=>{
      const details=g("fromDetails").value.split("\n").map(s=>s.trim()).filter(Boolean);
      const r=await authFetchTO("/ts/me",{method:"POST",body:JSON.stringify({details})}).then(x=>x.json()).catch(()=>null);
      if(r&&r.ok)ME.details=details;
    },900);};
  }
  loadInvoiceList();
}

async function loadInvoiceList(){
  const el=g("invList");if(!el)return;
  const r=await authFetchTO("/ts/invoices").then(r=>r.json()).catch(()=>null);
  if(!r||!r.invoices||!r.invoices.length){el.innerHTML="";return;}
  el.innerHTML=`<div class="muted" style="font-size:12.5px;margin:8px 0 2px">My invoices</div>`+r.invoices.map(i=>
    `<div class="li"><b>#${i.number}</b><span>wk ${new Date(i.week+"T12:00:00Z").toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</span><span>${money(i.total||0)}</span><a href="${esc(i.url)}" target="_blank" style="margin-left:auto">Open</a></div>`).join("");
}

async function generateInvoice(){
  clearTimeout(saveTimer);saveDirty=false;   // our own save below covers anything pending
  const days=collect();
  // Save first so the invoice matches exactly what's on screen.
  const sv=await authFetchTO("/ts/my",{method:"POST",body:JSON.stringify({week:WEEK,days})}).then(r=>r.json()).catch(()=>null);
  if(!sv||!sv.ok)return alert((sv&&sv.error)||"Couldn't save the week — try again.");
  const body={week:WEEK};
  if(!ME.rate){
    const rate=parseFloat(g("rateIn")&&g("rateIn").value);
    if(!rate)return alert("Enter your rate first.");
    body.rate=rate;body.rateType=g("rateType").value;
  }
  const t=sv.totals||{};
  const est=(t.total!=null)?money(t.total):(hmS(t.paidMins||0)+(t.miles?" + "+t.miles+" mi":""));
  if(!confirm("Generate invoice number "+ME.nextInvoice+" for this week ("+est+")?\n\nThe week locks once invoiced."))return;
  const r=await authFetchTO("/ts/invoice",{method:"POST",body:JSON.stringify(body)},20000).then(r=>r.json()).catch(()=>null);
  if(!r||!r.ok)return alert((r&&r.error)||"Couldn't generate the invoice.");
  alert("Invoice "+r.number+" generated — "+money(r.total||0));
  try{window.open(r.url,"_blank");}catch(e){}
  await load();
}

// ── Autosave (no save button): debounced as you type, instant on taps,
// retries on weak signal, flushes when the app is hidden/closed. ────────────
let saveTimer=null,retryTimer=null,saveBusy=false,saveDirty=false;
function queueSave(){
  if(INVOICE)return;
  saveDirty=true;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>doSave(),900);
}
async function doSave(opts={}){
  if(INVOICE)return;
  clearTimeout(saveTimer);clearTimeout(retryTimer);
  if(saveBusy){saveDirty=true;return;}
  saveBusy=true;saveDirty=false;
  const week=WEEK,days=collect();
  g("saveState").textContent="Saving…";
  let ok=false,status=0;
  try{
    const r=await fetch(API+"/ts/my",{method:"POST",keepalive:!!opts.keepalive,
      headers:{Authorization:"Bearer "+tok(),"Content-Type":"application/json"},
      body:JSON.stringify({week,days})});
    status=r.status;
    const j=await r.json().catch(()=>null);
    ok=!!(j&&j.ok);
  }catch(e){}
  saveBusy=false;
  if(status===409){await load();return;}   // invoiced on another device — show the lock
  if(ok){
    g("saveState").textContent="Saved ✓ "+new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
    if(saveDirty)doSave();
  }else{
    saveDirty=true;
    g("saveState").textContent="⚠️ Couldn't save — retrying…";
    retryTimer=setTimeout(()=>doSave(),8000);
  }
}
async function flushSave(opts){if(saveDirty||saveBusy){clearTimeout(saveTimer);await doSave(opts);}}
window.addEventListener("pagehide",()=>{if(saveDirty)doSave({keepalive:true});});
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="hidden"&&saveDirty)doSave({keepalive:true});});

// ── Job suggestions (project job numbers + live SLA jobs) ────────────────────
// Suggests for the part being typed after the last comma, so several jobs can
// be entered in one box; tapping a chip drops the job number in.
let jobTimer=null;
function hideAllSug(){document.querySelectorAll(".sugrow").forEach(el=>el.remove());}
document.addEventListener("input",e=>{
  if(!e.target.classList||!e.target.classList.contains("jobs"))return;
  const inp=e.target;
  const token=inp.value.trim();
  clearTimeout(jobTimer);
  if(token.length<2){hideAllSug();return;}
  jobTimer=setTimeout(async()=>{
    const [r,cs]=await Promise.all([
      authFetchTO("/ts/jobs?q="+encodeURIComponent(token)).then(r=>r.json()).catch(()=>null),
      loadCSites().catch(()=>[])
    ]);
    hideAllSug();
    const list=[...((r&&r.jobs)||[])];
    // Store lists (compliance worker) suggest by name in the jobs box too.
    const T=token.toLowerCase();
    const seen=new Set(list.map(j=>String(j.ref).toLowerCase()));
    for(const s of (cs||[])){
      if(list.length>=8)break;
      if(!s.name||!s.name.toLowerCase().includes(T))continue;
      const ref=s.name.replace(/\s*,\s*/g," – ").trim();
      if(seen.has(ref.toLowerCase()))continue;
      seen.add(ref.toLowerCase());
      list.push({ref,label:s.name+(s.postcode?" ("+s.postcode+")":""),site:s.name,postcode:s.postcode||""});
    }
    if(!list.length||document.activeElement!==inp)return;
    const div=document.createElement("div");div.className="sugrow";
    div.innerHTML=list.slice(0,6).map((j,ix)=>`<button type="button" class="sug" data-ix="${ix}" data-ref="${esc(j.ref)}" title="${esc(j.label)}">${esc(j.label.length>36?j.label.slice(0,35)+"…":j.label)}</button>`).join("");
    inp.closest(".row").after(div);
    div.addEventListener("mousedown",ev=>{
      const b=ev.target.closest(".sug");if(!b)return;
      ev.preventDefault();
      const card=inp.closest(".card[data-date]");
      const j=list[+b.dataset.ix];
      inp.value="";
      hideAllSug();inp.focus();
      if(addJobPill(card,b.dataset.ref)){
        // Fuel users: picking a site drops its mileage claim in automatically.
        if(j&&j.site)autoMileage(card,j);
        refreshTotals();
        clearTimeout(saveTimer);doSave();
      }
    });
  },250);
});
document.addEventListener("focusin",e=>{if(!e.target.classList||!e.target.classList.contains("jobs"))hideAllSug();});

// Auto-add a mileage claim when a fuel-allowance user picks a site chip:
// fills the site, postcode and the office's saved round-trip miles. Never
// duplicates a site already claimed on that day.
async function autoMileage(card,j){
  if(!ME||!ME.mileage||!card||INVOICE)return;
  const list=card.querySelector(".milist");if(!list)return;
  const name=String(j.site||"").trim();if(!name)return;
  const already=[...card.querySelectorAll(".mirow")].some(x=>(x.dataset.site||"").trim().toLowerCase()===name.toLowerCase());
  if(already)return;
  let miles=j.miles!=null?j.miles:null;
  if(miles==null){
    const r=await authFetchTO("/ts/miles?name="+encodeURIComponent(name)).then(x=>x.json()).catch(()=>null);
    if(r&&r.miles!=null)miles=r.miles;
  }
  list.appendChild(mileRow({site:name,postcode:(j.postcode||"").toUpperCase(),miles:miles!=null?miles:0}));
  refreshTotals();
  queueSave();
}

// ── Site suggestions + mileage estimate ──────────────────────────────────────
// Three sources: portal sites + PO-system sites (both via /ts/sites) and the
// compliance worker's store lists (Retail / ELS / ELS Private / Cobra /
// Wenzels). The compliance worker lives on workers.dev, which Cloudflare
// blocks for worker→worker fetches (error 1042) — so the browser fetches its
// public /Compliance/combined endpoint directly and we merge here.
const CWORKER="https://mostlane-pos.jamie-def.workers.dev/Compliance/combined";
const PCRE=/\b[A-Z]{1,2}\d[A-Z0-9]?\s*\d[A-Z]{2}\b/i;
let CSITES=null;
function cShape(r){
  if(!r||typeof r!=="object")return null;
  const name=r["Store Name"]??r.storeName??r["Site Name"]??r.siteName??r["Branch Name"]??r.branchName??r.Branch??r.Store??r.Site??r.Name??r.name??r.site??"";
  let pc=r.Postcode??r.postcode??r["Post Code"]??r.postCode??"";
  if(!pc){for(const v of Object.values(r)){if(typeof v==="string"){const m=v.match(PCRE);if(m){pc=m[0];break;}}}}
  const code=r.branchCode??r["Branch Code"]??"";
  if(!name&&!pc)return null;
  return {name:String(name||("Store "+code)).trim(),postcode:String(pc||"").toUpperCase(),code:String(code||"")};
}
function csNote(msg){const el=g("srcNote");if(el)el.textContent=msg;}
async function loadCSites(){
  if(CSITES){csNote("Site suggestions include "+CSITES.length+" sites from the store lists. (v8)");return CSITES;}
  try{const c=JSON.parse(sessionStorage.getItem("mlCSites")||"null");
    if(c&&Date.now()-c.at<15*60*1000){CSITES=c.list;csNote("Site suggestions include "+CSITES.length+" sites from the store lists. (v8)");return CSITES;}}catch(e){}
  try{
    const resp=await Promise.race([fetch(CWORKER),new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),12000))]);
    if(!resp.ok)throw new Error("HTTP "+resp.status);
    const j=await resp.json();
    const list=[];
    let raw=0;
    for(const cat of Object.keys(j||{})){
      const rows=Array.isArray(j[cat])?j[cat]:[];
      raw+=rows.length;
      for(const rec of rows){const s=cShape(rec);if(s&&s.name)list.push(s);}
    }
    CSITES=list;
    try{sessionStorage.setItem("mlCSites",JSON.stringify({at:Date.now(),list}));}catch(e){}
    csNote(list.length?("Site suggestions include "+list.length+" sites from the store lists. (v8)")
      :("⚠️ Store lists reached but no usable records ("+raw+" rows seen) — show the office this line. (v8)"));
  }catch(e){CSITES=[];csNote("⚠️ Store lists couldn't be loaded ("+(e&&e.message||"error")+") — suggestions are portal/PO only. (v8)");}
  return CSITES;
}
// Mileage rows carry no inputs — the only action is withdrawing a claim.
document.addEventListener("change",e=>{
  refreshTotals();
  // A change (time picked, field committed) saves IMMEDIATELY — no debounce.
  if(e.target.closest&&e.target.closest(".card[data-date]")){clearTimeout(saveTimer);doSave();}
});
document.addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  if(b.classList.contains("del")){b.closest(".mirow").remove();refreshTotals();clearTimeout(saveTimer);doSave();}
  else if(b.classList.contains("jdel")){b.closest(".jpill").remove();refreshTotals();clearTimeout(saveTimer);doSave();}
});
document.addEventListener("keydown",e=>{
  if(e.key!=="Enter"||!e.target.classList||!e.target.classList.contains("jobs"))return;
  e.preventDefault();
  const card=e.target.closest(".card[data-date]");
  if(addJobPill(card,e.target.value)){e.target.value="";hideAllSug();refreshTotals();clearTimeout(saveTimer);doSave();}
});
document.addEventListener("input",e=>{if(e.target.closest&&e.target.closest(".card[data-date]")){refreshTotals();queueSave();}});

async function load(){
  g("saveState").textContent="";
  try{
    const [meR,wkR,asR]=await Promise.all([
      authFetchTO("/ts/me").then(r=>r.json()),
      authFetchTO("/ts/my?week="+WEEK).then(r=>r.json()),
      authFetchTO("/ts/assigned?week="+WEEK).then(r=>r.json()).catch(()=>null)
    ]);
    if(meR&&meR.ok)ME=meR;
    DAYS=(wkR&&wkR.days)||{};
    INVOICE=(wkR&&wkR.invoice)||null;
    ASSIGNED=(asR&&asR.byDay)||{};
  }catch(e){
    g("dayCards").innerHTML='<div class="card">Couldn\'t load your timesheet — <button class="btn" onclick="load()">try again</button></div>';
    return;
  }
  render();
}
g("prevWk").onclick=async()=>{await flushSave();WEEK=addDays(WEEK,-7);load();};
g("nextWk").onclick=async()=>{await flushSave();WEEK=addDays(WEEK,7);load();};
load();
loadCSites();   // prewarm the store lists so the first keystroke suggests instantly
</script>
