<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js?v=2"></script>
  <meta charset="utf-8"/>
  <title>Mostlane • Vehicles</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="auth.js"></script>
  <style>
:root{
  --ml-blue:#003b82;
  --ml-blue-light:#1e66ff;
  --text:#0f172a;
  --muted:#6b7280;
  --ok:#16a34a;
  --warn:#f97316;
  --bad:#dc2626;
  --panel:rgba(255,255,255,0.9);
}

/* ----- FIXED BACKGROUND (FULLY SAFE) ----- */
html,body{
  height:100%;
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
  background:#0b1930; /* fallback */
}

.bg-fixed{
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  background:#0b1930 url('Mostlane_Embossed.png') no-repeat center center;
  background-size:180%;
  z-index:-9999;
  pointer-events:none;
}

body{ padding:16px; }

.wrap{
  max-width:1200px;
  margin:0 auto;
  background:var(--panel);
  border-radius:16px;
  box-shadow:0 18px 45px rgba(0,0,0,0.35);
  overflow:hidden;
  min-height:100vh;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#001a3d,#003b82);
  color:#e5ecff;
  padding:16px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.header-title{
  font-size:20px;
  font-weight:700;
  letter-spacing:0.04em;
  text-transform:uppercase;
}

.header-sub{
  font-size:12px;
  opacity:0.8;
}

.header-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}

/* BUTTONS */
.btn{
  border:none;
  border-radius:999px;
  padding:8px 14px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
}
.btn.primary{ background:#1e66ff; color:#fff; }
.btn.secondary{ background:rgba(15,23,42,0.12); color:#e5ecff; border:1px solid rgba(148,163,184,0.4); }

.content{ padding:14px 18px 18px; }

/* FILTERS */
.toolbar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:10px; }
.pill-field{ display:flex; align-items:center; padding:6px 10px; border-radius:999px; background:#f1f5f9; border:1px solid #cbd5f5; gap:6px; font-size:13px; }

.pill-field input,
.pill-field select{
  border:none;
  background:transparent;
  outline:none;
  font-size:13px;
  min-width:120px;
}
.pill-label{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:#64748b; }

/* SUMMARY STRIP */
.summary-strip{ display:flex; flex-wrap:wrap; gap:10px; margin:4px 0 12px; }
.summary-card{
  flex:1 1 120px;
  min-width:120px;
  background:#0f172a;
  color:#e5ecff;
  border-radius:12px;
  padding:10px 12px;
  position:relative;
}

.summary-label{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; opacity:0.8; }
.summary-value{ font-size:18px; font-weight:700; margin-top:4px; }
.summary-note{ font-size:11px; opacity:0.7; margin-top:2px; }

/* GRID */
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }

/* VEHICLE CARD */
.card{
  background:#ffffff;
  border-radius:14px;
  box-shadow:0 8px 18px rgba(15,23,42,0.12);
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
  border:1px solid #e2e8f0;
}

.reg-row{ display:flex; justify-content:space-between; align-items:center; gap:6px; }
.reg{
  font-size:16px; font-weight:800; letter-spacing:0.15em;
  text-transform:uppercase; color:#0f172a;
  background:#e2e8f0; padding:4px 8px;
  border-radius:6px; border:1px solid #cbd5f5;
}

.driver{ font-size:13px; color:#0f172a; font-weight:600; text-align:right; }
.driver span{ color:#64748b; font-weight:500; }

.meta{ font-size:12px; color:#475569; display:flex; flex-wrap:wrap; gap:6px 12px; }
.dot{ width:6px; height:6px; border-radius:999px; background:#94a3b8; }

.status-row{ display:flex; justify-content:space-between; align-items:center; gap:4px; margin-top:2px; }

.tag{ padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; display:inline-flex; align-items:center; gap:4px; }
.tag.ok{ background:#dcfce7; color:#166534; }
.tag.warn{ background:#fef3c7; color:#92400e; }
.tag.bad{ background:#fee2e2; color:#b91c1c; }
.tag.info{ background:#e0f2fe; color:#075985; }

.card-actions{ display:flex; justify-content:space-between; align-items:center; gap:6px; margin-top:8px; }
.btn-pill{ border:none; border-radius:999px; font-size:12px; font-weight:600; padding:4px 10px; cursor:pointer; }
.btn-pill.main{ background:#1d4ed8; color:#fff; }
.btn-ghost{ border:none; background:transparent; font-size:12px; color:#1e40af; padding:4px 6px; cursor:pointer; }

.footer-line{ display:flex; justify-content:space-between; align-items:center; margin-top:12px; font-size:11px; color:#64748b; border-top:1px dashed #e2e8f0; padding-top:8px; }

/* MODALS */
.modal-backdrop{
  position:fixed; inset:0;
  background:rgba(0,0,0,0.55);
  display:none; align-items:center; justify-content:center;
  z-index:2000;
}
.modal{
  background:#fff;
  width:90%; max-width:420px;
  border-radius:14px;
  padding:20px 18px;
  box-shadow:0 10px 35px rgba(0,0,0,0.35);
}
.modal-header{
  display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
}

.modal-row{ display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
.modal-row input, .modal-row select{
  padding:8px 10px; border-radius:8px; border:1px solid #d1d5db; font-size:14px;
}
.modal-footer{ display:flex; justify-content:flex-end; gap:10px; margin-top:10px; }
  </style>
</head>

<body>
  <div class="bg-fixed"></div>
  <div class="wrap">

    <!-- HEADER -->
    <div class="header">
      <div>
        <div class="header-title">Vehicle Fleet</div>
        <div class="header-sub">Live overview of all vans and their current drivers.</div>
      </div>
      <div class="header-actions">
        <a class="ml-back" data-role="home" href="main.html">← Menu</a>
        <a class="btn primary" href="van-check.html" style="text-decoration:none;">🚐 My weekly check</a>
        <a class="btn primary" href="van-checks.html" style="text-decoration:none;">📋 All checks</a>
        <button class="btn primary" onclick="openAddModal()">＋ Add vehicle</button>
        <button class="btn primary" onclick="importOld()" title="One-off: copy MOT/tax/service from the old system into the portal">⤵ Import old data</button>
        <button class="btn primary" onclick="loadFleet()">⟳ Refresh</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- Filters -->
      <div class="toolbar">
        <div class="pill-field">
          <span class="pill-label">Search</span>
          <input id="searchInput" placeholder="Reg, driver, model..." oninput="renderFleet()">
        </div>

        <div class="pill-field">
          <span class="pill-label">Filter</span>
          <select id="filterActive" onchange="renderFleet()">
            <option value="all">All vehicles</option>
            <option value="active">Active only</option>
            <option value="inactive">Inactive only</option>
          </select>
        </div>
      </div>

      <!-- Summary -->
      <div class="summary-strip">
        <div class="summary-card">
          <div class="summary-label">Total Vehicles</div>
          <div class="summary-value" id="sumTotal">0</div>
          <div class="summary-note">Across whole fleet</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Active</div>
          <div class="summary-value" id="sumActive">0</div>
          <div class="summary-note">Currently in service</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Unassigned</div>
          <div class="summary-value" id="sumUnassigned">0</div>
          <div class="summary-note">No primary driver set</div>
        </div>
      </div>

      <!-- Cards -->
      <div class="grid" id="fleetGrid"></div>

      <div class="footer-line">
        <span id="statusLine">Loading fleet…</span>
        <span>Mostlane • Vehicles</span>
      </div>
    </div>

  </div>

  <!-- EDIT MODAL -->
  <div class="modal-backdrop" id="editBackdrop">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="editTitle">Edit Vehicle</div>
        <button onclick="closeEditModal()">✕</button>
      </div>

      <div class="modal-body">

        <div class="modal-row">
          <label>Registration</label>
          <input id="editReg" readonly>
        </div>

        <div class="modal-row">
          <label>Make</label>
          <input id="editMake">
        </div>

        <div class="modal-row">
          <label>Model</label>
          <input id="editModel">
        </div>

        <div class="modal-row">
          <label>Fuel Type</label>
          <input id="editFuel">
        </div>

        <div class="modal-row">
          <label>Driver</label>
          <input id="editDriver">
        </div>

        <div class="modal-row">
          <label>Active?</label>
          <select id="editActive">
            <option value="true">Active</option>
            <option value="false">Inactive</option>
          </select>
        </div>

        <div class="modal-row">
          <label>Next Service</label>
          <input id="editService" type="date">
        </div>

        <div class="modal-row">
          <label>MOT Due</label>
          <input id="editMOT" type="date">
        </div>

        <!-- ⭐ ADDED TAX DUE FIELD (Option A) -->
        <div class="modal-row">
          <label>Tax Due</label>
          <input id="editTax" type="date">
        </div>

        <div class="modal-row">
          <label>Notes</label>
          <input id="editNotes">
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn secondary" onclick="closeEditModal()">Cancel</button>
        <button class="btn primary" onclick="saveVehicleEdits()">Save</button>
      </div>
    </div>
  </div>
  <script>
  if (sessionStorage.getItem("mostlaneLoggedIn") !== "true") {
    window.location.href = "login.html";
  }

  const VEHICLE_WORKER = "https://vehicles.jamie-def.workers.dev";
  const CURRENT_USER = sessionStorage.getItem("mostlaneUser") || "";
  let FLEET = [];
  let EDIT_REG = null;

  // ── Portal driver registry (source of truth for who drives what + history) ──
  const API = window.MOSTLANE_API || "https://mostlane-api.jamie-def.workers.dev";
  function pTok(){ return localStorage.getItem("mostlaneToken") || ""; }
  function aFetch(p,o={}){ o.headers=Object.assign({Authorization:"Bearer "+pTok()},o.headers||{}); if(o.body&&!o.headers["Content-Type"])o.headers["Content-Type"]="application/json"; return fetch(API+p,o); }
  let PORTAL_DRIVERS={}, PUSERS=[];
  function pLabel(u){ const n=((u.FirstName||"")+" "+(u.LastName||"")).trim(); return n||u.Username; }
  function pName(username){ if(!username)return ""; const u=PUSERS.find(x=>x.Username===username); return u?pLabel(u):username; }
  const pNorm = r => String(r||"").replace(/\s+/g,"").toUpperCase();
  function portalDriverFor(reg){ const n=pNorm(reg); for(const k in PORTAL_DRIVERS){ if(pNorm(k)===n) return PORTAL_DRIVERS[k]; } return ""; }
  async function loadPortalDrivers(){
    try{ const [c,us]=await Promise.all([aFetch("/fleet/current").then(r=>r.json()),aFetch("/users").then(r=>r.json())]);
      if(c.ok)PORTAL_DRIVERS=c.map||{}; PUSERS=(us.Users||us.users||[]).filter(u=>u.Username); }catch(e){}
  }
  function pModal(html){ let m=document.getElementById("pModal"); if(!m){ m=document.createElement("div"); m.id="pModal"; m.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px"; document.body.appendChild(m);} m.innerHTML=`<div style="background:#fff;border-radius:12px;max-width:430px;width:100%;padding:18px;max-height:85vh;overflow:auto">${html}</div>`; m.style.display="flex"; m.onclick=e=>{ if(e.target===m) m.style.display="none"; }; }
  function pClose(){ const m=document.getElementById("pModal"); if(m)m.style.display="none"; }
  function openAssign(reg){
    const cur=portalDriverFor(reg);
    const opts=['<option value="">— Unassigned —</option>'].concat(PUSERS.map(u=>`<option value="${u.Username}" ${u.Username===cur?"selected":""}>${pLabel(u)}</option>`)).join("");
    const today=new Date().toISOString().slice(0,10);
    pModal(`<h3 style="margin:0 0 4px">Driver for ${reg}</h3><p style="color:#64748b;font-size:13px;margin:0 0 10px">Set who drives this vehicle from a date. The previous driver stays in the history.</p>
      <label style="font-size:13px;font-weight:600">Driver</label><select id="asgUser" style="width:100%;padding:9px;margin:4px 0 10px;border:1px solid #cbd5e1;border-radius:8px">${opts}</select>
      <label style="font-size:13px;font-weight:600">From date</label><input id="asgDate" type="date" value="${today}" style="width:100%;padding:9px;margin:4px 0 12px;border:1px solid #cbd5e1;border-radius:8px">
      <div style="display:flex;gap:8px;justify-content:flex-end"><button onclick="pClose()" style="padding:9px 14px;border:1px solid #cbd5e1;background:#fff;border-radius:8px;cursor:pointer">Cancel</button>
      <button onclick="saveAssign('${reg}')" style="padding:9px 16px;border:0;background:#1a237e;color:#fff;border-radius:8px;cursor:pointer;font-weight:600">Save</button></div>`);
  }
  async function saveAssign(reg){
    const username=document.getElementById("asgUser").value, fromDate=document.getElementById("asgDate").value;
    try{ const r=await aFetch("/fleet/assign",{method:"POST",body:JSON.stringify({reg,username,fromDate})}).then(r=>r.json());
      if(r.ok){ pClose(); await loadPortalDrivers(); updateSummary(); renderFleet(); } else alert(r.error||"Failed to save"); }catch(e){ alert("Failed to save"); }
  }
  function openHistory(reg){
    pModal(`<h3 style="margin:0 0 8px">${reg} — driver history</h3><div id="histBody" style="font-size:13px;color:#64748b">Loading…</div><div style="text-align:right;margin-top:12px"><button onclick="pClose()" style="padding:9px 14px;border:1px solid #cbd5e1;background:#fff;border-radius:8px;cursor:pointer">Close</button></div>`);
    aFetch("/fleet/assignments?reg="+encodeURIComponent(reg)).then(r=>r.json()).then(d=>{
      const el=document.getElementById("histBody"); if(!el)return;
      const h=d.history||[];
      el.innerHTML = h.length ? h.map(a=>`<div style="padding:8px 0;border-top:1px solid #eef"><b style="color:#0f172a">${pName(a.username)||"Unassigned"}</b><br><span>${a.start_date} → ${a.end_date||"present"}</span></div>`).join("") : "No history yet.";
    }).catch(()=>{ const el=document.getElementById("histBody"); if(el)el.textContent="Couldn't load history."; });
  }
  window.openAssign=openAssign; window.saveAssign=saveAssign; window.openHistory=openHistory; window.pClose=pClose;

  function goMain(){ window.location.href="main.html"; }

  async function loadFleet(){
    try{
      document.getElementById("statusLine").textContent = "Loading fleet...";
      const d = await aFetch("/fleet/vehicles").then(r=>r.json());
      FLEET = (d && d.vehicles) ? d.vehicles : [];
      await loadPortalDrivers();
      updateSummary();
      renderFleet();
      document.getElementById("statusLine").textContent = FLEET.length ? "Fleet loaded." : "No vehicles yet — use “Import old data” or “Add vehicle”.";
    }catch(e){
      console.error(e);
      document.getElementById("statusLine").textContent = "Failed to load fleet.";
    }
  }
  async function importOld(){
    if(!confirm("Copy all vehicles (MOT, tax, service) from the old system into the portal? Same-reg records are updated, not duplicated.")) return;
    document.getElementById("statusLine").textContent = "Importing from old system...";
    try{
      const old = await (await fetch(`${VEHICLE_WORKER}/fleet`)).json();
      const r = await aFetch("/fleet/vehicles-import",{method:"POST",body:JSON.stringify({vehicles:old})}).then(r=>r.json());
      alert("Imported "+(r.count||0)+" vehicles into the portal.");
      await loadFleet();
    }catch(e){ alert("Import failed — couldn't reach the old system."); document.getElementById("statusLine").textContent="Import failed."; }
  }
  function openAddModal(){
    EDIT_REG = null;
    editReg.value=""; editReg.readOnly=false;
    editMake.value=""; editModel.value=""; editFuel.value=""; editActive.value="true";
    editService.value=""; editMOT.value=""; editTax.value=""; editNotes.value="";
    if(typeof editDriver!=="undefined" && editDriver) editDriver.value="";
    document.getElementById("editBackdrop").style.display="flex";
  }
  window.importOld=importOld; window.openAddModal=openAddModal;

  function updateSummary(){
    sumTotal.textContent = FLEET.length;
    sumActive.textContent = FLEET.filter(v => v.active !== false).length;
    sumUnassigned.textContent = FLEET.filter(v => !portalDriverFor(v.reg)).length;
  }

  function formatDMY(dateStr){
    if (!dateStr) return "n/a";
    const d = new Date(dateStr);
    if (isNaN(d)) return "n/a";
    return String(d.getDate()).padStart(2,"0") + "-" +
           String(d.getMonth()+1).padStart(2,"0") + "-" +
           d.getFullYear();
  }

  function tagWithLogic(dateStr, label){
    if (!dateStr) {
      return `<span class="tag info">${label}: n/a</span>`;
    }

    const d = new Date(dateStr);
    const today = new Date();
    d.setHours(0,0,0,0);
    today.setHours(0,0,0,0);

    const diffDays = Math.ceil((d - today) / (1000*60*60*24));

    let status = "ok";
    if (diffDays < 0) status = "bad";
    else if (diffDays <= 30) status = "warn";

    const formatted = formatDMY(dateStr);

    let daysText = "";
    if (diffDays <= 90){
      if (diffDays < 0){
        daysText = `<div style="font-size:10px;color:#b91c1c;">Overdue</div>`;
      } else {
        daysText = `<div style="font-size:10px;opacity:0.8;">${diffDays} days</div>`;
      }
    }

    return `
      <span class="tag ${status}" style="flex-direction:column;align-items:flex-start;">
        ${label}: ${formatted}
        ${daysText}
      </span>`;
  }

  function renderFleet(){
    const grid = document.getElementById("fleetGrid");
    grid.innerHTML = "";

    const q = searchInput.value.toLowerCase();
    const filt = filterActive.value;

    let list = FLEET.slice();

    if (q){
      list = list.filter(v =>
        (v.reg||"").toLowerCase().includes(q) ||
        (v.driver||"").toLowerCase().includes(q) ||
        (v.make||"").toLowerCase().includes(q) ||
        (v.model||"").toLowerCase().includes(q)
      );
    }

    if (filt==="active") list = list.filter(v => v.active !== false);
    if (filt==="inactive") list = list.filter(v => v.active === false);

    if (!list.length){
      grid.innerHTML = `<div style="color:#64748b;font-size:13px;">No vehicles found.</div>`;
      return;
    }

    for (const v of list){
      const card = document.createElement("div");
      card.className="card";

      const reg = v.reg || "UNKNOWN";
      const pd = portalDriverFor(reg);
      const driver = pd ? pName(pd) : "Unassigned";

      // MOT + Tax tags
      const motTag = tagWithLogic(v.motDue, "MOT");
      const taxTag = tagWithLogic(v.taxDue, "Tax");

      let serviceTag = `<span class="tag info">Service: n/a</span>`;
      if (v.nextServiceDate){
        const status = v.serviceStatus==="ok" ? "ok" : "warn";
        serviceTag = `<span class="tag ${status}">Service: ${v.nextServiceDate}</span>`;
      }

      const issuesTag = (v.issuesCount||0)>0
        ? `<span class="tag bad">${v.issuesCount} issues</span>`
        : `<span class="tag ok">No issues</span>`;

      card.innerHTML = `
        <div class="reg-row">
          <div class="reg">${reg}</div>
          <div class="driver"><span>Driver</span><br>${driver}</div>
        </div>

        <div class="meta">
          <span><span class="dot"></span>${v.make||""} ${v.model||""}</span>
          ${v.fuel ? `<span><span class="dot"></span>${v.fuel}</span>` : ""}
          <span><span class="dot"></span>${v.active!==false?"Active":"Inactive"}</span>
        </div>

<div class="status-row">
  ${serviceTag}
  <div style="display:flex; flex-direction:column; gap:4px;">
    ${motTag}
    ${taxTag}
  </div>
</div>

<div class="status-row">
  ${issuesTag}
</div>
        <div class="card-actions">
          <button class="btn-pill main" onclick="openAssign('${reg}')">👤 Driver</button>
          <button class="btn-ghost" onclick="openHistory('${reg}')">History</button>
          <button class="btn-pill sub" onclick="openEditModal('${reg}')">Edit</button>
        </div>
      `;

      grid.appendChild(card);
    }
  }

  function openVehicle(reg){
    window.location.href = `vehicle.html?reg=${encodeURIComponent(reg)}`;
  }

  function openEditModal(reg){
    EDIT_REG = reg;
    const v = FLEET.find(x => x.reg === reg);
    if (!v) return;

    editReg.value = v.reg || "";
    editReg.readOnly = true;
    editMake.value = v.make || "";
    editModel.value = v.model || "";
    editFuel.value = v.fuel || "";
    editDriver.value = v.driver || "";
    editActive.value = v.active === false ? "false" : "true";
    editService.value = v.nextServiceDate || "";
    editMOT.value = v.motDue || "";
    editTax.value = v.taxDue || "";
    editNotes.value = v.notes || "";

    document.getElementById("editBackdrop").style.display="flex";
  }

  function closeEditModal(){
    document.getElementById("editBackdrop").style.display="none";
  }

  async function saveVehicleEdits(){
    const reg = (EDIT_REG || editReg.value || "").trim().toUpperCase();
    if (!reg){ alert("Enter a registration."); return; }

    const body = {
      reg,
      make: editMake.value.trim(),
      model: editModel.value.trim(),
      fuel: editFuel.value.trim(),
      driver: editDriver.value.trim(),
      active: editActive.value==="true",
      nextServiceDate: editService.value,
      motDue: editMOT.value,
      taxDue: editTax.value,
      notes: editNotes.value.trim(),
    };

    try{
      const res = await aFetch("/fleet/vehicle", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify(body)
      });

      if (!res.ok) throw new Error("fail");

      closeEditModal();
      await loadFleet();

    }catch(err){
      console.error(err);
      alert("Could not save changes.");
    }
  }

  window.addEventListener("DOMContentLoaded", loadFleet);
</script>
</body>
</html>
