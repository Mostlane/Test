<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password — Mostlane Portal</title>
  <style>
    body { font-family:"Segoe UI",sans-serif; background:#e6e8eb url('Mostlane_Embossed.png') no-repeat center center fixed; background-size:180%; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
    .box { background:rgba(255,255,255,.7); padding:30px 25px; border-radius:10px; box-shadow:0 0 20px rgba(0,0,0,.1); width:90%; max-width:340px; text-align:center; }
    .box img { height:54px; margin-bottom:16px; }
    h2 { color:#003366; font-size:18px; margin:0 0 16px; }
    input { box-sizing:border-box; width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:6px; font-size:14px; }
    button { background:#0066cc; color:#fff; padding:12px; width:100%; border:none; border-radius:6px; font-size:16px; cursor:pointer; margin-top:6px; }
    .msg { font-size:14px; margin-top:12px; min-height:18px; }
    .msg.err { color:#b00020; } .msg.ok { color:#0c7d27; }
    .note { background:#fff3cd; color:#7a5b00; border-radius:6px; padding:10px; font-size:13px; margin-bottom:8px; }
  </style>
</head>
<body>
  <div class="box">
    <img src="mostlane-logo.jpg" alt="Mostlane" />
    <h2>Change Password</h2>
    <div id="forcedNote" class="note" style="display:none;">For security, you must set a new password before continuing.</div>
    <form id="form">
      <input type="password" id="current" placeholder="Current password" required />
      <input type="password" id="new1" placeholder="New password" required />
      <input type="password" id="new2" placeholder="Confirm new password" required />
      <button type="submit">Update password</button>
      <p id="msg" class="msg"></p>
    </form>
  </div>
  <script>
    const API = window.MOSTLANE_API;
    const token = localStorage.getItem("mostlaneToken");
    const msg = document.getElementById("msg");
    const forced = new URLSearchParams(location.search).get("forced") === "1";
    if (forced) document.getElementById("forcedNote").style.display = "block";
    if (!token) { location.href = "login.html"; }

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.className = "msg"; msg.textContent = "";
      const currentPassword = document.getElementById("current").value;
      const newPassword = document.getElementById("new1").value;
      if (newPassword !== document.getElementById("new2").value) {
        msg.className = "msg err"; msg.textContent = "New passwords do not match."; return;
      }
      try {
        const res = await fetch(API + "/auth/change-password", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
          body: JSON.stringify({ currentPassword, newPassword })
        });
        const r = await res.json();
        if (!res.ok || !r.ok) { msg.className = "msg err"; msg.textContent = r.error || "Could not change password."; return; }
        msg.className = "msg ok"; msg.textContent = "Password updated. Redirecting…";
        setTimeout(() => location.href = "main.html", 900);
      } catch (err) {
        msg.className = "msg err"; msg.textContent = "Network error — is the portal URL configured?";
      }
    });
  </script>
</body>
</html>
