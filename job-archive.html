<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/portal-config.js?v=2"></script>
  <script src="auth.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Archive – Mostlane</title>
  <style>
    html{background:#eef1f4}
    body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;color:#1f2937;background:transparent}
    header.page{display:flex;align-items:center;gap:12px;padding:14px 18px;background:#003b82;color:#fff}
    header.page h1{font-size:18px;margin:0;flex:1}
    .ml-back{color:#fff;text-decoration:none;font-weight:600;background:rgba(255,255,255,.15);padding:8px 12px;border-radius:9px}
    .wrap{max-width:960px;margin:16px auto 80px;padding:0 14px}
    .muted{color:#6b7280;font-size:13px}
    .searchbar{display:flex;gap:10px;position:sticky;top:0;background:#eef1f4;padding:10px 0;z-index:5}
    #q{flex:1;padding:12px 14px;border:1px solid #cfd8e0;border-radius:10px;font-size:16px;font-family:inherit}
    .btn{border:1px solid #cfd8e0;background:#fff;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn.primary{background:#0066cc;color:#fff;border-color:#0066cc}
    .btn:disabled{opacity:.5;cursor:default}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .ref{font-family:monospace;font-size:12px;background:#f1f5f9;padding:2px 7px;border-radius:6px}
    .status{font-size:11px;padding:2px 8px;border-radius:999px;background:#eef2ff;color:#3730a3}
    .status.closed{background:#f1f5f9;color:#475569}
    .name{font-weight:700}
    .desc{margin:6px 0;font-size:14px}
    .meta{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:#475569;margin-top:4px}
    .detail{margin-top:10px;border-top:1px dashed #e5e7eb;padding-top:10px;display:none;font-size:13px}
    .detail.show{display:block}
    .detail dt{font-weight:600;color:#334155}
    .detail dd{margin:0 0 8px 0}
    .files{margin-top:10px}
    .files h4{margin:0 0 6px;font-size:12px;color:#475569;text-transform:uppercase;letter-spacing:.03em}
    .thumbs{display:flex;flex-wrap:wrap;gap:8px}
    .thumb{width:84px;height:84px;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb;cursor:pointer;background:#f1f5f9;flex:0 0 auto}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .doclink{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border:1px solid #e5e7eb;border-radius:8px;text-decoration:none;color:#1d4ed8;font-size:13px;font-weight:600;margin:0 6px 6px 0}
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column}
    .lightbox.show{display:flex}
    .lightbox img{max-width:94vw;max-height:82vh;object-fit:contain}
    .lightbox .lb-bar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;color:#fff;font-size:14px}
    .lightbox .lb-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:44px;height:44px;border-radius:50%;cursor:pointer}
    .lb-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:34px;color:#fff;background:rgba(255,255,255,.12);border:none;width:52px;height:52px;border-radius:50%;cursor:pointer}
    .lb-prev{left:14px}.lb-next{right:14px}
    .msg{padding:14px;text-align:center;color:#6b7280}
    .pager{display:flex;gap:10px;align-items:center;justify-content:center;margin:14px 0}
  </style>
</head>
<body>
  <header class="page">
    <h1>🗄️ Job Archive</h1>
    <a class="ml-back" data-role="home" href="sla-main.html">← SLA</a>
  </header>

  <div class="wrap">
    <div id="denied" style="display:none" class="msg">This page is for SLA admins (Full Access or SLA Admin).</div>
    <div id="app" style="display:none">
      <div class="searchbar">
        <input id="q" placeholder="Search anything — combine words, e.g. “0126 hatch”…" autocomplete="off" />
        <button class="btn primary" id="go">Search</button>
      </div>
      <div id="count" class="muted" style="margin:4px 2px 10px"></div>
      <div id="results"></div>
      <div class="pager" id="pager" style="display:none">
        <button class="btn" id="prev">← Newer</button>
        <span id="pageInfo" class="muted"></span>
        <button class="btn" id="next">Older →</button>
      </div>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lb-bar"><span id="lbCount"></span><button class="lb-btn" id="lbClose">✕</button></div>
    <button class="lb-nav lb-prev" id="lbPrev">‹</button>
    <img id="lbImg" alt="">
    <button class="lb-nav lb-next" id="lbNext">›</button>
  </div>

<script>
const SLA = "https://mostlane-sla.jamie-def.workers.dev";
const $ = id => document.getElementById(id);
const LIMIT = 50;
let offset = 0, total = 0, curQ = "";

function cachedPerms(){ try{ return JSON.parse(sessionStorage.getItem("mostlanePermissions")||localStorage.getItem("mostlanePermissions")||"{}"); }catch(e){ return {}; } }
(function gate(){
  const p = cachedPerms(); const yes = v => String(v||"").toLowerCase()==="yes";
  const ok = yes(p.FullAccess) || yes(p.SLAAdmin);
  $("app").style.display = ok ? "" : "none";
  $("denied").style.display = ok ? "none" : "";
  if (ok) search(true);
})();

function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function fmtDate(iso){ if(!iso) return ""; const d=new Date(iso); return isNaN(d)?"":d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}); }
function engineersOf(j){ return (Array.isArray(j.assignedEngineers)&&j.assignedEngineers.length)?j.assignedEngineers.join(", "):(j.assignedTo||""); }
function money(v){ if(v==null||v==="") return ""; const n=parseFloat(v); return isFinite(n)?("£"+n.toFixed(2)):esc(v); }

function detailHtml(j){
  const c = j.customer||{}, s = j.signed||{}, f = j.financials||{};
  const rows = [];
  const add = (k,v)=>{ if(v) rows.push(`<dt>${k}</dt><dd>${esc(v)}</dd>`); };
  add("Job number", j.helpdeskRef || j.id);
  add("Customer", c.name);
  add("Customer address", [c.address, c.postcode].filter(Boolean).join(", "));
  add("Customer phone", c.phone);
  add("Customer email", (c.email && c.email!=="-") ? c.email : "");
  add("Site", [j.siteName, j.address, j.postcode].filter(Boolean).join(", "));
  add("Contact", [j.contact&&j.contact.name, j.contact&&j.contact.phone].filter(Boolean).join(" · "));
  add("Notes", j.notes);
  add("Job type", j.jobType);
  add("Invoice status", j.invoiceStatus);
  const tot = money(f.total); if(tot) add("Total", tot);
  add("Created", [fmtDate(j.createdAt), j.createdBy].filter(Boolean).join(" · "));
  add("Completed", fmtDate(j.completionDate));
  if (s.date) add("Signed off", [s.date, s.time, s.name].filter(Boolean).join(" "));
  return `<dl class="detail">${rows.join("")}</dl>`;
}

function render(jobs){
  if (!jobs.length){ $("results").innerHTML = `<div class="msg">No matching jobs.</div>`; return; }
  $("results").innerHTML = jobs.map((j,i)=>{
    const closed = /closed|complete|invoiced/i.test(j.status||"");
    return `<div class="card" data-i="${i}">
      <div class="top">
        <span class="name">${esc(j.jobName||j.siteName||j.helpdeskRef||j.id)}</span>
        <span style="flex:1"></span>
        <span class="status ${closed?"closed":""}">${esc(j.status||"")}</span>
      </div>
      <div class="desc">${esc(j.description||"")}</div>
      <div class="meta">
        ${engineersOf(j)?`<span>👷 ${esc(engineersOf(j))}</span>`:""}
        ${j.postcode?`<span>📍 ${esc(j.postcode)}</span>`:""}
        ${j.createdAt?`<span>📅 ${fmtDate(j.createdAt)}</span>`:""}
      </div>
      ${detailHtml(j)}
      <div class="files" data-mos="${esc(j.helpdeskRef||j.id)}" data-loaded="0"></div>
    </div>`;
  }).join("");
  // tap a card to expand (and lazily load its photos/files the first time)
  document.querySelectorAll("#results .card").forEach(card=>{
    card.addEventListener("click", (e)=>{
      if(e.target.closest(".thumb, .doclink")) return;   // don't collapse when opening a file
      const detail = card.querySelector(".detail");
      detail.classList.toggle("show");
      if(detail.classList.contains("show")) loadFiles(card.querySelector(".files"));
    });
  });
}

/* ---- per-job files (photos / signatures / PDFs imported from Workever) ---- */
const GALLERIES = {};   // mos → [photo urls] for the lightbox
async function loadFiles(box){
  if(!box || box.dataset.loaded === "1") return;
  box.dataset.loaded = "1";
  const mos = box.dataset.mos;
  box.innerHTML = `<div class="muted" style="font-size:12px">Loading files…</div>`;
  try{
    const d = await (await fetch(SLA + "/archive/files?mos=" + encodeURIComponent(mos), { cache:"no-store" })).json();
    const files = (d && d.files) || [];
    if(!files.length){ box.innerHTML = ""; return; }
    const photos = files.filter(f => f.kind==="photo");
    const sigs   = files.filter(f => f.kind==="signature");
    const docs   = files.filter(f => f.kind==="document");
    GALLERIES[mos] = photos.map(p => p.url).concat(sigs.map(s => s.url));
    const CAP = 8;   // only load this many thumbnails up front (rest on demand)
    let html = "";
    const thumb = (f, i) => `<div class="thumb" data-mos="${esc(mos)}" data-i="${i}"><img loading="lazy" decoding="async" src="${esc(f.url)}" alt="${esc(f.name)}"></div>`;
    if(photos.length){
      const shown = photos.slice(0, CAP);
      html += `<h4>Photos (${photos.length})</h4><div class="thumbs">` + shown.map((f,i)=>thumb(f,i)).join("") + `</div>`;
      if(photos.length > CAP) html += `<button class="doclink showmore" data-mos="${esc(mos)}" data-kind="photo" style="cursor:pointer;background:#fff">Show all ${photos.length} photos</button>`;
    }
    if(sigs.length){
      html += `<h4 style="margin-top:10px">Signatures (${sigs.length})</h4><div class="thumbs">` + sigs.map((f,i)=>thumb(f, photos.length+i)).join("") + `</div>`;
    }
    if(docs.length) html += `<h4 style="margin-top:10px">Documents (${docs.length})</h4>` +
      docs.map(f=>`<a class="doclink" href="${esc(f.url)}" target="_blank" rel="noopener">📄 ${esc(f.name)}</a>`).join("");
    box.innerHTML = html;
    box._photos = photos;   // stash for "show all"
    box.querySelectorAll(".thumb").forEach(t=> t.addEventListener("click", ()=> openLightbox(t.dataset.mos, +t.dataset.i)));
    const more = box.querySelector(".showmore");
    if(more) more.addEventListener("click", (e)=>{
      e.stopPropagation();
      const grid = box.querySelector(".thumbs");
      grid.innerHTML = box._photos.map((f,i)=>thumb(f,i)).join("");
      grid.querySelectorAll(".thumb").forEach(t=> t.addEventListener("click", ()=> openLightbox(t.dataset.mos, +t.dataset.i)));
      more.remove();
    });
  }catch(e){
    box.innerHTML = `<div class="muted" style="font-size:12px">Couldn't load files.</div>`;
  }
}

/* ---- lightbox ---- */
let lbMos = null, lbIdx = 0;
function openLightbox(mos, i){ lbMos = mos; lbIdx = i; showLb(); document.getElementById("lightbox").classList.add("show"); }
function showLb(){
  const arr = GALLERIES[lbMos] || [];
  if(!arr.length) return;
  if(lbIdx < 0) lbIdx = arr.length-1; if(lbIdx >= arr.length) lbIdx = 0;
  document.getElementById("lbImg").src = arr[lbIdx];
  document.getElementById("lbCount").textContent = (lbIdx+1) + " / " + arr.length;
}
function closeLb(){ document.getElementById("lightbox").classList.remove("show"); document.getElementById("lbImg").src=""; }

async function search(reset){
  if (reset) offset = 0;
  curQ = $("q").value.trim();
  $("results").innerHTML = `<div class="msg">Searching…</div>`;
  try{
    const url = SLA + "/archive?limit=" + LIMIT + "&offset=" + offset + (curQ ? "&q="+encodeURIComponent(curQ) : "");
    const d = await (await fetch(url, { cache:"no-store" })).json();
    if (!d.ok) throw new Error(d.error||"failed");
    total = d.total||0;
    render(d.jobs||[]);
    $("count").textContent = total.toLocaleString() + (curQ ? " match"+(total===1?"":"es") : " jobs in the archive");
    const pages = Math.ceil(total/LIMIT) || 1, page = Math.floor(offset/LIMIT)+1;
    $("pager").style.display = total > LIMIT ? "flex" : "none";
    $("pageInfo").textContent = "Page " + page + " of " + pages;
    $("prev").disabled = offset <= 0;
    $("next").disabled = offset + LIMIT >= total;
  }catch(e){
    $("results").innerHTML = `<div class="msg">Couldn't load the archive: ${esc(e.message)}</div>`;
  }
}

$("go").onclick = () => search(true);
$("q").addEventListener("keydown", e => { if(e.key==="Enter") search(true); });
let deb; $("q").addEventListener("input", ()=>{ clearTimeout(deb); deb=setTimeout(()=>search(true), 350); });
$("prev").onclick = () => { if(offset>0){ offset -= LIMIT; search(false); window.scrollTo(0,0);} };
$("next").onclick = () => { if(offset+LIMIT<total){ offset += LIMIT; search(false); window.scrollTo(0,0);} };

$("lbClose").onclick = closeLb;
$("lbPrev").onclick = () => { lbIdx--; showLb(); };
$("lbNext").onclick = () => { lbIdx++; showLb(); };
$("lightbox").addEventListener("click", e => { if(e.target.id === "lightbox") closeLb(); });
document.addEventListener("keydown", e => {
  if(!$("lightbox").classList.contains("show")) return;
  if(e.key==="Escape") closeLb();
  if(e.key==="ArrowLeft"){ lbIdx--; showLb(); }
  if(e.key==="ArrowRight"){ lbIdx++; showLb(); }
});
</script>
</body>
</html>
